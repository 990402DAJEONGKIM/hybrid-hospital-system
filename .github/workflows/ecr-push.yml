name: Build, Push & Deploy to ECS

on:
  push:
    branches: [main]
    paths:
      - 'app/combined/**'
      - 'app/patient/frontend/**'
      - 'docker/api/**'
      - 'docker/nginx/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-south-2
  ECS_CLUSTER: aws-ecs-cluster-01

jobs:
  # ── 1단계: 이미지 빌드 & ECR 푸시 ────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      registry:       ${{ steps.login-ecr.outputs.registry }}
      nginx_rebuilt:  ${{ steps.detect.outputs.nginx_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect nginx changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "nginx_changed=true" >> $GITHUB_OUTPUT
            echo "workflow_dispatch: nginx 항상 빌드"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -q '^docker/nginx/' && echo "true" || echo "false")
            echo "nginx_changed=${CHANGED}" >> $GITHUB_OUTPUT
            echo "nginx 변경 여부: ${CHANGED}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push api image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          if aws ecr describe-images \
              --repository-name "aws-hospital-api" \
              --image-ids imageTag="$TAG" \
              --region $AWS_REGION > /dev/null 2>&1; then
            echo "aws-hospital-api:$TAG already exists, skipping"
            exit 0
          fi

          TAGS="-t $REGISTRY/aws-hospital-api:$TAG"
          aws ecr describe-images \
              --repository-name "aws-hospital-api" \
              --image-ids imageTag="latest" \
              --region $AWS_REGION > /dev/null 2>&1 \
            || TAGS="$TAGS -t $REGISTRY/aws-hospital-api:latest"

          docker buildx build -f docker/api/Dockerfile \
            --cache-from type=gha,scope=api \
            --cache-to  type=gha,mode=max,scope=api \
            --push \
            $TAGS .

      - name: Build & Push nginx image
        if: steps.detect.outputs.nginx_changed == 'true'
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          if aws ecr describe-images \
              --repository-name "aws-hospital-nginx" \
              --image-ids imageTag="$TAG" \
              --region $AWS_REGION > /dev/null 2>&1; then
            echo "aws-hospital-nginx:$TAG already exists, skipping"
            exit 0
          fi

          TAGS="-t $REGISTRY/aws-hospital-nginx:$TAG"
          aws ecr describe-images \
              --repository-name "aws-hospital-nginx" \
              --image-ids imageTag="latest" \
              --region $AWS_REGION > /dev/null 2>&1 \
            || TAGS="$TAGS -t $REGISTRY/aws-hospital-nginx:latest"

          docker buildx build -f docker/nginx/Dockerfile \
            --cache-from type=gha,scope=nginx \
            --cache-to  type=gha,mode=max,scope=nginx \
            --push \
            $TAGS .

  # ── 2단계: hospital-service 배포 ──────────────────────────────
  deploy:
    name: Deploy hospital-service
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      REGISTRY:      ${{ needs.build.outputs.registry }}
      TAG:           ${{ github.sha }}
      NGINX_REBUILT: ${{ needs.build.outputs.nginx_rebuilt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate inputs
        run: |
          if [ -z "$REGISTRY" ]; then
            echo "ERROR: REGISTRY is empty. build job may not have passed registry output correctly."
            exit 1
          fi
          echo "REGISTRY=$REGISTRY"
          echo "TAG=$TAG"
          echo "NGINX_REBUILT=$NGINX_REBUILT"

      - name: Ensure ECS capacity is available
        run: |
          echo "Checking ASG running instance count..."
          RUNNING=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names aws-ecs-asg-01 \
            --region $AWS_REGION \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`] | length(@)' \
            --output text)
          echo "InService instances: $RUNNING"
          if [ "$RUNNING" -lt 1 ]; then
            echo "No running instances. Setting ASG desired=1 and waiting for capacity..."
            aws autoscaling set-desired-capacity \
              --auto-scaling-group-name aws-ecs-asg-01 \
              --desired-capacity 1 \
              --region $AWS_REGION
            for i in $(seq 1 12); do
              sleep 30
              RUNNING=$(aws autoscaling describe-auto-scaling-groups \
                --auto-scaling-group-names aws-ecs-asg-01 \
                --region $AWS_REGION \
                --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`] | length(@)' \
                --output text)
              echo "[${i}/12] InService instances: $RUNNING"
              if [ "$RUNNING" -ge 1 ]; then
                echo "Capacity ready. Waiting 30s for ECS agent registration..."
                sleep 30
                break
              fi
              if [ $i -eq 12 ]; then
                echo "ERROR: ASG did not reach capacity within 6 minutes."
                exit 1
              fi
            done
          fi

      - name: Deploy hospital-service
        run: |
          aws ecs describe-task-definition \
            --task-definition hospital-task \
            --query taskDefinition > task-def.json

          python3 - <<'EOF'
          import json, os

          with open('task-def.json') as f:
              td = json.load(f)

          registry      = os.environ['REGISTRY']
          tag           = os.environ['TAG']
          nginx_rebuilt = os.environ['NGINX_REBUILT'] == 'true'

          for c in td['containerDefinitions']:
              if c['name'] == 'api':
                  c['image'] = f"{registry}/aws-hospital-api:{tag}"
              elif c['name'] == 'nginx' and nginx_rebuilt:
                  c['image'] = f"{registry}/aws-hospital-nginx:{tag}"
              # nginx_rebuilt=false 이면 기존 이미지 태그 유지

          for key in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes',
                      'compatibilities', 'registeredAt', 'registeredBy',
                      'enableFaultInjection']:
              td.pop(key, None)

          with open('new-task-def.json', 'w') as f:
              json.dump(td, f)
          EOF

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $NEW_ARN"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service hospital-service \
            --task-definition $NEW_ARN \
            --output text --query 'service.deployments[0].rolloutState'

          echo "Waiting for hospital-service to stabilize (max 30 min)..."
          for i in $(seq 1 60); do
            RESULT=$(aws ecs describe-services \
              --cluster $ECS_CLUSTER \
              --services hospital-service \
              --query 'services[0].deployments[?status==`PRIMARY`].[rolloutState,desiredCount,runningCount]' \
              --output text)
            STATE=$(echo "$RESULT"  | awk '{print $1}')
            DESIRED=$(echo "$RESULT" | awk '{print $2}')
            RUNNING=$(echo "$RESULT" | awk '{print $3}')
            echo "[${i}/60] hospital-service: state=$STATE desired=$DESIRED running=$RUNNING"
            if [ "$STATE" = "COMPLETED" ]; then
              echo "hospital-service deployment succeeded."
              break
            elif [ "$STATE" = "FAILED" ]; then
              echo "hospital-service deployment FAILED."
              exit 1
            fi
            if [ $i -eq 60 ]; then
              echo "Timed out. Fetching stopped task reasons..."
              STOPPED=$(aws ecs list-tasks \
                --cluster $ECS_CLUSTER \
                --service-name hospital-service \
                --desired-status STOPPED \
                --query 'taskArns[0]' --output text)
              if [ "$STOPPED" != "None" ] && [ -n "$STOPPED" ]; then
                aws ecs describe-tasks \
                  --cluster $ECS_CLUSTER \
                  --tasks "$STOPPED" \
                  --query 'tasks[0].{stoppedReason:stoppedReason,containers:containers[*].{name:name,reason:reason,exitCode:exitCode,lastStatus:lastStatus}}' \
                  --output json
              else
                echo "No stopped tasks found. Check ECS console for placement failures."
              fi
              exit 1
            fi
            sleep 30
          done
