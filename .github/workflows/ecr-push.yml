name: Build, Push & Deploy to ECS

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'docker/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-south-2
  ECS_CLUSTER: aws-ecs-cluster-01

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 이미지 빌드 & ECR 푸시 ───────────────────────────
      - name: Build & Push api-patient
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -f docker/api-patient/Dockerfile \
            -t $REGISTRY/aws-hospital-api-patient:$TAG .
          docker push $REGISTRY/aws-hospital-api-patient:$TAG

      - name: Build & Push nginx-patient
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -f docker/nginx-patient/Dockerfile \
            -t $REGISTRY/aws-hospital-nginx-patient:$TAG .
          docker push $REGISTRY/aws-hospital-nginx-patient:$TAG

      - name: Build & Push api-staff
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -f docker/api-staff/Dockerfile \
            -t $REGISTRY/aws-hospital-api-staff:$TAG .
          docker push $REGISTRY/aws-hospital-api-staff:$TAG

      - name: Build & Push nginx-staff
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -f docker/nginx-staff/Dockerfile \
            -t $REGISTRY/aws-hospital-nginx-staff:$TAG .
          docker push $REGISTRY/aws-hospital-nginx-staff:$TAG

      # ── patient-service 배포 (AWS CLI) ───────────────────
      - name: Deploy patient-service
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          # 현재 task definition 다운로드 후 이미지만 교체
          aws ecs describe-task-definition \
            --task-definition patient-task \
            --query taskDefinition > patient-task-def.json

          python3 - <<'EOF'
          import json

          with open('patient-task-def.json') as f:
              td = json.load(f)

          import os
          registry = os.environ['REGISTRY']
          tag      = os.environ['TAG']

          for c in td['containerDefinitions']:
              if c['name'] == 'nginx-patient':
                  c['image'] = f"{registry}/aws-hospital-nginx-patient:{tag}"
              elif c['name'] == 'api-patient':
                  c['image'] = f"{registry}/aws-hospital-api-patient:{tag}"

          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)

          with open('new-patient-task-def.json', 'w') as f:
              json.dump(td, f)
          EOF

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-patient-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service patient-service \
            --task-definition $NEW_ARN

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services patient-service

      # ── staff-service 배포 (AWS CLI) ─────────────────────
      - name: Deploy staff-service
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          aws ecs describe-task-definition \
            --task-definition staff-task \
            --query taskDefinition > staff-task-def.json

          python3 - <<'EOF'
          import json

          with open('staff-task-def.json') as f:
              td = json.load(f)

          import os
          registry = os.environ['REGISTRY']
          tag      = os.environ['TAG']

          for c in td['containerDefinitions']:
              if c['name'] == 'nginx-staff':
                  c['image'] = f"{registry}/aws-hospital-nginx-staff:{tag}"
              elif c['name'] == 'api-staff':
                  c['image'] = f"{registry}/aws-hospital-api-staff:{tag}"

          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)

          with open('new-staff-task-def.json', 'w') as f:
              json.dump(td, f)
          EOF

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-staff-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service staff-service \
            --task-definition $NEW_ARN

          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services staff-service
