<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예약 변경 - MZ Clinic</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .edit-wrap { max-width:480px; margin:100px auto 40px; padding:0 16px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-weight:600; margin-bottom:6px; font-size:14px; color:#546e7a; }
        .form-group select,
        .form-group input[type="date"],
        .form-group textarea { width:100%; padding:10px 12px; border:1px solid #cfd8dc; border-radius:6px; font-size:15px; box-sizing:border-box; }
        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus { outline:none; border-color:var(--primary); }
        .form-group textarea { resize:vertical; min-height:72px; }
        .btn-row { display:flex; gap:10px; margin-top:24px; }
        .btn-primary   { flex:1; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; }
        .btn-secondary { flex:1; padding:12px; background:#eceff1; color:#546e7a; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; }
        #errMsg { color:#e53935; font-size:13px; margin-top:8px; min-height:18px; }
    </style>
</head>
<body style="margin:0;">
<div class="portal-layout">
<aside class="portal-sidebar" id="portalSidebar"></aside>
<main class="portal-content">
<div class="edit-wrap" style="margin:0;max-width:480px;">
    <h2 style="margin-bottom:8px;">예약 일정 변경</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:24px;">대기 중인 예약의 날짜, 시간, 메모를 변경할 수 있습니다.</p>

    <div class="form-group">
        <label for="newDate">예약 날짜 *</label>
        <input type="date" id="newDate">
    </div>
    <div class="form-group">
        <label for="newTime">예약 시간 *</label>
        <select id="newTime">
            <option value="09:00">09:00</option>
            <option value="09:30">09:30</option>
            <option value="10:00">10:00</option>
            <option value="10:30">10:30</option>
            <option value="11:00">11:00</option>
            <option value="11:30">11:30</option>
            <option value="14:00">14:00</option>
            <option value="14:30">14:30</option>
            <option value="15:00">15:00</option>
            <option value="15:30">15:30</option>
            <option value="16:00">16:00</option>
        </select>
    </div>
    <div class="form-group">
        <label for="newNotes">메모 (선택)</label>
        <textarea id="newNotes" placeholder="증상이나 특이사항을 간단히 적어주세요"></textarea>
    </div>

    <div id="errMsg"></div>
    <div class="btn-row">
        <button class="btn-secondary" onclick="location.href='index.html'">뒤로</button>
        <button class="btn-primary" id="saveBtn" onclick="save()">변경 저장</button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const apptId = params.get('id');

    async function init() {
        const me = await requireLogin();
        if (!me) return;

        if (!apptId) {
            alert('잘못된 접근입니다.');
            location.href = 'index.html';
            return;
        }

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('newDate').min = today;

        const date  = params.get('date')  || today;
        const time  = params.get('time')  || '09:00';
        const notes = params.get('notes') || '';

        document.getElementById('newDate').value  = date;
        document.getElementById('newNotes').value = notes;

        const timeSel = document.getElementById('newTime');
        for (const opt of timeSel.options) {
            if (opt.value === time) { opt.selected = true; break; }
        }
    }

    async function save() {
        const btn  = document.getElementById('saveBtn');
        const date = document.getElementById('newDate').value;
        const time = document.getElementById('newTime').value;

        if (!date) { document.getElementById('errMsg').textContent = '날짜를 선택해주세요.'; return; }

        btn.disabled = true;
        document.getElementById('errMsg').textContent = '';

        const body = { appointment_date: date, appointment_time: time };
        const notes = document.getElementById('newNotes').value.trim();
        if (notes) body.notes = notes;

        const res = await apiCall(`/portal/appointments/${apptId}`, {
            method: 'PATCH',
            body: JSON.stringify(body),
        });

        if (res && res.ok) {
            alert('예약이 변경되었습니다.');
            location.href = 'index.html';
        } else {
            const err = await res?.json().catch(() => ({}));
            document.getElementById('errMsg').textContent = err.detail || '변경 처리 중 오류가 발생했습니다.';
            btn.disabled = false;
        }
    }

    renderSidebar('my-appointments.html');
    init();
</script>
</main>
</div>
</body>
</html>
