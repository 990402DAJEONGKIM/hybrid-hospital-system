<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진료기록 - 김이박 클리닉</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .section-card {
            background: #fff; border-radius: 12px; padding: 20px 24px;
            margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .section-card h3 {
            font-size: 15px; font-weight: 700; color: #263238;
            margin: 0 0 14px; display: flex; align-items: center; gap: 8px;
        }
        .section-card h3 i { color: var(--primary); }

        /* 진료 이력 타임라인 */
        .enc-item {
            padding: 12px 0; border-bottom: 1px solid #f0f4f8;
            cursor: pointer; transition: background 0.1s;
        }
        .enc-item:last-child { border-bottom: none; }
        .enc-item:hover { background: #f5f7fa; margin: 0 -8px; padding: 12px 8px; border-radius: 6px; }
        .enc-header { display: flex; justify-content: space-between; align-items: center; }
        .enc-date { font-size: 13px; font-weight: 700; color: #1976d2; }
        .enc-type-badge {
            padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
            background: #e3f2fd; color: #1565c0;
        }
        .enc-dept { font-size: 14px; font-weight: 600; color: #263238; margin-top: 4px; }
        .enc-doctor { font-size: 13px; color: #78909c; }
        .enc-diag { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
        .diag-badge {
            padding: 2px 8px; background: #f3e5f5; color: #6a1b9a;
            border-radius: 10px; font-size: 11px; font-weight: 600;
        }

        /* 진료 상세 모달 */
        .modal-backdrop {
            display: none; position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
        }
        .modal-backdrop.open { display: flex; }
        .modal-box {
            background: #fff; border-radius: 14px; padding: 24px;
            max-width: 480px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            max-height: 80vh; overflow-y: auto;
        }
        .modal-box h3 { margin: 0 0 16px; font-size: 17px; color: #263238; }
        .modal-close { float:right; background:none; border:none; font-size:20px; cursor:pointer; color:#90a4ae; }
        .detail-row { padding: 8px 0; border-bottom: 1px solid #f0f4f8; font-size: 13px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-weight: 600; color: #546e7a; margin-bottom: 2px; }
        .detail-val { color: #263238; }

        /* 알레르기 / 수술 이력 */
        .info-table { width: 100%; font-size: 13px; border-collapse: collapse; }
        .info-table th { text-align: left; padding: 8px 10px; background: #f5f7fa; color: #78909c; font-size: 12px; font-weight: 700; border-bottom: 1px solid #e0e0e0; }
        .info-table td { padding: 10px; border-bottom: 1px solid #f0f4f8; color: #263238; }
        .info-table tr:last-child td { border-bottom: none; }
        .severity-high   { color: #e53935; font-weight: 700; }
        .severity-medium { color: #fb8c00; font-weight: 700; }
        .severity-low    { color: #43a047; font-weight: 700; }
        .empty-row td { text-align: center; color: #90a4ae; padding: 20px; }
    </style>
</head>
<body style="margin:0;">

<div class="portal-layout">
<aside class="portal-sidebar" id="portalSidebar"></aside>
<main class="portal-content">
<div>
    <h2><i class="fas fa-notes-medical" style="color:var(--primary);margin-right:8px;"></i>진료 및 건강 기록</h2>
    <p style="font-size:13px;color:#90a4ae;margin-bottom:24px;">
        * 개인정보 보호를 위해 진단명은 코드로 표기됩니다. 진료 노트는 의료진 전용입니다.
    </p>

    <div id="loadingMsg" style="text-align:center;padding:40px;color:#90a4ae;">
        <i class="fas fa-spinner fa-spin" style="font-size:24px;"></i>
        <p style="margin-top:8px;">불러오는 중...</p>
    </div>

    <!-- 진료 이력 -->
    <div class="section-card" id="encounterSection" style="display:none;">
        <h3><i class="fas fa-stethoscope"></i>진료 이력</h3>
        <div id="encounterList"></div>
        <div id="encEmptyMsg" style="display:none;text-align:center;color:#90a4ae;padding:20px;font-size:13px;">
            진료 이력이 없습니다.
        </div>
    </div>

    <!-- 알레르기 정보 -->
    <div class="section-card" id="allergySection" style="display:none;">
        <h3><i class="fas fa-allergies"></i>알레르기 정보</h3>
        <table class="info-table">
            <thead>
                <tr><th>알레르기명</th><th>중증도</th></tr>
            </thead>
            <tbody id="allergyBody">
                <tr class="empty-row"><td colspan="2">불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 수술 이력 -->
    <div class="section-card" id="surgerySection" style="display:none;">
        <h3><i class="fas fa-procedures"></i>수술 이력</h3>
        <table class="info-table">
            <thead>
                <tr><th>수술명</th><th>수술일</th></tr>
            </thead>
            <tbody id="surgeryBody">
                <tr class="empty-row"><td colspan="2">불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 진료 상세 모달 -->
<div class="modal-backdrop" id="detailModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeDetailModal()">×</button>
        <h3><i class="fas fa-file-medical" style="color:var(--primary);margin-right:8px;"></i>진료 상세</h3>
        <div id="detailContent"></div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
<script>
    const ENC_TYPE = {
        outpatient:        '외래',
        outpatient_new:    '외래(초진)',
        outpatient_return: '외래(재진)',
        inpatient:         '입원',
        surgery:           '수술',
    };
    function encTypeLabel(v) { return ENC_TYPE[v] || v || '-'; }
    const SEV_CLASS = { high: 'severity-high', medium: 'severity-medium', low: 'severity-low' };

    function sevLabel(code) {
        const map = { high: '높음', medium: '보통', low: '낮음' };
        return map[(code || '').toLowerCase()] || code || '-';
    }

    async function loadAll() {
        const me = await requireLogin();
        if (!me) return;

        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('encounterSection').style.display = 'block';
        document.getElementById('allergySection').style.display   = 'block';
        document.getElementById('surgerySection').style.display   = 'block';

        // 병렬 로드
        const [encRes, algRes, srgRes] = await Promise.all([
            apiCall('/portal/my-records'),
            apiCall('/portal/allergies'),
            apiCall('/portal/surgery-histories'),
        ]);

        renderEncounters(encRes);
        renderAllergies(algRes);
        renderSurgeries(srgRes);
    }

    async function renderEncounters(res) {
        const list = document.getElementById('encounterList');
        const empty = document.getElementById('encEmptyMsg');

        if (!res || !res.ok) { empty.style.display = 'block'; return; }
        const data = await res.json();
        if (!data.length) { empty.style.display = 'block'; return; }

        list.innerHTML = data.map(r => {
            const deptName  = r.department_name || r.department_code;
            const encType   = encTypeLabel(r.encounter_type);
            const diagBadges = (r.diagnoses || []).map(code =>
                `<span class="diag-badge">${code}</span>`
            ).join('');
            return `
            <div class="enc-item" onclick="showDetail('${r.encounter_id}')">
                <div class="enc-header">
                    <span class="enc-date"><i class="fas fa-calendar-alt" style="margin-right:4px;"></i>${r.visit_date || '-'}</span>
                    <span class="enc-type-badge">${encType}</span>
                </div>
                <div class="enc-dept">${deptName}</div>
                ${r.doctor_name ? `<div class="enc-doctor"><i class="fas fa-user-md" style="margin-right:4px;"></i>${r.doctor_name}</div>` : ''}
                ${diagBadges ? `<div class="enc-diag">${diagBadges}</div>` : ''}
            </div>`;
        }).join('');
    }

    async function renderAllergies(res) {
        const tbody = document.getElementById('allergyBody');
        if (!res || !res.ok) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="2">조회할 수 없습니다.</td></tr>';
            return;
        }
        const data = await res.json();
        if (!data.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="2">알레르기 정보 없음</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(a => {
            const sevKey = (a.severity_code || '').toLowerCase();
            return `<tr>
                <td>${a.allergy_name || '-'}</td>
                <td class="${SEV_CLASS[sevKey] || ''}">${sevLabel(a.severity_code)}</td>
            </tr>`;
        }).join('');
    }

    async function renderSurgeries(res) {
        const tbody = document.getElementById('surgeryBody');
        if (!res || !res.ok) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="2">조회할 수 없습니다.</td></tr>';
            return;
        }
        const data = await res.json();
        if (!data.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="2">수술 이력 없음</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(s =>
            `<tr>
                <td>${s.surgery_name || '-'}</td>
                <td>${s.surgery_date || '-'}</td>
            </tr>`
        ).join('');
    }

    // ── 진료 상세 ────────────────────────────────────────────
    async function showDetail(encId) {
        document.getElementById('detailContent').innerHTML =
            '<p style="text-align:center;color:#90a4ae;padding:20px;"><i class="fas fa-spinner fa-spin"></i></p>';
        document.getElementById('detailModal').classList.add('open');

        const res = await apiCall(`/portal/encounters/${encId}`);
        if (!res || !res.ok) {
            document.getElementById('detailContent').innerHTML =
                '<p style="color:#e53935;font-size:13px;text-align:center;padding:20px;">상세 정보를 불러올 수 없습니다.</p>';
            return;
        }
        const d = await res.json();
        const encType = encTypeLabel(d.encounter_type);
        const diagHtml = (d.diagnoses || []).length
            ? d.diagnoses.map(dx =>
                `<span class="diag-badge" style="margin-right:4px;">${dx.diagnosis_code}${dx.is_primary ? ' (주진단)' : ''}</span>`
              ).join('')
            : '<span style="color:#90a4ae;">진단 코드 없음</span>';

        document.getElementById('detailContent').innerHTML = `
            <div class="detail-row">
                <div class="detail-label">방문일</div>
                <div class="detail-val">${d.visit_date || '-'}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">진료과</div>
                <div class="detail-val">${d.department_name || d.department_code || '-'}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">진료 유형</div>
                <div class="detail-val">${encType}</div>
            </div>
            ${d.doctor_name ? `<div class="detail-row">
                <div class="detail-label">담당 의사</div>
                <div class="detail-val">${d.doctor_name}</div>
            </div>` : ''}
            <div class="detail-row">
                <div class="detail-label">상태</div>
                <div class="detail-val">${d.status_code === 'completed' ? '완료' : (d.status_code || '-')}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">진단 코드 (ICD)</div>
                <div class="detail-val" style="margin-top:4px;">${diagHtml}</div>
            </div>
        `;
    }

    function closeDetailModal() {
        document.getElementById('detailModal').classList.remove('open');
    }

    renderSidebar('my-records.html');
    loadAll();
</script>
</main>
</div>
</body>
</html>
