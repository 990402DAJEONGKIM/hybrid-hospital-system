<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - 김이박 클리닉</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { margin: 0; background: #f0f4f8; }
        .pw-card {
            background: #fff; border-radius: 12px; padding: 28px;
            max-width: 420px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .field-group { margin-bottom: 14px; }
        .field-group label { display: block; font-size: 12px; font-weight: 600; color: #78909c; margin-bottom: 5px; }
        .field-group .input-wrap { position: relative; }
        .field-group .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #b0bec5; font-size: 13px; }
        .field-group input {
            width: 100%; padding: 10px 12px 10px 36px; border: 1px solid #cfd8dc;
            border-radius: 8px; font-size: 14px; box-sizing: border-box;
            background: #f9fafb; color: #263238; outline: none;
        }
        .field-group input:focus { border-color: var(--primary); background: #fff; }
        .policy-note {
            background: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px;
            padding: 10px 14px; font-size: 12px; color: #1565c0; margin-bottom: 16px;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .forced-banner {
            background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px;
            padding: 12px 14px; font-size: 13px; color: #856404; margin-bottom: 16px;
            display: none; align-items: flex-start; gap: 10px;
        }
        .error-box {
            background: #fce4ec; border: 1px solid #f48fb1; border-radius: 8px;
            padding: 10px 14px; font-size: 13px; color: #c62828; margin-bottom: 14px;
            display: none; align-items: flex-start; gap: 8px;
        }
        .submit-btn {
            width: 100%; padding: 11px; font-size: 14px; font-weight: 700;
            background: var(--primary); color: #fff; border: none;
            border-radius: 8px; cursor: pointer; transition: opacity 0.2s;
        }
        .submit-btn:hover { opacity: 0.88; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .forgot-note {
            background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 8px;
            padding: 12px 14px; font-size: 12px; color: #78909c; margin-top: 16px; line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="portal-layout">
    <aside class="portal-sidebar" id="portalSidebar"></aside>

    <main class="portal-content">
        <h2 style="font-size:22px;font-weight:700;color:#263238;margin-bottom:20px;">
            <i class="fas fa-key" style="color:var(--primary);margin-right:8px;"></i>비밀번호 변경
        </h2>

        <div class="pw-card">
            <!-- 최초 로그인 강제 변경 배너 -->
            <div class="forced-banner" id="forcedBanner">
                <i class="fas fa-exclamation-triangle" style="flex-shrink:0;margin-top:1px;"></i>
                <span>최초 로그인 또는 관리자에 의해 비밀번호 재설정이 필요합니다.<br>
                변경 완료 전에는 다른 메뉴를 이용하실 수 없습니다.</span>
            </div>

            <!-- 보안 안내 -->
            <div class="policy-note">
                <i class="fas fa-shield-alt" style="flex-shrink:0;margin-top:1px;"></i>
                <span>보안을 위해 <strong>90일마다</strong> 비밀번호 변경을 권고합니다.<br>
                8자 이상, 영문 대/소문자·숫자·특수문자를 포함해주세요.</span>
            </div>

            <form id="changePwdForm">
                <div class="field-group">
                    <label>현재 비밀번호</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="old_password" required autocomplete="current-password">
                    </div>
                </div>
                <div class="field-group">
                    <label>새 비밀번호</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock-open"></i>
                        <input type="password" id="new_password" required placeholder="8자 이상, 대/소문자·숫자·특수문자" autocomplete="new-password">
                    </div>
                </div>
                <div class="field-group">
                    <label>새 비밀번호 확인</label>
                    <div class="input-wrap">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirm_password" required autocomplete="new-password">
                    </div>
                </div>

                <div class="error-box" id="apiError">
                    <i class="fas fa-exclamation-circle" style="flex-shrink:0;margin-top:1px;"></i>
                    <span id="apiErrorMsg"></span>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">
                    <i class="fas fa-save" style="margin-right:6px;"></i>비밀번호 변경 및 재로그인
                </button>
            </form>

            <!-- 비밀번호 분실 안내 -->
            <div class="forgot-note">
                <i class="fas fa-info-circle" style="margin-right:4px;"></i>
                <strong>비밀번호를 잊으셨나요?</strong><br>
                환자 계정은 이메일 주소가 등록되지 않아 온라인으로 재설정할 수 없습니다.<br>
                원무과 창구 또는 담당 간호사에게 임시 비밀번호 재발급을 요청해 주세요.
            </div>
        </div>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
<script>
    let _mustChange = false;

    async function initPage() {
        try {
            const res = await fetch(`${BASE_URL}/auth/me`, {
                credentials: 'include', headers: { 'X-API-Key': API_KEY },
            });
            if (!res.ok) { window.location.href = 'login.html'; return; }
            const me = await res.json();
            if (me.must_change_password) {
                _mustChange = true;
                document.getElementById('forcedBanner').style.display = 'flex';
            }
        } catch { window.location.href = 'login.html'; }
    }

    document.getElementById('changePwdForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const old_pw    = document.getElementById('old_password').value;
        const new_pw    = document.getElementById('new_password').value;
        const confirm   = document.getElementById('confirm_password').value;
        const errorBox  = document.getElementById('apiError');
        const errorMsg  = document.getElementById('apiErrorMsg');
        const submitBtn = document.getElementById('submitBtn');

        errorBox.style.display = 'none';

        if (new_pw !== confirm) {
            errorMsg.textContent = '새 비밀번호가 일치하지 않습니다.';
            errorBox.style.display = 'flex'; return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>변경 중...';

        try {
            const res = await fetch(`${BASE_URL}/auth/change-password`, {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                body: JSON.stringify({ old_password: old_pw, new_password: new_pw }),
            });
            if (res.ok) {
                alert('비밀번호가 변경되었습니다. 다시 로그인해 주세요.');
                location.href = 'login.html';
            } else {
                const data = await res.json();
                errorMsg.textContent = data.detail || '변경 중 오류가 발생했습니다.';
                errorBox.style.display = 'flex';
            }
        } catch {
            errorMsg.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
            errorBox.style.display = 'flex';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-save" style="margin-right:6px;"></i>비밀번호 변경 및 재로그인';
        }
    });

    renderSidebar('change-password.html');
    initPage();
</script>
</body>
</html>
