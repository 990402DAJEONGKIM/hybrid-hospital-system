<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>김이박 병원 DR 예약</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>김이박 병원 예약</h1>
      <p>재해복구 모드</p>
    </div>
    <button id="logoutBtn" class="ghost hidden">로그아웃</button>
  </header>

  <main class="layout">
    <section id="loginPanel" class="panel auth-panel">
      <h2>환자 로그인</h2>
      <form id="loginForm" class="form">
        <label>이메일<input id="email" type="email" autocomplete="username" required></label>
        <label>비밀번호<input id="password" type="password" autocomplete="current-password" required></label>
        <button type="submit">로그인</button>
      </form>
      <p id="loginMessage" class="message"></p>
    </section>

    <section id="appPanel" class="workspace hidden">
      <section class="panel">
        <div class="section-head">
          <div>
            <h2>예약 신청</h2>
            <p id="userLabel"></p>
          </div>
          <span class="badge">GCP DR</span>
        </div>
        <form id="appointmentForm" class="form grid">
          <label>예약 유형<select id="typeCode" required></select></label>
          <label>진료과<select id="departmentCode" required></select></label>
          <label>의료진<select id="doctorId"></select></label>
          <label>날짜<input id="appointmentDate" type="date" required></label>
          <label>시간<select id="appointmentTime" required></select></label>
          <label class="wide">메모<textarea id="notes" rows="3"></textarea></label>
          <button type="submit" class="wide">예약 신청</button>
        </form>
        <p id="appointmentMessage" class="message"></p>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>내 예약</h2>
          <button id="refreshBtn" class="ghost">새로고침</button>
        </div>
        <div id="appointments" class="appointments"></div>
      </section>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
