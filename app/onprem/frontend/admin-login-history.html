<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 이력 — MZ Clinic HIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1><i class="fas fa-hospital-alt" style="margin-right:6px;color:#6ee7b7;"></i>MZ Clinic HIS</h1>
            <p>온프레미스 내부망</p>
        </div>
        <nav id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div id="user-info"></div>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>로그아웃</button>
        </div>
    </aside>

    <main class="main-content">
        <h1 class="page-title">로그인 이력</h1>
        <p class="page-subtitle">로그인 성공·실패·계정 잠금 이력 (ISMS-P 2.9.1)</p>

        <div class="card">
            <div class="search-bar">
                <input type="text" id="filterEmail" class="form-control" placeholder="이메일 검색">
                <select id="filterResult" class="form-control" style="max-width:140px;">
                    <option value="">전체 결과</option>
                    <option value="success">성공</option>
                    <option value="fail">실패</option>
                    <option value="locked">계정 잠금</option>
                </select>
                <button class="btn btn-primary" onclick="loadHistory()">
                    <i class="fas fa-filter" style="margin-right:4px;"></i>조회
                </button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>일시</th>
                            <th>이메일</th>
                            <th>결과</th>
                            <th>IP 주소</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div id="emptyMsg" style="display:none;text-align:center;padding:24px;color:#9ca3af;font-size:13px;">이력이 없습니다.</div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;" id="pagination"></div>
        </div>
    </main>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    let _offset = 0;
    const LIMIT = 50;

    async function loadHistory(offset = 0) {
        _offset = offset;
        const email  = document.getElementById('filterEmail').value.trim();
        const result = document.getElementById('filterResult').value;
        const params = new URLSearchParams({ limit: LIMIT, offset });
        if (email)  params.set('email', email);
        if (result) params.set('result', result);

        const res = await apiCall(`/admin/login-history?${params}`);
        if (!res || !res.ok) return;
        const data = await res.json();

        const RESULT_BADGE = { success: 'badge-green', fail: 'badge-red', locked: 'badge-yellow' };
        const RESULT_LABEL = { success: '성공', fail: '실패', locked: '잠금' };

        const tbody = document.getElementById('tbody');
        document.querySelector('table').style.display = data.total ? '' : 'none';
        document.getElementById('emptyMsg').style.display = data.total ? 'none' : 'block';

        tbody.innerHTML = data.items.map(h => `
            <tr>
                <td style="white-space:nowrap;font-size:12px;">${formatDateTime(h.event_at)}</td>
                <td style="font-size:13px;">${h.email||'-'}</td>
                <td><span class="badge ${RESULT_BADGE[h.result]||'badge-gray'}">${RESULT_LABEL[h.result]||h.result}</span></td>
                <td style="font-size:12px;">${h.ip_address||'-'}</td>
            </tr>
        `).join('');

        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';
        if (offset > 0) {
            const prev = document.createElement('button');
            prev.className   = 'btn btn-secondary btn-sm';
            prev.textContent = '이전';
            prev.onclick     = () => loadHistory(offset - LIMIT);
            pagination.appendChild(prev);
        }
        if (offset + LIMIT < data.total) {
            const next = document.createElement('button');
            next.className   = 'btn btn-primary btn-sm';
            next.textContent = '다음';
            next.onclick     = () => loadHistory(offset + LIMIT);
            pagination.appendChild(next);
        }
    }

    document.getElementById('filterEmail').addEventListener('keypress', e => { if (e.key === 'Enter') loadHistory(); });

    (async () => {
        const me = await initPage();
        if (!me) return;
        if (me.role !== 'admin') { alert('관리자만 접근 가능합니다.'); location.href = '/index.html'; return; }
        loadHistory();
    })();
</script>
</body>
</html>
