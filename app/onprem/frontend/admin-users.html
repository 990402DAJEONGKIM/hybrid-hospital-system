<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 관리 — MZ Clinic HIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1><i class="fas fa-hospital-alt" style="margin-right:6px;color:#6ee7b7;"></i>MZ Clinic HIS</h1>
            <p>온프레미스 내부망</p>
        </div>
        <nav id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div id="user-info"></div>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>로그아웃</button>
        </div>
    </aside>

    <main class="main-content">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <h1 class="page-title" style="margin:0;">사용자 관리</h1>
            <button class="btn btn-primary" onclick="openCreate()">
                <i class="fas fa-user-plus" style="margin-right:6px;"></i>계정 생성
            </button>
        </div>
        <p class="page-subtitle">온프레미스가 계정 마스터입니다. 계정 변경은 AWS에 자동 동기화됩니다 (ISMS-P 2.5.1).</p>

        <div class="card">
            <div class="search-bar">
                <select id="filterRole" class="form-control" style="max-width:140px;" onchange="loadUsers()">
                    <option value="">전체 역할</option>
                    <option value="doctor">의사</option>
                    <option value="nurse">원무과</option>
                    <option value="admin">관리자</option>
                </select>
                <select id="filterActive" class="form-control" style="max-width:140px;" onchange="loadUsers()">
                    <option value="">전체 상태</option>
                    <option value="true">활성</option>
                    <option value="false">비활성</option>
                </select>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>회원번호 / 이메일</th>
                            <th>역할</th>
                            <th>상태</th>
                            <th>최근 로그인</th>
                            <th>계정 잠금</th>
                            <th>등록일</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div id="emptyMsg" style="display:none;text-align:center;padding:24px;color:#9ca3af;font-size:13px;">계정이 없습니다.</div>
        </div>

        <!-- 계정 생성/수정 모달 -->
        <div class="modal-backdrop" id="userModal">
            <div class="modal">
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 class="modal-title" id="modalTitle">계정 생성</h3>

                <div id="memberNumberGroup">
                    <div class="form-group">
                        <label>회원번호 (로그인 ID) <span style="color:#ef4444;">*</span></label>
                        <input type="text" id="uMemberNumber" class="form-control" placeholder="예: 20240001">
                    </div>
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="uEmail" class="form-control" placeholder="staff@clinic.local (선택)">
                </div>
                <div id="pwGroup">
                    <div class="form-group">
                        <label>비밀번호 <span style="color:#ef4444;">*</span></label>
                        <input type="password" id="uPw" class="form-control" placeholder="8자 이상, 2종류 이상">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>역할 <span style="color:#ef4444;">*</span></label>
                        <select id="uRole" class="form-control">
                            <option value="nurse">원무과</option>
                            <option value="doctor">의사</option>
                            <option value="admin">관리자</option>
                        </select>
                    </div>
                    <div class="form-group" id="doctorIdGroup" style="display:none;">
                        <label>의사 ID (doctor_id)</label>
                        <input type="text" id="uDoctorId" class="form-control" placeholder="UUID">
                    </div>
                </div>
                <div id="modalStatus" style="display:none;"></div>
                <div style="display:flex;gap:8px;margin-top:16px;">
                    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                    <button class="btn btn-primary" id="modalSubmitBtn" onclick="submitModal()">저장</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    const ROLE_LABEL   = { doctor: '의사', nurse: '원무과', admin: '관리자' };
    let _editUserId    = null;
    let _currentUserId = null;

    async function loadUsers() {
        const role   = document.getElementById('filterRole').value;
        const active = document.getElementById('filterActive').value;
        const params = new URLSearchParams({ limit: 100 });
        if (role)   params.set('role', role);
        if (active) params.set('is_active', active);

        const res = await apiCall(`/admin/users?${params}`);
        if (!res || !res.ok) return;
        const data = await res.json();

        const tbody = document.getElementById('tbody');
        document.querySelector('table').style.display = data.total ? '' : 'none';
        document.getElementById('emptyMsg').style.display = data.total ? 'none' : 'block';

        tbody.innerHTML = data.items.map(u => `
            <tr>
                <td><strong>${u.member_number}</strong><br><span style="font-size:11px;color:#9ca3af;">${u.email || '-'}</span></td>
                <td><span class="badge ${u.role === 'admin' ? 'badge-blue' : u.role === 'doctor' ? 'badge-green' : 'badge-gray'}">${ROLE_LABEL[u.role]||u.role}</span></td>
                <td><span class="badge ${u.is_active ? 'badge-green' : 'badge-red'}">${u.is_active ? '활성' : '비활성'}</span></td>
                <td>${formatDateTime(u.last_login_at)}</td>
                <td>${u.locked_until ? `<span style="color:#ef4444;font-size:12px;">${formatDateTime(u.locked_until)}까지</span>` : '-'}</td>
                <td>${formatDate(u.created_at)}</td>
                <td style="white-space:nowrap;">
                    <button class="btn btn-sm btn-secondary" onclick="openEdit('${u.user_id}','${u.email}','${u.role}')">수정</button>
                    ${u.is_active && u.user_id !== _currentUserId
                        ? `<button class="btn btn-sm btn-danger" style="margin-left:4px;" onclick="lockUser('${u.user_id}','${u.email}')">비활성화</button>`
                        : ''}
                </td>
            </tr>
        `).join('');
    }

    function openCreate() {
        _editUserId = null;
        document.getElementById('modalTitle').textContent = '계정 생성';
        document.getElementById('uMemberNumber').value = '';
        document.getElementById('uEmail').value    = '';
        document.getElementById('uPw').value       = '';
        document.getElementById('uRole').value     = 'nurse';
        document.getElementById('uDoctorId').value = '';
        document.getElementById('memberNumberGroup').style.display = '';
        document.getElementById('pwGroup').style.display = '';
        document.getElementById('doctorIdGroup').style.display = 'none';
        document.getElementById('modalStatus').style.display   = 'none';
        document.getElementById('userModal').classList.add('active');
    }

    function openEdit(userId, email, role) {
        _editUserId = userId;
        document.getElementById('modalTitle').textContent = '계정 수정';
        document.getElementById('uEmail').value    = email;
        document.getElementById('uRole').value     = role;
        document.getElementById('memberNumberGroup').style.display = 'none';
        document.getElementById('pwGroup').style.display        = 'none';
        document.getElementById('doctorIdGroup').style.display  = role === 'doctor' ? '' : 'none';
        document.getElementById('modalStatus').style.display    = 'none';
        document.getElementById('userModal').classList.add('active');
    }

    document.getElementById('uRole').addEventListener('change', function() {
        document.getElementById('doctorIdGroup').style.display = this.value === 'doctor' ? '' : 'none';
    });

    async function submitModal() {
        const btn   = document.getElementById('modalSubmitBtn');
        btn.disabled = true;

        const body = {
            email:     document.getElementById('uEmail').value.trim() || null,
            role:      document.getElementById('uRole').value,
            doctor_id: document.getElementById('uDoctorId').value.trim() || null,
        };

        let res;
        if (_editUserId) {
            res = await apiCall(`/admin/users/${_editUserId}`, { method: 'PATCH', body: JSON.stringify(body) });
        } else {
            const memberNumber = document.getElementById('uMemberNumber').value.trim();
            if (!memberNumber) { setStatus('modalStatus', '회원번호를 입력해주세요.', false); btn.disabled = false; return; }
            body.member_number = memberNumber;
            body.password = document.getElementById('uPw').value;
            res = await apiCall('/admin/users', { method: 'POST', body: JSON.stringify(body) });
        }

        if (res && (res.status === 200 || res.status === 201)) {
            setStatus('modalStatus', _editUserId ? '수정되었습니다.' : '계정이 생성되었습니다.', true);
            setTimeout(() => { closeModal(); loadUsers(); }, 1000);
        } else {
            const err = await res?.json().catch(() => ({}));
            setStatus('modalStatus', err.detail || '처리 중 오류가 발생했습니다.', false);
        }
        btn.disabled = false;
    }

    async function lockUser(userId, email) {
        if (!confirm(`${email} 계정을 비활성화하시겠습니까?\n(퇴사자 처리: 즉시 접근 차단)`)) return;
        const res = await apiCall(`/admin/users/${userId}/lock`, { method: 'PATCH' });
        if (res && res.ok) loadUsers();
        else alert('처리 중 오류가 발생했습니다.');
    }

    function closeModal() {
        document.getElementById('userModal').classList.remove('active');
    }

    (async () => {
        const me = await initPage();
        if (!me) return;
        if (me.role !== 'admin') { alert('관리자만 접근 가능합니다.'); location.href = '/index.html'; return; }
        _currentUserId = me.user_id;
        loadUsers();
    })();
</script>
</body>
</html>
