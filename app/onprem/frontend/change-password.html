<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 — MZ Clinic HIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1><i class="fas fa-hospital-alt" style="margin-right:6px;color:#6ee7b7;"></i>MZ Clinic HIS</h1>
            <p>온프레미스 내부망</p>
        </div>
        <nav id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div id="user-info"></div>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>로그아웃</button>
        </div>
    </aside>

    <main class="main-content">
        <h1 class="page-title">비밀번호 변경</h1>
        <p class="page-subtitle">비밀번호는 90일마다 변경이 필요합니다 (ISMS-P 2.5.3)</p>

        <div class="card" style="max-width:480px;">
            <div class="form-group">
                <label>현재 비밀번호</label>
                <input type="password" id="oldPw" class="form-control" placeholder="현재 비밀번호">
            </div>
            <div class="form-group">
                <label>새 비밀번호</label>
                <input type="password" id="newPw" class="form-control" placeholder="8자 이상, 2종류 이상">
            </div>
            <div class="form-group">
                <label>새 비밀번호 확인</label>
                <input type="password" id="newPwConfirm" class="form-control" placeholder="새 비밀번호 재입력">
            </div>
            <div id="statusMsg" style="display:none;"></div>
            <div style="display:flex;gap:8px;margin-top:18px;">
                <button class="btn btn-secondary" onclick="history.back()">취소</button>
                <button class="btn btn-primary" id="submitBtn" onclick="submit()">
                    <i class="fas fa-save" style="margin-right:6px;"></i>변경
                </button>
            </div>
        </div>
    </main>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    async function submit() {
        const oldPw   = document.getElementById('oldPw').value;
        const newPw   = document.getElementById('newPw').value;
        const confirm = document.getElementById('newPwConfirm').value;
        const btn     = document.getElementById('submitBtn');

        if (!oldPw || !newPw || !confirm) { setStatus('statusMsg', '모든 항목을 입력해주세요.', false); return; }
        if (newPw !== confirm)             { setStatus('statusMsg', '새 비밀번호가 일치하지 않습니다.', false); return; }

        btn.disabled    = true;
        btn.textContent = '변경 중...';

        const res = await apiCall('/auth/change-password', {
            method: 'POST',
            body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
        });

        if (res && res.status === 204) {
            setStatus('statusMsg', '비밀번호가 변경되었습니다. 다시 로그인해주세요.', true);
            setTimeout(() => { window.location.href = '/login.html'; }, 1500);
        } else {
            const err = await res?.json().catch(() => ({}));
            setStatus('statusMsg', err.detail || '변경 중 오류가 발생했습니다.', false);
        }

        btn.disabled    = false;
        btn.innerHTML   = '<i class="fas fa-save" style="margin-right:6px;"></i>변경';
    }

    initPage();
</script>
</body>
</html>
