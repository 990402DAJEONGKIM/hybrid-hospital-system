<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — MZ Clinic 온프레미스 HIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
            background: linear-gradient(160deg, #064e3b 0%, #065f46 50%, #047857 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .wrap { width: 100%; max-width: 400px; }
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,.12);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .logo-icon i { font-size: 22px; color: #6ee7b7; }
        .logo-title { font-size: 18px; font-weight: 800; color: #fff; }
        .logo-sub   { font-size: 10px; color: #6ee7b7; letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
        .security-notice {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .security-notice i  { color: #fcd34d; margin-top: 1px; flex-shrink: 0; font-size: 12px; }
        .security-notice p  { font-size: 12px; color: #d1fae5; line-height: 1.5; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 16px 48px rgba(0,0,0,.3);
        }
        .card h2  { font-size: 16px; font-weight: 800; color: #111827; margin-bottom: 4px; }
        .card p   { font-size: 12px; color: #6b7280; margin-bottom: 20px; }
        label     { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 5px; }
        .inp-wrap { position: relative; margin-bottom: 14px; }
        .inp-icon {
            position: absolute;
            left: 11px; top: 50%; transform: translateY(-50%);
            color: #9ca3af; font-size: 13px;
        }
        input[type=email], input[type=password] {
            width: 100%;
            padding: 10px 12px 10px 34px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #f9fafb;
            transition: border-color .15s, background .15s;
        }
        input:focus { border-color: #059669; background: #fff; }
        .error-box {
            display: none;
            padding: 10px 12px;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            font-size: 12px;
            color: #991b1b;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error-box.hidden { display: none !important; }
        .btn-login {
            width: 100%;
            padding: 11px;
            background: #059669;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-login:hover    { background: #047857; }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; }
        .footer-note { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-hospital-alt"></i></div>
        <div class="logo-title">MZ Clinic</div>
        <div class="logo-sub">온프레미스 HIS · 내부망 전용</div>
    </div>

    <div class="security-notice">
        <i class="fas fa-exclamation-triangle"></i>
        <p><strong>보안 공지:</strong> 본 시스템은 병원 내부 인가 직원만 접근 가능합니다. 모든 접근 및 조회는 감사 로그에 기록됩니다.</p>
    </div>

    <div class="card">
        <h2>직원 로그인</h2>
        <p>사번 이메일과 비밀번호를 입력하세요.</p>

        <form id="loginForm">
            <label>사번 이메일</label>
            <div class="inp-wrap">
                <i class="fas fa-id-card inp-icon"></i>
                <input type="email" id="loginEmail" placeholder="staff@clinic.local" required autocomplete="username">
            </div>
            <label>비밀번호</label>
            <div class="inp-wrap">
                <i class="fas fa-lock inp-icon"></i>
                <input type="password" id="loginPw" required autocomplete="current-password">
            </div>

            <div class="error-box hidden" id="errBox">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errMsg"></span>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                <i class="fas fa-sign-in-alt" style="margin-right:6px;"></i>로그인
            </button>
        </form>

        <p class="footer-note" style="margin-top:16px;border-top:1px solid #f3f4f6;padding-top:12px;">
            계정 발급 및 비밀번호 초기화는 IT 관리자에게 문의하세요.<br>
            로그인 5회 실패 시 계정이 잠깁니다.
        </p>
    </div>
    <p class="footer-note">모든 접근은 ISMS-P 2.9.1 감사 로그에 기록됩니다.</p>
</div>

<script src="/js/config.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email  = document.getElementById('loginEmail').value.trim();
        const pw     = document.getElementById('loginPw').value;
        const errBox = document.getElementById('errBox');
        const errMsg = document.getElementById('errMsg');
        const btn    = document.getElementById('submitBtn');

        errBox.classList.add('hidden');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>확인 중...';

        try {
            const res = await fetch(`${BASE_URL}/auth/login`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password: pw }),
            });
            const data = await res.json();

            if (res.ok) {
                const meRes = await fetch(`${BASE_URL}/auth/me`, { credentials: 'include' });
                const me    = await meRes.json();
                window.location.href = me.password_expired ? '/change-password.html' : '/index.html';
            } else {
                errMsg.textContent = data.detail || '로그인 중 오류가 발생했습니다.';
                errBox.classList.remove('hidden');
            }
        } catch {
            errMsg.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도하세요.';
            errBox.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:6px;"></i>로그인';
        }
    });
</script>
</body>
</html>
