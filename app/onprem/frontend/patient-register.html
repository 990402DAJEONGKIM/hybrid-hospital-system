<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환자 등록 — MZ Clinic HIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1><i class="fas fa-hospital-alt" style="margin-right:6px;color:#6ee7b7;"></i>MZ Clinic HIS</h1>
            <p>온프레미스 내부망</p>
        </div>
        <nav id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div id="user-info"></div>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>로그아웃</button>
        </div>
    </aside>

    <main class="main-content">
        <h1 class="page-title">환자 등록</h1>
        <p class="page-subtitle">원무과 담당자가 신규 환자를 등록합니다. 등록 완료 후 회원번호와 초기 비밀번호를 환자에게 전달하세요.</p>

        <div class="card" style="max-width:600px;">
            <div class="card-title">신규 환자 정보 입력</div>

            <form id="registerForm">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
                    <div>
                        <label class="form-label">환자 이름 <span style="color:#dc2626;">*</span></label>
                        <input type="text" id="patientName" class="form-control" placeholder="홍길동" required>
                    </div>
                    <div>
                        <label class="form-label">생년월일 <span style="color:#dc2626;">*</span></label>
                        <input type="date" id="birthDate" class="form-control" required>
                    </div>
                    <div>
                        <label class="form-label">성별 <span style="color:#dc2626;">*</span></label>
                        <select id="genderCode" class="form-control" required>
                            <option value="">선택</option>
                            <option value="M">남</option>
                            <option value="F">여</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">연락처 <span style="color:#dc2626;">*</span></label>
                        <input type="text" id="phoneNumber" class="form-control" placeholder="010-0000-0000" required>
                    </div>
                </div>

                <div style="margin-bottom:14px;">
                    <label class="form-label">이메일 (선택)</label>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com">
                </div>

                <div style="margin-bottom:14px;">
                    <label class="form-label">주민등록번호 (선택)</label>
                    <input type="text" id="nationalId" class="form-control" placeholder="주민등록번호 (암호화 저장)">
                </div>

                <div style="margin-bottom:20px;">
                    <label class="form-label">주소 (선택)</label>
                    <input type="text" id="address" class="form-control" placeholder="주소 입력">
                </div>

                <div id="errBox" style="display:none;padding:10px 12px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;font-size:13px;color:#991b1b;margin-bottom:14px;">
                    <i class="fas fa-exclamation-circle" style="margin-right:6px;"></i><span id="errMsg"></span>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;">
                    <i class="fas fa-user-plus" style="margin-right:6px;"></i>환자 등록
                </button>
            </form>
        </div>

        <!-- 등록 완료 결과 -->
        <div class="card" id="resultCard" style="max-width:600px;display:none;border:2px solid #059669;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
                <div style="width:36px;height:36px;border-radius:50%;background:#059669;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <i class="fas fa-check" style="color:#fff;font-size:16px;"></i>
                </div>
                <div class="card-title" style="margin:0;">환자 등록 완료</div>
            </div>

            <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:16px;font-size:14px;line-height:2;">
                <div style="display:flex;gap:8px;margin-bottom:6px;">
                    <span style="color:#6b7280;min-width:90px;">회원번호</span>
                    <strong id="resultMemberNumber" style="font-size:18px;color:#059669;letter-spacing:.05em;"></strong>
                </div>
                <div style="display:flex;gap:8px;margin-bottom:6px;">
                    <span style="color:#6b7280;min-width:90px;">초기 비밀번호</span>
                    <strong id="resultInitialPw" style="font-size:18px;letter-spacing:.05em;"></strong>
                    <span style="color:#9ca3af;font-size:12px;align-self:center;">(생년월일)</span>
                </div>
                <div style="display:flex;gap:8px;">
                    <span style="color:#6b7280;min-width:90px;">접수번호</span>
                    <span id="resultInternalSeq"></span>
                </div>
            </div>

            <div style="margin-top:12px;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e;">
                <i class="fas fa-exclamation-triangle" style="margin-right:6px;"></i>
                위 정보를 환자에게 직접 전달하세요. 첫 로그인 시 비밀번호 변경이 필요합니다.
            </div>

            <div style="margin-top:16px;display:flex;gap:10px;">
                <button class="btn btn-primary" onclick="resetForm()">
                    <i class="fas fa-user-plus" style="margin-right:5px;"></i>다음 환자 등록
                </button>
            </div>
        </div>
    </main>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    (async () => {
        const me = await initPage();
        if (!me) return;
        if (!['nurse', 'admin'].includes(me.role)) {
            alert('환자 등록 권한이 없습니다.');
            window.location.href = '/index.html';
        }
    })();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name    = document.getElementById('patientName').value.trim();
        const birth   = document.getElementById('birthDate').value;
        const gender  = document.getElementById('genderCode').value;
        const phone   = document.getElementById('phoneNumber').value.trim();
        const email   = document.getElementById('email').value.trim();
        const natId   = document.getElementById('nationalId').value.trim();
        const address = document.getElementById('address').value.trim();

        const errBox = document.getElementById('errBox');
        const errMsg = document.getElementById('errMsg');
        errBox.style.display = 'none';

        if (!name || !birth || !gender || !phone) {
            errMsg.textContent = '필수 항목을 모두 입력해주세요.';
            errBox.style.display = 'block';
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>등록 중...';

        const body = {
            patient_name:  name,
            birth_date:    birth,
            gender_code:   gender,
            phone_number:  phone,
        };
        if (email)   body.email = email;
        if (natId)   body.national_id_encrypted = natId;
        if (address) body.address = address;

        try {
            const res = await apiCall('/portal/patients', {
                method: 'POST',
                body: JSON.stringify(body),
            });

            if (!res) return;

            if (res.ok) {
                const data = await res.json();
                document.getElementById('resultMemberNumber').textContent = data.member_number;
                document.getElementById('resultInitialPw').textContent    = data.initial_password;
                document.getElementById('resultInternalSeq').textContent  = data.internal_seq;

                document.getElementById('registerForm').closest('.card').style.display = 'none';
                document.getElementById('resultCard').style.display = '';
            } else {
                const err = await res.json().catch(() => ({}));
                errMsg.textContent = err.detail || '등록 중 오류가 발생했습니다.';
                errBox.style.display = 'block';
            }
        } catch {
            errMsg.textContent = '서버에 연결할 수 없습니다.';
            errBox.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:6px;"></i>환자 등록';
        }
    });

    function resetForm() {
        document.getElementById('registerForm').reset();
        document.getElementById('errBox').style.display = 'none';
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('registerForm').closest('.card').style.display = '';
    }
</script>
</body>
</html>
