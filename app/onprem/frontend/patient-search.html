<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환자 검색 — MZ Clinic HIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1><i class="fas fa-hospital-alt" style="margin-right:6px;color:#6ee7b7;"></i>MZ Clinic HIS</h1>
            <p>온프레미스 내부망</p>
        </div>
        <nav id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div id="user-info"></div>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>로그아웃</button>
        </div>
    </aside>

    <main class="main-content">
        <h1 class="page-title">환자 검색 / 조회</h1>
        <p class="page-subtitle">이름 또는 연락처로 환자를 검색합니다. 모든 조회는 감사 로그에 기록됩니다.</p>

        <div class="card">
            <div class="search-bar">
                <input type="text" id="searchName"  class="form-control" placeholder="환자 이름" style="max-width:200px;">
                <input type="text" id="searchPhone" class="form-control" placeholder="연락처 (일부)" style="max-width:180px;">
                <button class="btn btn-primary" onclick="search()">
                    <i class="fas fa-search" style="margin-right:5px;"></i>검색
                </button>
            </div>

            <div class="table-wrap">
                <table id="patientTable">
                    <thead>
                        <tr>
                            <th>환자명</th>
                            <th>생년월일</th>
                            <th>성별</th>
                            <th>연락처</th>
                            <th>등록일</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div id="emptyMsg" style="display:none;text-align:center;padding:32px;color:#9ca3af;font-size:13px;">
                <i class="fas fa-search" style="font-size:24px;margin-bottom:8px;display:block;"></i>
                검색어를 입력하고 검색 버튼을 누르세요.
            </div>
        </div>

        <!-- 환자 상세 모달 -->
        <div class="modal-backdrop" id="detailModal">
            <div class="modal" style="max-width:680px;">
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 class="modal-title" id="modalPatientName">환자 상세</h3>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;font-size:13px;" id="modalBasicInfo"></div>

                <div style="display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid #e5e7eb;padding-bottom:10px;">
                    <button class="btn btn-sm" id="tabEncounters" onclick="switchTab('encounters')" style="background:#059669;color:#fff;">진료이력</button>
                    <button class="btn btn-sm btn-secondary" id="tabDiagnoses"  onclick="switchTab('diagnoses')">진단</button>
                    <button class="btn btn-sm btn-secondary" id="tabAllergies" onclick="switchTab('allergies')">알레르기</button>
                    <button class="btn btn-sm btn-secondary" id="tabNotes"     onclick="switchTab('notes')">임상노트</button>
                </div>

                <div id="tabContent" style="min-height:120px;font-size:13px;"></div>
            </div>
        </div>
    </main>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    let _currentPatientId = null;
    let _currentRole      = null;

    async function search() {
        const name  = document.getElementById('searchName').value.trim();
        const phone = document.getElementById('searchPhone').value.trim();
        if (!name && !phone) { alert('이름 또는 연락처를 입력해주세요.'); return; }

        const params = new URLSearchParams();
        if (name)  params.set('name',  name);
        if (phone) params.set('phone', phone);

        const res = await apiCall(`/portal/patients?${params}`);
        if (!res || !res.ok) return;
        const data = await res.json();

        const tbody = document.getElementById('tbody');
        const empty = document.getElementById('emptyMsg');
        document.getElementById('patientTable').style.display = data.total ? '' : 'none';
        empty.style.display = data.total ? 'none' : 'block';
        if (!data.total) { empty.textContent = '검색 결과가 없습니다.'; return; }

        const GENDER = { M: '남', F: '여', U: '미상' };
        tbody.innerHTML = data.items.map(p => `
            <tr>
                <td><strong>${p.patient_name}</strong></td>
                <td>${formatDate(p.birth_date)}</td>
                <td>${GENDER[p.gender_code] || p.gender_code}</td>
                <td>${p.phone_number || '-'}</td>
                <td>${formatDate(p.created_at)}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="openDetail('${p.patient_id}','${p.patient_name}')">
                        <i class="fas fa-folder-open"></i> 상세
                    </button>
                </td>
            </tr>
        `).join('');
    }

    async function openDetail(patientId, patientName) {
        _currentPatientId = patientId;
        document.getElementById('modalPatientName').textContent = `환자: ${patientName}`;

        const res = await apiCall(`/portal/patients/${patientId}`);
        if (!res || !res.ok) return;
        const p = await res.json();

        const GENDER = { M: '남', F: '여', U: '미상' };
        document.getElementById('modalBasicInfo').innerHTML = [
            ['생년월일', formatDate(p.birth_date)],
            ['성별', GENDER[p.gender_code] || p.gender_code],
            ['연락처', p.phone_number || '-'],
            ['등록일', formatDate(p.created_at)],
        ].map(([k, v]) => `
            <div style="background:#f9fafb;border-radius:6px;padding:8px 10px;">
                <div style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:2px;">${k}</div>
                <div style="font-weight:700;">${v}</div>
            </div>
        `).join('');

        document.getElementById('detailModal').classList.add('active');
        switchTab('encounters');
    }

    async function switchTab(tab) {
        ['encounters','diagnoses','allergies','notes'].forEach(t => {
            const btn = document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`);
            if (btn) btn.style.cssText = t === tab ? 'background:#059669;color:#fff;' : '';
        });

        const box = document.getElementById('tabContent');
        box.innerHTML = '<div style="color:#9ca3af;padding:12px;">불러오는 중...</div>';

        const endpoints = {
            encounters: `/portal/patients/${_currentPatientId}/encounters`,
            diagnoses:  `/portal/patients/${_currentPatientId}/diagnoses`,
            allergies:  `/portal/patients/${_currentPatientId}/allergies`,
            notes:      `/portal/patients/${_currentPatientId}/clinical-notes`,
        };

        const res = await apiCall(endpoints[tab]);
        if (!res) return;

        if (res.status === 403) {
            box.innerHTML = '<div style="color:#dc2626;padding:12px;"><i class="fas fa-lock" style="margin-right:6px;"></i>이 탭은 의사 권한이 필요합니다.</div>';
            return;
        }
        if (!res.ok) { box.innerHTML = '<div style="color:#dc2626;padding:12px;">불러오기 실패</div>'; return; }

        const data = await res.json();
        if (!data.length) { box.innerHTML = '<div style="color:#9ca3af;padding:12px;">데이터가 없습니다.</div>'; return; }

        if (tab === 'encounters') {
            box.innerHTML = data.map(e => `
                <div style="border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                        <strong>${e.encounter_type || '-'}</strong>
                        <span class="badge ${e.status_code === 'closed' ? 'badge-green' : 'badge-blue'}">${e.status_code}</span>
                    </div>
                    <div style="font-size:12px;color:#6b7280;">
                        ${e.department_code || '-'} · ${e.doctor_name || '미배정'} · ${formatDateTime(e.visit_datetime)}
                    </div>
                    ${e.chief_complaint ? `<div style="margin-top:6px;font-size:12px;background:#f9fafb;padding:6px 8px;border-radius:4px;">${e.chief_complaint}</div>` : ''}
                </div>
            `).join('');
        } else if (tab === 'diagnoses') {
            box.innerHTML = `<table style="width:100%;font-size:12px;"><thead><tr><th>진단코드</th><th>진단내용</th><th>주진단</th></tr></thead><tbody>
                ${data.map(d => `<tr><td>${d.diagnosis_code||'-'}</td><td>${d.diagnosis_text||'-'}</td><td>${d.is_primary ? '✓' : ''}</td></tr>`).join('')}
            </tbody></table>`;
        } else if (tab === 'allergies') {
            box.innerHTML = data.map(a => `
                <div style="display:flex;justify-content:space-between;padding:8px 10px;background:#f9fafb;border-radius:6px;margin-bottom:6px;font-size:12px;">
                    <span><strong>${a.allergy_name}</strong> <span style="color:#9ca3af;">(${a.allergy_code||'코드없음'})</span></span>
                    <span class="badge ${a.severity_code === 'HIGH' ? 'badge-red' : a.severity_code === 'MEDIUM' ? 'badge-yellow' : 'badge-gray'}">${a.severity_code||'-'}</span>
                </div>
            `).join('');
        } else if (tab === 'notes') {
            box.innerHTML = data.map(n => `
                <div style="border-left:3px solid #059669;padding:8px 12px;margin-bottom:10px;background:#f0fdf4;border-radius:0 6px 6px 0;">
                    <div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">${formatDateTime(n.created_at)}</div>
                    <div style="font-size:13px;white-space:pre-wrap;">${n.note_content}</div>
                </div>
            `).join('');
        }
    }

    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
        _currentPatientId = null;
    }

    document.getElementById('searchName').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });
    document.getElementById('searchPhone').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

    (async () => {
        const me = await initPage();
        if (!me) return;
        _currentRole = me.role;

        const pendingId = sessionStorage.getItem('openPatient');
        if (pendingId) {
            sessionStorage.removeItem('openPatient');
            const r = await apiCall(`/portal/patients/${pendingId}`);
            if (r && r.ok) {
                const p = await r.json();
                await openDetail(pendingId, p.patient_name);
            }
        }
    })();
</script>
</body>
</html>
