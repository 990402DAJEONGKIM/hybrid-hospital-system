<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수술 전 예약 - MZ Clinic</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .appt-form-wrap { max-width:560px; margin:100px auto 40px; padding:0 16px; }
        .step-indicator { display:flex; gap:8px; margin-bottom:28px; }
        .step-dot { flex:1; height:4px; border-radius:2px; background:#e0e0e0; }
        .step-dot.active { background:var(--primary); }
        .step-panel { display:none; }
        .step-panel.active { display:block; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-weight:600; margin-bottom:6px; font-size:14px; color:#546e7a; }
        .form-group select, .form-group input { width:100%; padding:10px 12px; border:1px solid #cfd8dc; border-radius:6px; font-size:15px; box-sizing:border-box; }
        .form-group select:focus, .form-group input:focus { outline:none; border-color:var(--primary); }
        .btn-row { display:flex; gap:10px; margin-top:24px; }
        .btn-primary { flex:1; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; }
        .btn-primary:disabled { background:#b0bec5; cursor:not-allowed; }
        .btn-secondary { flex:1; padding:12px; background:#eceff1; color:#546e7a; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; }
        .confirm-box { background:#e3f2fd; border-radius:8px; padding:18px; font-size:14px; line-height:1.9; }
        .confirm-box strong { color:var(--primary); }
        .info-note { background:#fff8e1; border-radius:6px; padding:10px 14px; font-size:13px; color:#795548; margin-bottom:18px; }
        #errMsg { color:#e53935; font-size:13px; margin-top:8px; min-height:18px; }
    </style>
</head>
<body style="margin:0;">
<div class="portal-layout">
<aside class="portal-sidebar" id="portalSidebar"></aside>
<main class="portal-content">
<div class="appt-form-wrap" style="margin:0;max-width:560px;">
    <h2 style="margin-bottom:8px;">수술 전 예약</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:12px;">수술 전 필수 검사 및 일정 확인 예약입니다.</p>

    <!-- 환자 안전 요약 (비식별) — 로드 후 표시 -->
    <div id="safetySummary" style="display:none;margin-bottom:18px;padding:12px 14px;background:#fff8e1;border-radius:8px;border-left:4px solid #f9a825;font-size:13px;">
        <div style="font-weight:700;color:#e65100;margin-bottom:6px;"><i class="fas fa-shield-alt" style="margin-right:6px;"></i>환자 안전 요약</div>
        <div id="safetySummaryBody"></div>
    </div>

    <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
    </div>

    <!-- Step 1: 진료과 / 의사 선택 -->
    <div class="step-panel active" id="step1">
        <h3 style="margin-bottom:14px;">1. 진료과 및 의사 선택</h3>
        <div class="info-note">수술 전 예약은 해당 진료과에 이전 내원 이력이 있어야 신청 가능합니다.</div>
        <div class="form-group">
            <label for="deptSelect">진료과 *</label>
            <select id="deptSelect">
                <option value="">진료과를 선택하세요</option>
            </select>
        </div>
        <div class="form-group">
            <label for="doctorSelect">담당의 (선택)</label>
            <select id="doctorSelect" disabled>
                <option value="">진료과를 먼저 선택하세요</option>
            </select>
        </div>
        <div class="btn-row">
            <button class="btn-secondary" onclick="location.href='appointment.html'">뒤로</button>
            <button class="btn-primary" id="toStep2Btn" onclick="goToStep(2)" disabled>다음</button>
        </div>
    </div>

    <!-- Step 2: 날짜 / 시간 -->
    <div class="step-panel" id="step2">
        <h3 style="margin-bottom:18px;">2. 날짜 및 시간 선택</h3>
        <div class="form-group">
            <label for="apptDate">예약 날짜 *</label>
            <input type="date" id="apptDate">
        </div>
        <div class="form-group">
            <label for="apptTime">예약 시간 *</label>
            <select id="apptTime">
                <option value="09:00">09:00</option>
                <option value="09:30">09:30</option>
                <option value="10:00">10:00</option>
                <option value="10:30">10:30</option>
                <option value="11:00">11:00</option>
                <option value="11:30">11:30</option>
                <option value="14:00">14:00</option>
                <option value="14:30">14:30</option>
                <option value="15:00">15:00</option>
                <option value="15:30">15:30</option>
                <option value="16:00">16:00</option>
            </select>
        </div>
        <div class="btn-row">
            <button class="btn-secondary" onclick="goToStep(1)">뒤로</button>
            <button class="btn-primary" onclick="goToStep(3)">다음</button>
        </div>
    </div>

    <!-- Step 3: 확인 -->
    <div class="step-panel" id="step3">
        <h3 style="margin-bottom:18px;">3. 예약 정보 확인</h3>
        <div class="confirm-box" id="confirmBox"></div>
        <!-- 사전 검사 항목 -->
        <div id="preExamBox" style="display:none;margin-top:14px;padding:12px 14px;background:#e3f2fd;border-radius:8px;font-size:13px;">
            <div style="font-weight:700;color:#1565c0;margin-bottom:6px;"><i class="fas fa-clipboard-list" style="margin-right:6px;"></i>수술 전 필수 사전 검사</div>
            <ul id="preExamList" style="margin:0;padding-left:18px;color:#263238;line-height:1.8;"></ul>
            <p style="margin:8px 0 0;font-size:12px;color:#546e7a;">* 예약 확정 후 원무과에서 상세 일정을 안내드립니다.</p>
        </div>
        <div id="errMsg"></div>
        <div class="btn-row" style="margin-top:20px;">
            <button class="btn-secondary" onclick="goToStep(2)">수정</button>
            <button class="btn-primary" id="submitBtn" onclick="submitAppointment()">예약 확정</button>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
<script>
    let selectedDept = null, selectedDoctor = null;
    let preSurgeryCtx = null;

    const SEV_LABEL = { HIGH: '높음', MEDIUM: '보통', LOW: '낮음', UNKNOWN: '미분류' };
    const SEV_COLOR = { HIGH: '#e53935', MEDIUM: '#fb8c00', LOW: '#43a047', UNKNOWN: '#78909c' };

    async function loadSafetyContext(deptCode) {
        const qs = deptCode ? `?department_code=${deptCode}` : '';
        const res = await apiCall(`/portal/pre-surgery-context${qs}`);
        if (!res || !res.ok) return;
        preSurgeryCtx = await res.json();

        const box  = document.getElementById('safetySummary');
        const body = document.getElementById('safetySummaryBody');
        const lines = [];

        const sev = preSurgeryCtx.allergy_severity_summary || {};
        if (Object.keys(sev).length > 0) {
            const sevParts = Object.entries(sev).map(([k, v]) =>
                `<span style="color:${SEV_COLOR[k] || '#263238'};font-weight:700;">${SEV_LABEL[k] || k} ${v}건</span>`
            ).join(', ');
            lines.push(`<i class="fas fa-exclamation-circle" style="margin-right:4px;color:#f57c00;"></i>알레르기: ${sevParts}`);
        } else {
            lines.push('<i class="fas fa-check-circle" style="margin-right:4px;color:#43a047;"></i>알레르기: 없음');
        }

        if (preSurgeryCtx.surgery_count > 0) {
            lines.push(`<i class="fas fa-procedures" style="margin-right:4px;color:#1976d2;"></i>수술 이력: ${preSurgeryCtx.surgery_count}건 (최근: ${preSurgeryCtx.last_surgery_date})`);
        } else {
            lines.push('<i class="fas fa-check-circle" style="margin-right:4px;color:#43a047;"></i>수술 이력: 없음');
        }

        body.innerHTML = lines.join('<br>');
        box.style.display = 'block';
    }

    async function init() {
        const me = await requireLogin();
        if (!me) return;

        document.getElementById('apptDate').min = new Date().toISOString().split('T')[0];
        loadSafetyContext(null);

        const r = await apiCall('/portal/departments?visited_only=true');
        if (!r || !r.ok) return;
        const depts = await r.json();
        const deptSel = document.getElementById('deptSelect');
        if (!depts.length) {
            deptSel.innerHTML = '<option value="">내원 이력이 없습니다</option>';
            document.getElementById('toStep2Btn').disabled = true;
            return;
        }
        depts.forEach(d => {
            const o = document.createElement('option');
            o.value = d.department_code;
            o.textContent = d.department_name;
            deptSel.appendChild(o);
        });

        deptSel.addEventListener('change', async () => {
            const code = deptSel.value;
            selectedDept = depts.find(d => d.department_code === code) || null;
            document.getElementById('toStep2Btn').disabled = !code;
            const docSel = document.getElementById('doctorSelect');
            docSel.innerHTML = '<option value="">담당의 선택 안함 (배정)</option>';
            docSel.disabled = !code;
            if (!code) return;
            loadSafetyContext(code);
            const dr = await apiCall(`/portal/doctors?department_code=${code}`);
            if (!dr || !dr.ok) return;
            const docs = await dr.json();
            docs.forEach(d => {
                const o = document.createElement('option');
                o.value = d.doctor_id;
                o.textContent = d.doctor_name;
                docSel.appendChild(o);
            });
        });

        document.getElementById('doctorSelect').addEventListener('change', (e) => {
            const docSel = e.target;
            selectedDoctor = docSel.value
                ? { doctor_id: docSel.value, doctor_name: docSel.options[docSel.selectedIndex].text }
                : null;
        });
    }

    function goToStep(step) {
        if (step === 2) {
            if (!document.getElementById('deptSelect').value) {
                alert('진료과를 선택해주세요.');
                return;
            }
        }
        if (step === 3) {
            const date = document.getElementById('apptDate').value;
            if (!date) { alert('예약 날짜를 선택해주세요.'); return; }
            const time    = document.getElementById('apptTime').value;
            const deptName = document.getElementById('deptSelect').options[document.getElementById('deptSelect').selectedIndex]?.text || '';
            const deptCode = document.getElementById('deptSelect').value;
            const docName  = selectedDoctor ? selectedDoctor.doctor_name : '미지정 (배정)';
            document.getElementById('confirmBox').innerHTML =
                `<strong>예약 유형</strong>: 수술 전<br>
                 <strong>진료과</strong>: ${deptName}<br>
                 <strong>담당의</strong>: ${docName}<br>
                 <strong>날짜</strong>: ${date}<br>
                 <strong>시간</strong>: ${time}`;
            document.getElementById('errMsg').textContent = '';

            // 사전 검사 항목 표시
            const ctx = preSurgeryCtx;
            if (ctx && ctx.pre_exam_requirements && ctx.pre_exam_requirements.length > 0) {
                const list = document.getElementById('preExamList');
                list.innerHTML = ctx.pre_exam_requirements.map(e => `<li>${e}</li>`).join('');
                document.getElementById('preExamBox').style.display = 'block';
            } else {
                // context가 아직 없으면 진료과 기준으로 다시 조회
                if (deptCode) {
                    apiCall(`/portal/pre-surgery-context?department_code=${deptCode}`)
                        .then(r => r && r.ok ? r.json() : null)
                        .then(data => {
                            if (data && data.pre_exam_requirements && data.pre_exam_requirements.length > 0) {
                                preSurgeryCtx = data;
                                const list = document.getElementById('preExamList');
                                list.innerHTML = data.pre_exam_requirements.map(e => `<li>${e}</li>`).join('');
                                document.getElementById('preExamBox').style.display = 'block';
                            }
                        });
                }
            }
        }
        [1, 2, 3].forEach(i => {
            document.getElementById(`step${i}`).classList.toggle('active', i === step);
            document.getElementById(`dot${i}`).classList.toggle('active', i <= step);
        });
    }

    async function submitAppointment() {
        const btn = document.getElementById('submitBtn');
        _setBtnLoading(btn, true);
        document.getElementById('errMsg').textContent = '';

        const body = {
            type_code:        'pre_surgery',
            department_code:  document.getElementById('deptSelect').value,
            appointment_date: document.getElementById('apptDate').value,
            appointment_time: document.getElementById('apptTime').value,
        };
        if (selectedDoctor) body.doctor_id = selectedDoctor.doctor_id;

        const res = await apiCall('/portal/appointments', {
            method: 'POST',
            body: JSON.stringify(body),
        });

        if (res && res.ok) {
            alert('수술 전 예약이 접수되었습니다.\n원무과 확정 후 알림을 보내드립니다.');
            location.href = 'my-appointments.html';
        } else {
            const err = await res?.json().catch(() => ({}));
            document.getElementById('errMsg').textContent = err.detail || '예약 처리 중 오류가 발생했습니다.';
            _setBtnLoading(btn, false, '예약 확정');
        }
    }

    renderSidebar('appointment.html');
    init();
</script>
</main>
</div>
</body>
</html>
