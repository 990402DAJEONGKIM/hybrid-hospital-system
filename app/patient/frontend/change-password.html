<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - 김이박 클리닉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            min-height: 100vh;
        }
        .card { box-shadow: 0 8px 40px rgba(59, 130, 246, 0.12); }
        .submit-btn {
            background: linear-gradient(90deg, #2563eb, #06b6d4);
            transition: opacity 0.2s;
        }
        .submit-btn:hover { opacity: 0.9; }
    </style>
</head>
<body style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1rem;">

    <div class="w-full max-w-md">

        <!-- 로고 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4">
                <i class="fas fa-key text-2xl text-blue-500"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">김이박 클리닉</h1>
            <p class="text-sm text-blue-500 mt-1 font-medium">비밀번호 변경</p>
        </div>

        <!-- 카드 -->
        <div class="card bg-white rounded-2xl p-8">

            <!-- 보안 안내 -->
            <div class="flex items-start gap-3 bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 mb-6">
                <i class="fas fa-shield-alt text-blue-400 mt-0.5 flex-shrink-0"></i>
                <p class="text-xs text-blue-700 leading-relaxed">
                    보안을 위해 <strong>90일마다</strong> 비밀번호 변경을 권고합니다.<br>
                    8자 이상, 영문·숫자·특수문자 조합으로 입력해주세요.
                </p>
            </div>

            <form id="changePwdForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">현재 비밀번호</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-lock text-sm"></i>
                        </span>
                        <input type="password" id="old_password" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none bg-gray-50 focus:bg-white transition">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-lock-open text-sm"></i>
                        </span>
                        <input type="password" id="new_password" required placeholder="8자 이상, 영문/숫자/특수문자 조합"
                            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none bg-gray-50 focus:bg-white transition">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호 확인</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-check-circle text-sm"></i>
                        </span>
                        <input type="password" id="confirm_password" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none bg-gray-50 focus:bg-white transition">
                    </div>
                </div>

                <div id="apiError" class="hidden p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 flex items-center gap-2">
                    <i class="fas fa-exclamation-circle flex-shrink-0"></i>
                    <span id="apiErrorMsg"></span>
                </div>

                <button type="submit" id="submitBtn"
                    class="submit-btn w-full text-white py-3 rounded-xl font-bold disabled:opacity-50 disabled:cursor-not-allowed">
                    비밀번호 변경 및 재로그인
                </button>
            </form>

            <div class="mt-5 text-center text-sm text-gray-500">
                <a href="login.html" class="text-blue-500 hover:underline">
                    <i class="fas fa-arrow-left mr-1"></i>로그인으로 돌아가기
                </a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('changePwdForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const old_pw    = document.getElementById('old_password').value;
            const new_pw    = document.getElementById('new_password').value;
            const confirm   = document.getElementById('confirm_password').value;
            const errorBox  = document.getElementById('apiError');
            const errorMsg  = document.getElementById('apiErrorMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorBox.classList.add('hidden');

            if (new_pw !== confirm) {
                errorMsg.textContent = '새 비밀번호가 일치하지 않습니다.';
                errorBox.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '변경 중...';

            try {
                const res = await fetch(`${BASE_URL}/auth/change-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ old_password: old_pw, new_password: new_pw }),
                });

                if (res.ok) {
                    alert('비밀번호가 변경되었습니다. 다시 로그인해 주세요.');
                    location.href = 'login.html';
                } else {
                    const data = await res.json();
                    errorMsg.textContent = data.detail || '변경 중 오류가 발생했습니다.';
                    errorBox.classList.remove('hidden');
                }
            } catch {
                errorMsg.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
                errorBox.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '비밀번호 변경 및 재로그인';
            }
        });
    </script>
</body>
</html>
