<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김이박 클리닉 - 환자 포털</title>
    <link rel="stylesheet" href="css/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/script.js" defer></script>
</head>

<body>
    <header class="sass-header">
        <div class="sass-announcement">
            <div class="sass-announcement-content">
                무료 건강검진: 무료 건강검진을 제공합니다!
            </div>
        </div>

        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="#" class="sass-logo">
                    <i class="fas fa-heartbeat mr-2"></i>
                    <span>김이박 클리닉</span>
                </a>

                <nav class="hidden md:block">
                    <ul class="flex items-center space-x-4">
                        <li><a href="#" id="nav-home" class="sass-nav-link">홈</a></li>
                        <li class="sass-dropdown">
                            <a href="#" class="sass-nav-link">진료과 <i class="fas fa-chevron-down text-xs"></i></a>
                            <div class="sass-dropdown-content" id="deptDropdown">
                                <a href="#" class="sass-dropdown-link text-gray-400">불러오는 중...</a>
                            </div>
                        </li>
                        <li class="sass-dropdown">
                            <a href="#" class="sass-nav-link">환자 <i class="fas fa-chevron-down text-xs"></i></a>
                            <div class="sass-dropdown-content">
                                <a href="#" id="nav-new-appointment" class="sass-dropdown-link">예약</a>
                                <a href="#" id="nav-manage-appointments" class="sass-dropdown-link">예약조회 및 변경</a>
                                <a href="#" id="nav-my-records" class="sass-dropdown-link">진료기록</a>
                                <a href="#" id="nav-mypage" class="sass-dropdown-link">내 정보</a>
                                <a href="#" id="nav-change-password" class="sass-dropdown-link">비밀번호 변경</a>
                            </div>
                        </li>
                        <li id="userWelcomeItem" class="hidden flex items-center"><span id="userWelcome" class="text-sm font-semibold text-gray-700 mr-2"></span></li>
                        <li><button id="logoutBtn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-full font-bold hover:bg-gray-300 transition-colors hidden">로그아웃</button></li>
                        <li id="nav-login-btn-wrap" class="hidden"><a href="login.html" class="sass-appointment-btn" style="background:#2563eb;color:#fff;padding:8px 20px;border-radius:20px;font-weight:700;text-decoration:none;">로그인</a></li>
                    </ul>
                </nav>

                <button class="md:hidden text-2xl" id="sassMobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            </div>
        </div>
    </header>

    <div class="sass-overlay" id="sassOverlay"></div>
    <div class="sass-mobile-menu" id="sassMobileMenu">
        <div class="flex justify-end">
            <button id="sassMobileMenuClose" class="text-2xl">&times;</button>
        </div>
        <nav class="flex flex-col space-y-4 mt-8">
            <a href="#" id="mobile-nav-home" class="text-lg font-medium">홈</a>
            <a href="#" class="text-lg font-medium">진료과</a>
            <a href="#" class="text-lg font-medium">환자</a>
        </nav>
    </div>

    <main class="pt-36 pb-4 px-6 w-full main-content" style="max-width:100%;">

        <!-- 미로그인 랜딩 섹션 -->
        <section id="landing-section" class="hidden">
            <div class="text-center py-20">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-100 mb-6">
                    <i class="fas fa-heartbeat text-4xl text-blue-500"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-4">김이박 클리닉에 오신 것을 환영합니다</h2>
                <p class="text-gray-500 mb-8 text-lg">편리한 예약 서비스를 이용하려면 로그인해주세요.</p>
                <div class="flex justify-center gap-4">
                    <a href="login.html" class="inline-block px-8 py-3 rounded-full font-bold text-white text-lg" style="background:linear-gradient(90deg,#2563eb,#06b6d4);">
                        <i class="fas fa-sign-in-alt mr-2"></i>로그인
                    </a>
                </div>
                <div class="mt-16 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-3xl mx-auto text-left">
                    <div class="bg-white rounded-2xl p-6 shadow">
                        <i class="fas fa-calendar-check text-2xl text-blue-400 mb-3 block"></i>
                        <h3 class="font-bold text-gray-800 mb-1">간편 예약</h3>
                        <p class="text-sm text-gray-500">외래·입원·수술 예약을 온라인으로 편리하게</p>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow">
                        <i class="fas fa-notes-medical text-2xl text-green-400 mb-3 block"></i>
                        <h3 class="font-bold text-gray-800 mb-1">진료기록 조회</h3>
                        <p class="text-sm text-gray-500">나의 진료 이력과 예약 현황을 한눈에</p>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow">
                        <i class="fas fa-bell text-2xl text-purple-400 mb-3 block"></i>
                        <h3 class="font-bold text-gray-800 mb-1">예약 알림</h3>
                        <p class="text-sm text-gray-500">예약 확정·변경·취소 알림을 실시간으로</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 예약 스케줄 달력 섹션 (로그인 후) -->
        <section id="appointment-section" class="bg-white rounded-2xl shadow-lg p-5 flex-col hidden" style="height: 560px; min-height: 420px; max-height: 560px;">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-blue-900">예약 스케줄</h2>
                <div class="flex items-center space-x-4">
                    <button id="prevMonth" class="p-2 hover:bg-gray-100 rounded-full"><i class="fas fa-chevron-left"></i></button>
                    <h3 id="currentMonthYear" class="text-xl font-semibold"></h3>
                    <button id="nextMonth" class="p-2 hover:bg-gray-100 rounded-full"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="calendar-grid-container grid grid-cols-7 border-t border-l border-gray-100 rounded-xl overflow-hidden shadow-sm" style="flex:1; min-height:0;">
                <div class="calendar-weekday is-sunday">일</div>
                <div class="calendar-weekday">월</div>
                <div class="calendar-weekday">화</div>
                <div class="calendar-weekday">수</div>
                <div class="calendar-weekday">목</div>
                <div class="calendar-weekday">금</div>
                <div class="calendar-weekday is-saturday">토</div>
                <div id="calendar-grid" class="contents"></div>
            </div>
        </section>
    </main>

    <!-- 예약 상세 내역 모달 -->
    <div id="calendarModal" class="fixed inset-0 z-[2000] hidden items-center justify-center bg-black bg-opacity-50">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalDateHeader" class="text-xl font-bold text-blue-900"></h3>
                <button id="closeCalendarModal" class="text-2xl">&times;</button>
            </div>
            <div id="modalAppointmentList" class="space-y-3 mb-6 max-h-60 overflow-y-auto"></div>
            <div class="flex justify-end">
                <button id="modalConfirmBtn" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg font-bold">닫기</button>
            </div>
        </div>
    </div>

    <!-- 나의 예약 관리 모달 -->

    <!-- 예약 수정 모달 -->
    <div id="editAppointmentModal" class="fixed inset-0 z-[3000] hidden items-center justify-center bg-black bg-opacity-50">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-blue-900">예약 수정</h3>
                <button id="closeEditModal" class="text-2xl">&times;</button>
            </div>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">예약 날짜</label>
                    <input type="date" id="editAppDate" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">진료과 선택</label>
                    <select id="editAppDept" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="">진료과 선택</option>
                    </select>
                </div>
            </div>
            <div class="flex space-x-3">
                <button id="cancelEditBtn" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg font-bold">취소</button>
                <button id="saveEditBtn" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold">저장</button>
            </div>
        </div>
    </div>

</body>
</html>
