<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 조회 및 변경 - 김이박 클리닉</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .appt-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .appt-date-box {
            min-width: 64px;
            text-align: center;
            background: var(--primary, #1976d2);
            color: #fff;
            border-radius: 8px;
            padding: 10px 6px;
            font-size: 13px;
            line-height: 1.4;
        }
        .appt-date-box .month { font-size: 11px; opacity: 0.85; }
        .appt-date-box .day   { font-size: 22px; font-weight: 700; line-height: 1; }
        .appt-body { flex: 1; }
        .appt-body h4 { margin: 0 0 4px; font-size: 15px; font-weight: 700; color: #263238; }
        .appt-body p  { margin: 2px 0; font-size: 13px; color: #607d8b; }
        .appt-status {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .status-pending   { background: #fff8e1; color: #f57f17; }
        .status-confirmed { background: #e8f5e9; color: #2e7d32; }
        .status-cancelled { background: #fce4ec; color: #c62828; }
        .status-completed { background: #e3f2fd; color: #1565c0; }
        .appt-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-edit   { padding: 5px 14px; background: #e3f2fd; color: #1565c0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-cancel { padding: 5px 14px; background: #fce4ec; color: #c62828; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-edit:hover   { background: #bbdefb; }
        .btn-cancel:hover { background: #f8bbd0; }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #90a4ae;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 24px 0 10px;
        }
    </style>
</head>
<body style="background:#f0f4f8;min-height:100vh;">
<nav id="navbar"></nav>

<div class="page-wrap">
    <h2><i class="fas fa-calendar-check" style="color:var(--primary);margin-right:8px;"></i>예약 조회 및 변경</h2>
    <p style="font-size:13px;color:#90a4ae;margin-bottom:24px;">
        * 대기 중인 예약만 변경·취소 가능합니다.
    </p>

    <div id="loadingMsg" style="text-align:center;padding:40px;color:#90a4ae;">
        <i class="fas fa-spinner fa-spin" style="font-size:24px;"></i>
        <p style="margin-top:8px;">불러오는 중...</p>
    </div>

    <div id="apptList" style="display:none;"></div>

    <div id="emptyMsg" class="empty-state" style="display:none;">
        <i class="fas fa-calendar-times"></i>
        <p>예약 내역이 없습니다.</p>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    const DEPT_NAMES = {
        'INTERNAL': '내과', 'CARDIO': '심장내과', 'NEURO': '신경과',
        'ORTHO': '정형외과', 'ANESTHESIA': '마취통증의학과',
        'SURGERY': '외과', 'PEDIATRICS': '소아청소년과',
    };

    function statusClass(code) {
        if (code === 'pending')   return 'status-pending';
        if (code === 'confirmed') return 'status-confirmed';
        if (code === 'cancelled') return 'status-cancelled';
        if (code === 'completed') return 'status-completed';
        return '';
    }

    function renderCard(a) {
        const [year, month, day] = (a.appointment_date || '').split('-');
        const deptName   = DEPT_NAMES[a.department_code] || a.department_code || '-';
        const canEdit    = a.status_code === 'pending';
        const editParams = new URLSearchParams({
            id:    a.appointment_id,
            date:  a.appointment_date  || '',
            time:  a.appointment_time  || '',
            notes: a.notes             || '',
        });

        const actionBtns = canEdit ? `
            <div class="appt-actions">
                <button class="btn-edit"   onclick="location.href='appointment-edit.html?${editParams}'">변경</button>
                <button class="btn-cancel" onclick="cancelAppt('${a.appointment_id}')">취소</button>
            </div>` : '';

        return `
        <div class="appt-card" id="card-${a.appointment_id}">
            <div class="appt-date-box">
                <div class="month">${year ? year + '.' + month : '-'}</div>
                <div class="day">${day || '-'}</div>
                <div class="month">${a.appointment_time || ''}</div>
            </div>
            <div class="appt-body">
                <span class="appt-status ${statusClass(a.status_code)}">${a.status_name || a.status_code}</span>
                <h4>${deptName} · ${a.type_name || a.type_code}</h4>
                ${a.notes ? `<p><i class="fas fa-comment-alt" style="margin-right:4px;"></i>${a.notes}</p>` : ''}
                ${actionBtns}
            </div>
        </div>`;
    }

    async function cancelAppt(id) {
        if (!confirm('예약을 취소하시겠습니까?')) return;
        const res = await apiCall(`/portal/appointments/${id}/cancel`, { method: 'POST' });
        if (res && res.ok) {
            alert('예약이 취소되었습니다.');
            loadAppointments();
        } else {
            const err = await res?.json().catch(() => ({}));
            alert(err.detail || '취소 처리 중 오류가 발생했습니다.');
        }
    }

    async function loadAppointments() {
        document.getElementById('apptList').style.display  = 'none';
        document.getElementById('emptyMsg').style.display  = 'none';
        document.getElementById('loadingMsg').style.display = 'block';

        const me = await requireLogin();
        if (!me) return;

        const res = await apiCall('/portal/appointments');
        document.getElementById('loadingMsg').style.display = 'none';

        if (!res || !res.ok) {
            document.getElementById('emptyMsg').style.display = 'block';
            return;
        }

        const data = await res.json();
        if (!data.length) {
            document.getElementById('emptyMsg').style.display = 'block';
            return;
        }

        const active    = data.filter(a => ['pending', 'confirmed'].includes(a.status_code));
        const past      = data.filter(a => !['pending', 'confirmed'].includes(a.status_code));
        const container = document.getElementById('apptList');

        let html = '';
        if (active.length) {
            html += `<div class="section-title">예정된 예약 (${active.length}건)</div>`;
            html += active.map(renderCard).join('');
        }
        if (past.length) {
            html += `<div class="section-title">지난 예약 (${past.length}건)</div>`;
            html += past.map(renderCard).join('');
        }

        container.innerHTML = html;
        container.style.display = 'block';
    }

    loadAppointments();
</script>
</body>
</html>
