<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 - 김이박 클리닉 환자 포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { margin: 0; background: #f0f4f8; }
        .info-card {
            background: #fff; border-radius: 12px;
            padding: 24px; margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .info-card h3 {
            font-size: 15px; font-weight: 700; color: #263238;
            margin: 0 0 16px; display: flex; align-items: center; gap: 8px;
        }
        .info-card h3 i { color: var(--primary); }
        .field-group { margin-bottom: 14px; }
        .field-group label {
            display: block; font-size: 12px; font-weight: 600;
            color: #78909c; margin-bottom: 5px;
        }
        .field-group input {
            width: 100%; padding: 10px 12px; border: 1px solid #cfd8dc;
            border-radius: 8px; font-size: 14px; box-sizing: border-box;
            color: #263238;
        }
        .field-group input:focus { outline: none; border-color: var(--primary); }
        .field-group input[readonly] {
            background: #f5f7fa; color: #90a4ae; cursor: not-allowed;
        }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-note {
            background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
            padding: 10px 14px; font-size: 12px; color: #795548; margin-bottom: 14px;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .no-email-banner {
            background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px;
            padding: 12px 14px; font-size: 13px; color: #e65100;
            display: none; align-items: flex-start; gap: 10px; margin-bottom: 16px;
        }
        .field-msg { font-size: 12px; font-weight: 600; text-align: center; padding: 8px; border-radius: 6px; margin-top: 8px; display: none; }
        .field-msg.ok  { background: #e8f5e9; color: #2e7d32; }
        .field-msg.err { background: #fce4ec; color: #c62828; }
        .save-btn {
            width: 100%; padding: 11px; background: var(--primary); color: #fff;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s;
        }
        .save-btn:hover { opacity: 0.88; }
    </style>
</head>
<body>

<div class="portal-layout">
    <!-- 사이드바 -->
    <aside class="portal-sidebar" id="portalSidebar"></aside>

    <!-- 본문 -->
    <main class="portal-content">
        <h2 style="font-size:22px;font-weight:700;color:#263238;margin-bottom:20px;">
            <i class="fas fa-user-circle" style="color:var(--primary);margin-right:8px;"></i>내 정보
        </h2>

        <!-- 이메일 미등록 경고 -->
        <div class="no-email-banner" id="noEmailBanner">
            <i class="fas fa-bell" style="margin-top:1px;flex-shrink:0;"></i>
            <span><strong>이메일이 등록되어 있지 않습니다.</strong><br>
            예약 확정·변경·취소 알림을 받으시려면 이메일을 등록해주세요.</span>
        </div>

        <!-- 기본 정보 -->
        <div class="info-card">
            <h3><i class="fas fa-id-card"></i>기본 정보</h3>

            <div class="field-row">
                <div class="field-group">
                    <label>출생연도</label>
                    <input type="text" id="birthYear" readonly>
                </div>
                <div class="field-group">
                    <label>성별</label>
                    <input type="text" id="gender" readonly>
                </div>
            </div>

            <div class="info-note">
                <i class="fas fa-info-circle" style="margin-top:1px;flex-shrink:0;"></i>
                <span>출생연도·성별·연락처 변경은 <strong>원무과에 직접 문의</strong>해주세요.</span>
            </div>
        </div>

        <!-- 이메일 -->
        <div class="info-card">
            <h3><i class="fas fa-envelope"></i>이메일 <span style="font-size:12px;font-weight:400;color:#90a4ae;">(예약 알림 수신용 — 선택)</span></h3>

            <div class="field-group">
                <label>이메일 주소</label>
                <input type="email" id="emailInput" placeholder="예: patient@example.com">
            </div>

            <div class="field-msg" id="profileMsg"></div>

            <button class="save-btn" onclick="saveEmail()">
                <i class="fas fa-save" style="margin-right:6px;"></i>이메일 저장
            </button>
        </div>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
<script>
    const GENDER_KR = { M: '남성', F: '여성', U: '미상', male: '남성', female: '여성' };

    async function initPage() {
        const meRes = await fetch(`${BASE_URL}/auth/me`, {
            credentials: 'include', headers: { 'X-API-Key': API_KEY },
        });
        if (!meRes.ok) { window.location.href = 'login.html'; return; }
        const me = await meRes.json();
        if (me.role !== 'patient') { window.location.href = 'login.html'; return; }
        if (me.must_change_password || me.password_expired) {
            window.location.href = 'change-password.html'; return;
        }

        const profileRes = await fetch(`${BASE_URL}/portal/my-profile`, {
            credentials: 'include', headers: { 'X-API-Key': API_KEY },
        });
        if (profileRes.ok) {
            const p = await profileRes.json();
            document.getElementById('birthYear').value   = p.birth_year ? p.birth_year + '년생' : '-';
            document.getElementById('gender').value      = GENDER_KR[p.gender_code] || p.gender_code || '-';
            document.getElementById('emailInput').value  = p.email || '';
            if (!p.email) document.getElementById('noEmailBanner').style.display = 'flex';
        }
    }

    async function saveEmail() {
        const email = document.getElementById('emailInput').value.trim();
        const msg   = document.getElementById('profileMsg');
        msg.className = 'field-msg'; msg.style.display = 'none';

        if (!email) {
            msg.textContent = '이메일 주소를 입력해주세요.';
            msg.className = 'field-msg err'; msg.style.display = 'block'; return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            msg.textContent = '올바른 이메일 형식을 입력해주세요. (예: name@example.com)';
            msg.className = 'field-msg err'; msg.style.display = 'block'; return;
        }

        const res = await fetch(`${BASE_URL}/portal/my-profile`, {
            method: 'PATCH', credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
            body: JSON.stringify({ email }),
        });

        if (res.ok) {
            msg.textContent = '이메일이 저장되었습니다.';
            msg.className = 'field-msg ok'; msg.style.display = 'block';
            document.getElementById('noEmailBanner').style.display = 'none';
        } else {
            const data = await res.json().catch(() => ({}));
            msg.textContent = data.detail || '저장 중 오류가 발생했습니다.';
            msg.className = 'field-msg err'; msg.style.display = 'block';
        }
    }

    renderSidebar('mypage.html');
    initPage();
</script>
</body>
</html>
