<!DOCTYPE html>
<!-- by 김다정 — 환자 내 정보(마이페이지) 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 - 김이박 클리닉 환자 포털</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-blue-600 font-bold text-lg">
                <i class="fas fa-heartbeat"></i>
                <span>김이박 클리닉</span>
            </a>
            <button onclick="doLogout()" class="text-sm text-gray-500 hover:text-gray-700">
                <i class="fas fa-sign-out-alt mr-1"></i>로그아웃
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div class="flex items-center gap-3 mb-6">
            <a href="index.html" class="text-blue-500 hover:text-blue-700 text-sm">
                <i class="fas fa-arrow-left mr-1"></i>홈으로
            </a>
            <h1 class="text-2xl font-bold text-gray-800">내 정보</h1>
        </div>

        <!-- 계정 정보 (읽기 전용 + 이메일 수정 가능) -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-5">
            <h2 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-user-circle text-blue-500"></i> 계정 정보
            </h2>

            <!-- by 김다정 — 출생연도·성별만 표시 (실명·주민번호 미표시), ISMS-P 원칙 -->
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">이메일 (로그인 아이디)</label>
                    <input type="email" id="email"
                        class="w-full px-3 py-2.5 border border-blue-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">출생연도</label>
                        <input type="text" id="birthYear" readonly
                            class="w-full px-3 py-2.5 bg-gray-100 border border-gray-200 rounded-lg text-sm text-gray-500 cursor-not-allowed outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">성별</label>
                        <input type="text" id="gender" readonly
                            class="w-full px-3 py-2.5 bg-gray-100 border border-gray-200 rounded-lg text-sm text-gray-500 cursor-not-allowed outline-none">
                    </div>
                </div>

                <div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 flex items-start gap-2">
                    <i class="fas fa-info-circle text-amber-500 mt-0.5 flex-shrink-0 text-sm"></i>
                    <p class="text-xs text-amber-700 leading-relaxed">
                        출생연도·성별·연락처 변경은 <strong>원무과에 직접 문의</strong>해주세요.
                        포털에서는 이메일만 수정할 수 있습니다.
                    </p>
                </div>

                <div id="profileMsg" class="hidden text-sm font-semibold text-center py-2 rounded-lg"></div>

                <button onclick="saveEmail()"
                    class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 transition-colors">
                    이메일 저장
                </button>
            </div>
        </div>

        <!-- 빠른 링크 -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-link text-blue-500"></i> 빠른 메뉴
            </h2>
            <div class="grid grid-cols-2 gap-3">
                <!-- by 김다정 — 마이페이지에서 바로 접근 가능한 주요 메뉴 링크 추가 -->
                <a href="appointment.html"
                    class="flex items-center gap-2 px-4 py-3 bg-blue-50 border border-blue-200 rounded-xl text-sm font-medium text-blue-700 hover:bg-blue-100 transition-colors">
                    <i class="fas fa-calendar-alt"></i> 예약 조회
                </a>
                <a href="prescription.html"
                    class="flex items-center gap-2 px-4 py-3 bg-purple-50 border border-purple-200 rounded-xl text-sm font-medium text-purple-700 hover:bg-purple-100 transition-colors">
                    <i class="fas fa-pills"></i> 처방전 조회
                </a>
                <a href="my-records.html"
                    class="flex items-center gap-2 px-4 py-3 bg-green-50 border border-green-200 rounded-xl text-sm font-medium text-green-700 hover:bg-green-100 transition-colors">
                    <i class="fas fa-file-medical"></i> 진료 기록
                </a>
                <a href="change-password.html"
                    class="flex items-center gap-2 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
                    <i class="fas fa-key"></i> 비밀번호 변경
                </a>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        // by 김다정 — 환자 마이페이지 초기화
        const GENDER_KR = { M:'남성', F:'여성', male:'남성', female:'여성' };

        (async () => {
            const res = await fetch(`${BASE_URL}/auth/me`, {
                credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            });
            if (!res.ok) { window.location.href = 'login.html'; return; }
            const me = await res.json();
            if (me.role !== 'patient') { window.location.href = 'login.html'; return; }

            document.getElementById('email').value     = me.email || '';
            document.getElementById('birthYear').value = me.birth_year ? me.birth_year + '년생' : '-';
            document.getElementById('gender').value    = GENDER_KR[me.gender_code] || me.gender_code || '-';
        })();

        async function saveEmail() {
            const email = document.getElementById('email').value.trim();
            const msg   = document.getElementById('profileMsg');

            if (!email || !email.includes('@')) {
                msg.textContent = '올바른 이메일 형식을 입력해주세요.';
                msg.className = 'text-sm font-semibold text-center py-2 rounded-lg text-red-600 bg-red-50';
                msg.classList.remove('hidden');
                return;
            }
            const res = await fetch(`${BASE_URL}/portal/profile`, {
                method: 'PATCH',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                body: JSON.stringify({ email }),
            });
            if (res.ok) {
                msg.textContent = '이메일이 저장되었습니다.';
                msg.className = 'text-sm font-semibold text-center py-2 rounded-lg text-green-700 bg-green-50';
            } else {
                const data = await res.json().catch(() => ({}));
                msg.textContent = data.detail || '저장 중 오류가 발생했습니다.';
                msg.className = 'text-sm font-semibold text-center py-2 rounded-lg text-red-600 bg-red-50';
            }
            msg.classList.remove('hidden');
        }

        async function doLogout() {
            await fetch(`${BASE_URL}/auth/logout`, {
                method: 'POST', credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            }).catch(() => {});
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
