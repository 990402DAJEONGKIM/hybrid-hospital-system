<!DOCTYPE html>
<!-- by 김다정 — 환자 처방전 조회 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>처방전 조회 - 김이박 클리닉 환자 포털</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- 상단 헤더 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-blue-600 font-bold text-lg">
                <i class="fas fa-heartbeat"></i>
                <span>김이박 클리닉</span>
            </a>
            <div class="flex items-center gap-3">
                <span id="userEmail" class="text-sm text-gray-500 hidden"></span>
                <button id="logoutBtn" onclick="doLogout()"
                    class="text-sm text-gray-500 hover:text-gray-700 hidden">
                    <i class="fas fa-sign-out-alt mr-1"></i>로그아웃
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center gap-3 mb-6">
            <a href="index.html" class="text-blue-500 hover:text-blue-700 text-sm">
                <i class="fas fa-arrow-left mr-1"></i>홈으로
            </a>
            <h1 class="text-2xl font-bold text-gray-800">처방전 조회</h1>
        </div>

        <!-- by 김다정 — 처방 원문(diagnosis_text) 미표시, ICD코드와 약품명만 표시 -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 mb-6 flex items-start gap-2">
            <i class="fas fa-info-circle text-blue-500 mt-0.5 flex-shrink-0 text-sm"></i>
            <p class="text-xs text-blue-700 leading-relaxed">
                처방전 조회 시 <strong>약품명·용량·횟수</strong> 정보를 확인할 수 있습니다.
                진료 기록 원문은 의료진에게 문의하세요.
            </p>
        </div>

        <!-- 기간 필터 -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex gap-3 items-end flex-wrap">
            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-500">시작일</label>
                <input type="date" id="startDate"
                    class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-500">종료일</label>
                <input type="date" id="endDate"
                    class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <button onclick="loadPrescriptions()"
                class="px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                <i class="fas fa-search mr-1"></i>조회
            </button>
        </div>

        <!-- 처방 목록 -->
        <div id="prescList" class="space-y-4">
            <div class="bg-white rounded-xl shadow-sm p-8 text-center text-gray-400">
                <i class="fas fa-pills text-3xl mb-3 block"></i>
                기간을 선택 후 조회하세요.
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/script.js" defer></script>
    <script>
        // by 김다정 — 환자 처방전 조회 페이지 초기화 (patient 역할 전용)
        (async () => {
            const res = await fetch(`${BASE_URL}/auth/me`, {
                credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            });
            if (!res.ok) { window.location.href = 'login.html'; return; }
            const me = await res.json();
            if (me.role !== 'patient') { window.location.href = 'login.html'; return; }

            document.getElementById('userEmail').textContent = me.email || '';
            document.getElementById('userEmail').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');

            // 기본 기간: 최근 3개월
            const today = new Date();
            const past  = new Date(); past.setMonth(past.getMonth() - 3);
            document.getElementById('endDate').value   = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = past.toISOString().split('T')[0];
            await loadPrescriptions();
        })();

        async function loadPrescriptions() {
            const start = document.getElementById('startDate').value;
            const end   = document.getElementById('endDate').value;
            const res   = await fetch(`${BASE_URL}/portal/prescriptions?start_date=${start}&end_date=${end}`, {
                credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            });
            const container = document.getElementById('prescList');

            if (!res.ok) {
                container.innerHTML = `<div class="bg-white rounded-xl shadow-sm p-8 text-center text-red-400">
                    <i class="fas fa-exclamation-circle text-2xl mb-2 block"></i>처방전을 불러올 수 없습니다.</div>`;
                return;
            }
            const list = await res.json();
            if (!list.length) {
                container.innerHTML = `<div class="bg-white rounded-xl shadow-sm p-8 text-center text-gray-400">
                    <i class="fas fa-pills text-3xl mb-3 block"></i>해당 기간의 처방전이 없습니다.</div>`;
                return;
            }
            container.innerHTML = list.map(p => `
                <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-xs text-gray-400">처방일</span>
                            <p class="font-semibold text-gray-800">${p.presc_date}</p>
                        </div>
                        <span class="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1 rounded-full font-medium">
                            ${p.icd_code || '-'}
                        </span>
                    </div>
                    <div class="space-y-2">
                        ${(p.drugs || []).map(d => `
                            <div class="flex items-center gap-2 text-sm text-gray-700 bg-gray-50 rounded-lg px-3 py-2">
                                <i class="fas fa-capsules text-blue-400 flex-shrink-0 text-xs"></i>
                                <span class="font-medium">${d.drug_name}</span>
                                <span class="text-gray-400 text-xs">${d.dosage || ''} ${d.frequency || ''} ${d.days ? d.days+'일' : ''}</span>
                            </div>`).join('')}
                        ${!p.drugs?.length ? '<p class="text-sm text-gray-400">약품 정보 없음</p>' : ''}
                    </div>
                </div>`).join('');
        }

        async function doLogout() {
            await fetch(`${BASE_URL}/auth/logout`, {
                method: 'POST', credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            }).catch(() => {});
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
