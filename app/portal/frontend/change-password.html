<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - 김이박 종합병원</title>
    <link rel="stylesheet" href="/css/tailwind.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-yellow-100 rounded-full mb-4">
                <svg class="w-7 h-7 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">비밀번호 변경 필요</h1>
            <p class="text-gray-500 text-sm">보안 정책에 따라 90일마다 비밀번호를 변경해야 합니다.<br>새 비밀번호를 입력해주세요.</p>
        </div>

        <form id="changePasswordForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">현재 비밀번호</label>
                <input type="password" id="oldPassword" required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호</label>
                <input type="password" id="newPassword" required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <p class="text-xs text-gray-400 mt-1">8자 이상, 영문·숫자·특수문자 중 2종류 이상 조합</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호 확인</label>
                <input type="password" id="confirmPassword" required
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div id="apiError" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600"></div>
            <div id="apiSuccess" class="hidden p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-700"></div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                비밀번호 변경
            </button>
        </form>

        <div class="mt-4 text-center">
            <button id="logoutLink" class="text-sm text-gray-500 hover:text-gray-700 hover:underline">
                로그아웃 후 나중에 변경
            </button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // 로그인 여부를 쿠키 기반 /auth/me 호출로 확인 (httpOnly 쿠키는 JS에서 직접 읽을 수 없음)
        (async () => {
            const res = await fetch(`${BASE_URL}/auth/me`, {
                credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            }).catch(() => null);
            if (!res || !res.ok) window.location.href = 'login.html';
        })();

        document.getElementById('logoutLink').addEventListener('click', async () => {
            await fetch(`${BASE_URL}/auth/logout`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
            }).catch(() => {});
            window.location.href = 'login.html';
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const oldPw     = document.getElementById('oldPassword').value;
            const newPw     = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;
            const errorEl   = document.getElementById('apiError');
            const successEl = document.getElementById('apiSuccess');
            const submitBtn = document.getElementById('submitBtn');

            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            if (newPw !== confirmPw) {
                errorEl.textContent = '새 비밀번호가 일치하지 않습니다.';
                errorEl.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '변경 중...';

            try {
                const res = await fetch(`${BASE_URL}/auth/change-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
                });

                if (res.status === 204) {
                    successEl.textContent = '비밀번호가 변경되었습니다. 잠시 후 로그인 페이지로 이동합니다.';
                    successEl.classList.remove('hidden');
                    // 비밀번호 변경 후 기존 세션 전체 폐기됨 → 재로그인 필요
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    const data = await res.json().catch(() => ({}));
                    errorEl.textContent = data.detail || '비밀번호 변경에 실패했습니다.';
                    errorEl.classList.remove('hidden');
                }
            } catch {
                errorEl.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
                errorEl.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '비밀번호 변경';
            }
        });
    </script>
</body>
</html>
