<!DOCTYPE html>
<!-- by 김다정 — IT 관리자 공지 관리 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지 관리 - 김이박 클리닉 IT 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-gray-800 font-bold text-base">
                <i class="fas fa-shield-alt text-red-600"></i>
                <span>김이박 클리닉 — IT 관리자</span>
            </a>
            <button onclick="doLogout()" class="text-sm text-gray-500 hover:text-gray-700">
                <i class="fas fa-sign-out-alt mr-1"></i>로그아웃
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center gap-3 mb-6">
            <a href="index.html" class="text-gray-500 hover:text-gray-700 text-sm">
                <i class="fas fa-arrow-left mr-1"></i>대시보드
            </a>
            <h1 class="text-2xl font-bold text-gray-800">공지 관리</h1>
        </div>

        <!-- 공지 등록 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-5">
            <h2 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle text-blue-500"></i> 공지 등록
                <!-- by 김다정 — 공지 등록 시 audit_log NOTICE_UPDATE 기록 -->
            </h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">제목</label>
                    <input type="text" id="noticeTitle" placeholder="공지 제목 입력"
                        class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">내용</label>
                    <textarea id="noticeContent" rows="4" placeholder="공지 내용 입력"
                        class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none resize-none"></textarea>
                </div>
                <div class="flex gap-3 items-center">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-semibold text-gray-500">게시 시작</label>
                        <input type="date" id="noticeStart"
                            class="px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-semibold text-gray-500">게시 종료</label>
                        <input type="date" id="noticeEnd"
                            class="px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none">
                    </div>
                    <div class="flex items-center gap-2 mt-4">
                        <input type="checkbox" id="noticePinned" class="rounded">
                        <label for="noticePinned" class="text-xs font-semibold text-gray-600">상단 고정</label>
                    </div>
                </div>
                <div id="noticeMsg" class="hidden text-sm font-semibold py-2"></div>
                <button onclick="createNotice()"
                    class="px-5 py-2.5 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-paper-plane mr-1"></i> 공지 등록
                </button>
            </div>
        </div>

        <!-- 공지 목록 -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold text-gray-700 flex items-center gap-2">
                    <i class="fas fa-list text-gray-500"></i> 공지 목록
                </h2>
                <button onclick="loadNotices()"
                    class="text-xs px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors">
                    <i class="fas fa-sync-alt mr-1"></i>새로고침
                </button>
            </div>
            <div id="noticeList" class="space-y-3">
                <div class="text-sm text-gray-400 text-center py-6">불러오는 중...</div>
            </div>
        </div>
    </main>

    <!-- 삭제 확인 모달 -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <h3 class="font-bold text-gray-800 mb-2">공지 삭제</h3>
            <p class="text-sm text-gray-600 mb-5">이 공지를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()"
                    class="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg font-semibold text-sm">취소</button>
                <button id="confirmDeleteBtn"
                    class="flex-1 py-2 bg-red-600 text-white rounded-lg font-semibold text-sm hover:bg-red-700">삭제</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/script.js" defer></script>
    <script>
        // by 김다정 — IT 관리자 공지 관리 페이지 초기화 (admin 역할 전용)
        let pendingDeleteId = null;

        (async () => {
            const res = await fetch(`${BASE_URL}/auth/me`, {
                credentials: 'include', headers: { 'X-API-Key': API_KEY },
            });
            if (!res.ok) { window.location.href = 'login.html'; return; }
            const me = await res.json();
            if (me.role !== 'admin') { window.location.href = 'login.html'; return; }

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('noticeStart').value = today;
            await loadNotices();
        })();

        async function loadNotices() {
            const res = await fetch(`${BASE_URL}/admin/notices`, {
                credentials: 'include', headers: { 'X-API-Key': API_KEY },
            });
            const el = document.getElementById('noticeList');
            if (!res.ok) {
                el.innerHTML = '<p class="text-sm text-red-400 text-center py-4">공지를 불러올 수 없습니다.</p>';
                return;
            }
            const list = await res.json();
            if (!list.length) {
                el.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">등록된 공지가 없습니다.</p>';
                return;
            }
            el.innerHTML = list.map(n => `
                <div class="border border-gray-100 rounded-xl p-4 hover:border-gray-200 transition-colors">
                    <div class="flex justify-between items-start gap-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                ${n.is_pinned ? '<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-semibold">고정</span>' : ''}
                                <span class="text-sm font-semibold text-gray-800 truncate">${n.title}</span>
                            </div>
                            <p class="text-xs text-gray-500 line-clamp-2">${n.content}</p>
                            <p class="text-xs text-gray-400 mt-1">${n.start_date || ''} ~ ${n.end_date || '상시'}</p>
                        </div>
                        <div class="flex gap-2 flex-shrink-0">
                            <button onclick="openDeleteModal('${n.notice_id}')"
                                class="text-xs px-2.5 py-1 bg-red-50 text-red-600 border border-red-200 rounded-lg hover:bg-red-100 transition-colors">
                                삭제
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        async function createNotice() {
            const title   = document.getElementById('noticeTitle').value.trim();
            const content = document.getElementById('noticeContent').value.trim();
            const start   = document.getElementById('noticeStart').value;
            const end     = document.getElementById('noticeEnd').value;
            const pinned  = document.getElementById('noticePinned').checked;
            const msg     = document.getElementById('noticeMsg');

            if (!title || !content) {
                msg.textContent = '제목과 내용은 필수입니다.';
                msg.className = 'text-sm font-semibold py-2 text-red-600';
                msg.classList.remove('hidden');
                return;
            }
            const res = await fetch(`${BASE_URL}/admin/notices`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                body: JSON.stringify({ title, content, start_date: start || null, end_date: end || null, is_pinned: pinned }),
            });
            if (res.ok) {
                msg.textContent = '공지가 등록되었습니다.';
                msg.className = 'text-sm font-semibold py-2 text-green-700';
                document.getElementById('noticeTitle').value   = '';
                document.getElementById('noticeContent').value = '';
                await loadNotices();
            } else {
                const data = await res.json().catch(() => ({}));
                msg.textContent = data.detail || '등록 중 오류가 발생했습니다.';
                msg.className = 'text-sm font-semibold py-2 text-red-600';
            }
            msg.classList.remove('hidden');
        }

        function openDeleteModal(noticeId) {
            pendingDeleteId = noticeId;
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('confirmDeleteBtn').onclick = deleteNotice;
        }

        function closeDeleteModal() {
            pendingDeleteId = null;
            const modal = document.getElementById('deleteModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function deleteNotice() {
            if (!pendingDeleteId) return;
            const res = await fetch(`${BASE_URL}/admin/notices/${pendingDeleteId}`, {
                method: 'DELETE',
                credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            });
            closeDeleteModal();
            if (res.ok) {
                await loadNotices();
            } else {
                alert('삭제 중 오류가 발생했습니다.');
            }
        }

        async function doLogout() {
            await fetch(`${BASE_URL}/auth/logout`, {
                method: 'POST', credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            }).catch(() => {});
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
