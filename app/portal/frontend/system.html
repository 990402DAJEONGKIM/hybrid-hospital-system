<!DOCTYPE html>
<!-- by 김다정 — IT 관리자 시스템 현황 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 현황 - 김이박 클리닉 IT 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-ok   { color:#2e7d32; } .status-warn { color:#f57f17; } .status-err { color:#c62828; }
        .badge-ok   { background:#e8f5e9; color:#2e7d32; }
        .badge-warn { background:#fff3e0; color:#e65100; }
        .badge-err  { background:#ffebee; color:#c62828; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-gray-800 font-bold text-base">
                <i class="fas fa-shield-alt text-red-600"></i>
                <span>김이박 클리닉 — IT 관리자</span>
            </a>
            <button onclick="doLogout()" class="text-sm text-gray-500 hover:text-gray-700">
                <i class="fas fa-sign-out-alt mr-1"></i>로그아웃
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex items-center gap-3 mb-6">
            <a href="index.html" class="text-gray-500 hover:text-gray-700 text-sm">
                <i class="fas fa-arrow-left mr-1"></i>대시보드
            </a>
            <h1 class="text-2xl font-bold text-gray-800">시스템 현황</h1>
            <span id="lastRefreshed" class="text-xs text-gray-400 ml-auto"></span>
            <button onclick="loadAll()"
                class="text-sm px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors">
                <i class="fas fa-sync-alt mr-1"></i>새로고침
            </button>
        </div>

        <!-- ECS 서비스 현황 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-5">
            <h2 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-server text-blue-500"></i> ECS 서비스 현황
                <!-- by 김다정 — ECS 서비스 상태 조회 (민감정보 마스킹) -->
            </h2>
            <div id="ecsList" class="space-y-2">
                <div class="text-sm text-gray-400 text-center py-4">불러오는 중...</div>
            </div>
        </div>

        <!-- DB 연결 상태 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-5">
            <h2 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-database text-purple-500"></i> DB 연결 상태
            </h2>
            <div id="dbList" class="space-y-2">
                <div class="text-sm text-gray-400 text-center py-4">불러오는 중...</div>
            </div>
        </div>

        <!-- 동기화 현황 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-5">
            <h2 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-sync text-green-500"></i> 온프레미스 ↔ 클라우드 동기화
            </h2>
            <div id="syncList" class="space-y-2">
                <div class="text-sm text-gray-400 text-center py-4">불러오는 중...</div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/script.js" defer></script>
    <script>
        // by 김다정 — IT 관리자 시스템 현황 페이지 초기화 (admin 역할 전용)
        (async () => {
            const res = await fetch(`${BASE_URL}/auth/me`, {
                credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            });
            if (!res.ok) { window.location.href = 'login.html'; return; }
            const me = await res.json();
            if (me.role !== 'admin') { window.location.href = 'login.html'; return; }
            await loadAll();
        })();

        async function loadAll() {
            document.getElementById('lastRefreshed').textContent =
                '최종 갱신: ' + new Date().toLocaleTimeString('ko-KR');
            await Promise.all([loadEcs(), loadDb(), loadSync()]);
        }

        async function loadEcs() {
            const res = await fetch(`${BASE_URL}/admin/system/ecs`, {
                credentials: 'include', headers: { 'X-API-Key': API_KEY },
            });
            const el = document.getElementById('ecsList');
            if (!res.ok) { el.innerHTML = '<p class="text-sm text-red-400">데이터를 불러올 수 없습니다.</p>'; return; }
            const list = await res.json();
            el.innerHTML = list.map(s => `
                <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-circle text-xs ${s.status === 'ACTIVE' ? 'status-ok' : 'status-err'}"></i>
                        <span class="text-sm font-medium text-gray-700">${s.service_name}</span>
                    </div>
                    <div class="flex items-center gap-4 text-xs text-gray-500">
                        <span>실행: ${s.running_count}/${s.desired_count}</span>
                        <span class="px-2 py-1 rounded-full font-semibold ${s.status === 'ACTIVE' ? 'badge-ok' : 'badge-err'}">
                            ${s.status}
                        </span>
                    </div>
                </div>`).join('') || '<p class="text-sm text-gray-400 text-center py-4">ECS 서비스 없음</p>';
        }

        async function loadDb() {
            const res = await fetch(`${BASE_URL}/admin/system/db-health`, {
                credentials: 'include', headers: { 'X-API-Key': API_KEY },
            });
            const el = document.getElementById('dbList');
            if (!res.ok) { el.innerHTML = '<p class="text-sm text-red-400">데이터를 불러올 수 없습니다.</p>'; return; }
            const list = await res.json();
            el.innerHTML = list.map(d => `
                <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-circle text-xs ${d.ok ? 'status-ok' : 'status-err'}"></i>
                        <span class="text-sm font-medium text-gray-700">${d.name}</span>
                    </div>
                    <span class="text-xs px-2 py-1 rounded-full font-semibold ${d.ok ? 'badge-ok' : 'badge-err'}">
                        ${d.ok ? '정상' : '오류'}
                    </span>
                </div>`).join('') || '<p class="text-sm text-gray-400 text-center py-4">DB 정보 없음</p>';
        }

        async function loadSync() {
            const res = await fetch(`${BASE_URL}/admin/system/sync-status`, {
                credentials: 'include', headers: { 'X-API-Key': API_KEY },
            });
            const el = document.getElementById('syncList');
            if (!res.ok) { el.innerHTML = '<p class="text-sm text-red-400">데이터를 불러올 수 없습니다.</p>'; return; }
            const list = await res.json();
            el.innerHTML = list.map(s => `
                <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-lg">
                    <div>
                        <span class="text-sm font-medium text-gray-700">${s.table_name}</span>
                        <span class="text-xs text-gray-400 ml-2">최종: ${s.last_synced_at || '-'}</span>
                    </div>
                    <div class="flex items-center gap-3 text-xs">
                        <span class="text-gray-500">성공 ${s.success_count ?? 0} / 실패 ${s.fail_count ?? 0}</span>
                        <span class="px-2 py-1 rounded-full font-semibold ${s.fail_count > 0 ? 'badge-warn' : 'badge-ok'}">
                            ${s.fail_count > 0 ? '주의' : '정상'}
                        </span>
                    </div>
                </div>`).join('') || '<p class="text-sm text-gray-400 text-center py-4">동기화 정보 없음</p>';
        }

        async function doLogout() {
            await fetch(`${BASE_URL}/auth/logout`, {
                method: 'POST', credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            }).catch(() => {});
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
