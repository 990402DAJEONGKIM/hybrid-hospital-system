<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>운영 대시보드 - MZ Clinic 관리자</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-wrap { max-width:1200px; margin:80px auto 40px; padding:0 16px; }
        .dash-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
        .dash-header h2 { margin:0; font-size:20px; font-weight:800; color:#1e293b; }
        .refresh-btn { padding:8px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
        .refresh-btn:hover { opacity:.85; }
        .generated-at { font-size:12px; color:#94a3b8; }

        /* 상태 카드 그리드 */
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
        .stat-card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 1px 6px rgba(0,0,0,.06); border-left:4px solid #e2e8f0; }
        .stat-card.ok     { border-left-color:#10b981; }
        .stat-card.warn   { border-left-color:#f59e0b; }
        .stat-card.error  { border-left-color:#ef4444; }
        .stat-card.info   { border-left-color:#3b82f6; }
        .stat-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#94a3b8; margin-bottom:8px; }
        .stat-value { font-size:28px; font-weight:800; color:#1e293b; line-height:1; }
        .stat-sub   { font-size:12px; color:#64748b; margin-top:6px; }

        /* 섹션 카드 */
        .section-card { background:#fff; border-radius:12px; padding:22px 24px; box-shadow:0 1px 6px rgba(0,0,0,.06); margin-bottom:20px; }
        .section-title { font-size:14px; font-weight:700; color:#1e293b; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .section-title i { color:#94a3b8; }

        /* 시스템 상태 배지 */
        .status-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
        .status-ok            { background:#d1fae5; color:#065f46; }
        .status-error         { background:#fee2e2; color:#991b1b; }
        .status-not_configured{ background:#f1f5f9; color:#64748b; }
        .status-unknown       { background:#fef9c3; color:#854d0e; }
        .status-degraded      { background:#ffedd5; color:#9a3412; }

        /* 최근 이벤트 테이블 */
        .event-table { width:100%; border-collapse:collapse; font-size:13px; }
        .event-table th { background:#f8fafc; padding:8px 10px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #e2e8f0; }
        .event-table td { padding:8px 10px; border-bottom:1px solid #f1f5f9; color:#374151; }
        .event-table tr:hover td { background:#f8fafc; }
        .empty-msg { text-align:center; padding:32px; color:#94a3b8; font-size:13px; }

        /* 알림 채널 바 */
        .notif-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f1f5f9; font-size:13px; }
        .notif-row:last-child { border-bottom:none; }
        .notif-channel { font-weight:600; color:#374151; }
        .notif-counts  { display:flex; gap:12px; }
        .cnt-sent   { color:#10b981; font-weight:700; }
        .cnt-failed { color:#ef4444; font-weight:700; }

        /* 예약 상태 바 */
        .appt-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #f1f5f9; font-size:13px; }
        .appt-row:last-child { border-bottom:none; }
        .appt-status-badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
        .s-pending   { background:#fff8e1; color:#f57f17; }
        .s-confirmed { background:#e8f5e9; color:#2e7d32; }
        .s-completed { background:#e3f2fd; color:#1565c0; }
        .s-cancelled { background:#ffebee; color:#c62828; }
        .s-no_show   { background:#f3e5f5; color:#6a1b9a; }
        .s-default   { background:#f1f5f9; color:#475569; }
    </style>
</head>
<body>
<div id="page-content">
<div class="page-wrap">
    <div class="dash-header">
        <div>
            <h2><i class="fas fa-tachometer-alt" style="color:#1d4ed8;margin-right:8px;"></i>운영 통합 대시보드</h2>
            <p id="generatedAt" class="generated-at">로딩 중...</p>
        </div>
        <button class="refresh-btn" onclick="load()"><i class="fas fa-sync-alt"></i> 새로고침</button>
    </div>
    <div id="errMsg" style="color:#e53935;font-size:13px;margin-bottom:12px;min-height:18px;"></div>

    <!-- 핵심 지표 -->
    <div class="stat-grid" id="statGrid">
        <div class="stat-card"><div class="stat-label">오늘 예약</div><div class="stat-value" id="s-appt-total">—</div><div class="stat-sub">전체</div></div>
        <div class="stat-card" id="sc-pending"><div class="stat-label">대기 예약</div><div class="stat-value" id="s-appt-pending">—</div><div class="stat-sub">확정 대기 중</div></div>
        <div class="stat-card" id="sc-failures"><div class="stat-label">로그인 실패</div><div class="stat-value" id="s-failures">—</div><div class="stat-sub">최근 24시간</div></div>
        <div class="stat-card" id="sc-locked"><div class="stat-label">잠금 계정</div><div class="stat-value" id="s-locked">—</div><div class="stat-sub">현재 잠금 중</div></div>
        <div class="stat-card info"><div class="stat-label">감사 로그</div><div class="stat-value" id="s-audit">—</div><div class="stat-sub">최근 24시간</div></div>
        <div class="stat-card info"><div class="stat-label">알림 발송</div><div class="stat-value" id="s-notif">—</div><div class="stat-sub">최근 24시간 (성공)</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
        <!-- 시스템 상태 -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-server"></i> 시스템 연결 상태</div>
            <div id="systemStatus" style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;">
                    <span style="color:#374151;font-weight:600;"><i class="fas fa-cloud" style="margin-right:6px;color:#3b82f6;"></i>Combined API (AWS)</span>
                    <span class="status-badge status-ok"><i class="fas fa-check-circle"></i> 정상</span>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;">
                    <span style="color:#374151;font-weight:600;"><i class="fas fa-hdd" style="margin-right:6px;color:#10b981;"></i>온프레미스 API</span>
                    <span id="onpremStatus" class="status-badge status-unknown"><i class="fas fa-spinner fa-spin"></i> 확인 중</span>
                </div>
            </div>
        </div>

        <!-- 오늘 예약 상태별 -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-calendar-check"></i> 오늘 예약 현황</div>
            <div id="apptStatus">
                <div class="empty-msg">로딩 중...</div>
            </div>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <!-- 알림 채널 현황 -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-bell"></i> 알림 발송 현황 (24h)</div>
            <div id="notifStatus">
                <div class="empty-msg">로딩 중...</div>
            </div>
        </div>

        <!-- 최근 이벤트 -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-history"></i> 최근 감사 이벤트</div>
            <div style="overflow-x:auto;">
                <table class="event-table">
                    <thead><tr>
                        <th>액션</th>
                        <th>결과</th>
                        <th>시각</th>
                    </tr></thead>
                    <tbody id="eventBody">
                        <tr><td colspan="3" class="empty-msg">로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/router.js"></script>
<script>
    const STATUS_LBL = {
        pending: '대기', confirmed: '확정', completed: '완료',
        cancelled: '취소', no_show: '미내원',
    };
    const STATUS_CLS = {
        pending: 's-pending', confirmed: 's-confirmed', completed: 's-completed',
        cancelled: 's-cancelled', no_show: 's-no_show',
    };

    async function init() {
        const me = await initLayout();
        if (!me) return;
        if (me.role !== 'admin') { alert('관리자 권한이 필요합니다.'); location.href = '/index.html'; return; }
        await load();
    }

    async function load() {
        document.getElementById('errMsg').textContent = '';
        const res = await apiCall('/admin/dashboard');
        if (!res || !res.ok) {
            document.getElementById('errMsg').textContent = '대시보드 데이터를 불러오지 못했습니다.';
            return;
        }
        const d = await res.json();
        render(d);
    }

    function render(d) {
        // 생성 시각
        const ts = d.generated_at ? new Date(d.generated_at).toLocaleString('ko-KR') : '-';
        document.getElementById('generatedAt').textContent = `기준: ${ts}`;

        // 핵심 지표
        const pending = (d.appointments.by_status || {}).pending || 0;
        const failures = d.security.login_failures_24h || 0;
        const locked   = d.security.locked_accounts    || 0;

        document.getElementById('s-appt-total').textContent   = d.appointments.today_total ?? '—';
        document.getElementById('s-appt-pending').textContent = pending;
        document.getElementById('s-failures').textContent     = failures;
        document.getElementById('s-locked').textContent       = locked;
        document.getElementById('s-audit').textContent        = d.security.audit_actions_24h ?? '—';
        document.getElementById('s-notif').textContent        = d.notifications.sent_24h ?? '—';

        // 카드 색상
        document.getElementById('sc-pending').className  = 'stat-card ' + (pending  > 0 ? 'warn' : 'ok');
        document.getElementById('sc-failures').className = 'stat-card ' + (failures > 5 ? 'error' : failures > 0 ? 'warn' : 'ok');
        document.getElementById('sc-locked').className   = 'stat-card ' + (locked   > 0 ? 'error' : 'ok');

        // 온프레미스 상태
        const onp = d.system.onprem_api;
        const onpEl = document.getElementById('onpremStatus');
        const cls   = 'status-badge status-' + (onp || 'unknown');
        const icon  = onp === 'ok' ? 'check-circle' : onp === 'error' ? 'times-circle' : 'question-circle';
        const label = { ok:'정상', error:'오류', not_configured:'미설정', unknown:'알 수 없음', degraded:'일부 오류' }[onp] || onp;
        onpEl.className = cls;
        onpEl.innerHTML = `<i class="fas fa-${icon}"></i> ${label}`;
        if (d.system.onprem_detail) onpEl.title = d.system.onprem_detail;

        // 오늘 예약 현황
        const byStatus = d.appointments.by_status || {};
        const apptEl = document.getElementById('apptStatus');
        const statuses = Object.keys(byStatus);
        if (!statuses.length) {
            apptEl.innerHTML = '<div class="empty-msg">오늘 예약이 없습니다.</div>';
        } else {
            apptEl.innerHTML = statuses.map(s => `
                <div class="appt-row">
                    <span class="appt-status-badge ${STATUS_CLS[s] || 's-default'}">${STATUS_LBL[s] || s}</span>
                    <span style="font-weight:700;font-size:16px;color:#1e293b;">${byStatus[s]}</span>
                </div>
            `).join('');
        }

        // 알림 현황
        const byChannel = d.notifications.by_channel || {};
        const notifEl   = document.getElementById('notifStatus');
        const channels  = [...new Set(Object.keys(byChannel).map(k => k.split('_')[0]))];
        if (!channels.length) {
            notifEl.innerHTML = '<div class="empty-msg">24시간 내 알림 없음</div>';
        } else {
            notifEl.innerHTML = channels.map(ch => {
                const sent   = byChannel[`${ch}_sent`]   || 0;
                const failed = byChannel[`${ch}_failed`] || 0;
                const icon   = ch === 'email' ? 'envelope' : 'sms';
                return `
                <div class="notif-row">
                    <span class="notif-channel"><i class="fas fa-${icon}" style="margin-right:6px;color:#64748b;"></i>${ch.toUpperCase()}</span>
                    <span class="notif-counts">
                        <span class="cnt-sent"><i class="fas fa-check" style="margin-right:3px;"></i>${sent}</span>
                        <span class="cnt-failed"><i class="fas fa-times" style="margin-right:3px;"></i>${failed}</span>
                    </span>
                </div>`;
            }).join('');
        }

        // 최근 이벤트
        const tbody = document.getElementById('eventBody');
        if (!d.recent_events || !d.recent_events.length) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">이벤트 없음</td></tr>';
        } else {
            tbody.innerHTML = d.recent_events.map(e => {
                const ts = e.event_at ? e.event_at.replace('T',' ').slice(0,19) : '-';
                const rc = e.result_code;
                const rcCls = rc === '200' ? 'color:#10b981' : rc && rc.startsWith('4') ? 'color:#ef4444' : 'color:#f59e0b';
                return `<tr>
                    <td style="font-weight:600;">${e.action_type || '-'}</td>
                    <td style="${rcCls};font-weight:700;">${rc || '-'}</td>
                    <td style="font-size:12px;color:#78909c;">${ts}</td>
                </tr>`;
            }).join('');
        }
    }

    init();
</script>
</body>
</html>
