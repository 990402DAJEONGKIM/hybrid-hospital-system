<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>운영 대시보드 - MZ Clinic 관리자</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-wrap { max-width:1200px; margin:80px auto 40px; padding:0 16px; }
        .dash-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
        .dash-header h2 { margin:0; font-size:20px; font-weight:800; color:#1e293b; }
        .refresh-btn { padding:8px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
        .refresh-btn:hover { opacity:.85; }
        .generated-at { font-size:12px; color:#94a3b8; }

        .stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
        .stat-card {
            background:#fff; border-radius:12px; padding:20px;
            box-shadow:0 1px 6px rgba(0,0,0,.06); border-left:4px solid #e2e8f0;
            cursor:default; transition:box-shadow .15s;
        }
        .stat-card.clickable { cursor:pointer; }
        .stat-card.clickable:hover { box-shadow:0 4px 16px rgba(0,0,0,.1); transform:translateY(-1px); }
        .stat-card.ok    { border-left-color:#10b981; }
        .stat-card.warn  { border-left-color:#f59e0b; }
        .stat-card.error { border-left-color:#ef4444; }
        .stat-card.info  { border-left-color:#3b82f6; }
        .stat-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#94a3b8; margin-bottom:8px; }
        .stat-value { font-size:28px; font-weight:800; color:#1e293b; line-height:1; }
        .stat-sub   { font-size:12px; color:#64748b; margin-top:6px; }

        .section-card { background:#fff; border-radius:12px; padding:22px 24px; box-shadow:0 1px 6px rgba(0,0,0,.06); margin-bottom:20px; }
        .section-title { font-size:14px; font-weight:700; color:#1e293b; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .section-title i { color:#94a3b8; }

        .status-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
        .status-ok            { background:#d1fae5; color:#065f46; }
        .status-error         { background:#fee2e2; color:#991b1b; }
        .status-not_configured{ background:#f1f5f9; color:#64748b; }
        .status-unknown       { background:#fef9c3; color:#854d0e; }
        .status-degraded      { background:#ffedd5; color:#9a3412; }

        .event-table { width:100%; border-collapse:collapse; font-size:13px; }
        .event-table th { background:#f8fafc; padding:8px 10px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #e2e8f0; }
        .event-table td { padding:8px 10px; border-bottom:1px solid #f1f5f9; color:#374151; }
        .event-table tr:hover td { background:#f8fafc; }
        .empty-msg { text-align:center; padding:32px; color:#94a3b8; font-size:13px; }

        .appt-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #f1f5f9; font-size:13px; }
        .appt-row:last-child { border-bottom:none; }
        .appt-status-badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
        .s-pending   { background:#fff8e1; color:#f57f17; }
        .s-confirmed { background:#e8f5e9; color:#2e7d32; }
        .s-completed { background:#e3f2fd; color:#1565c0; }
        .s-cancelled { background:#ffebee; color:#c62828; }
        .s-no_show   { background:#f3e5f5; color:#6a1b9a; }
        .s-default   { background:#f1f5f9; color:#475569; }

        .sec-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #f1f5f9; font-size:13px; }
        .sec-row:last-child { border-bottom:none; }
        .sec-cnt { font-weight:700; font-size:16px; color:#1e293b; }
        .sec-cnt.has-events { color:#ef4444; }
    </style>
</head>
<body>
<div id="page-content">
<div class="page-wrap">
    <div class="dash-header">
        <div>
            <h2><i class="fas fa-tachometer-alt" style="color:#1d4ed8;margin-right:8px;"></i>운영 통합 대시보드</h2>
            <p id="generatedAt" class="generated-at">로딩 중...</p>
        </div>
        <button class="refresh-btn" onclick="load()"><i class="fas fa-sync-alt" id="refreshIcon"></i> 새로고침</button>
    </div>
    <div id="errMsg" style="color:#e53935;font-size:13px;margin-bottom:12px;min-height:18px;"></div>

    <!-- 핵심 지표 카드 -->
    <div class="stat-grid" id="statGrid">
        <div class="stat-card" id="sc-appt-total">
            <div class="stat-label">오늘 예약</div>
            <div class="stat-value" id="s-appt-total">—</div>
            <div class="stat-sub">전체 건수</div>
        </div>
        <div class="stat-card" id="sc-appt-pending">
            <div class="stat-label">대기 예약</div>
            <div class="stat-value" id="s-appt-pending">—</div>
            <div class="stat-sub">확정 대기 중</div>
        </div>
        <div class="stat-card info" id="sc-pending-notif">
            <div class="stat-label">미처리 알림</div>
            <div class="stat-value" id="s-pending-notif">—</div>
            <div class="stat-sub">발송 대기(pending)</div>
        </div>
        <div class="stat-card clickable" id="sc-locked" onclick="loadPage('/admin-users.html')" title="클릭 시 사용자 관리로 이동">
            <div class="stat-label">잠금 계정 <i class="fas fa-arrow-right" style="font-size:9px;margin-left:3px;"></i></div>
            <div class="stat-value" id="s-locked">—</div>
            <div class="stat-sub">현재 잠금 중</div>
        </div>
        <div class="stat-card warn" id="sc-sec-events">
            <div class="stat-label">보안 이벤트</div>
            <div class="stat-value" id="s-sec-events">—</div>
            <div class="stat-sub">최근 24시간</div>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
        <!-- 시스템 연결 상태 -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-server"></i> 시스템 연결 상태</div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;">
                    <span style="font-weight:600;"><i class="fas fa-cloud" style="margin-right:6px;color:#3b82f6;"></i>Combined API (AWS)</span>
                    <span class="status-badge status-ok"><i class="fas fa-check-circle"></i> 정상</span>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;">
                    <span style="font-weight:600;"><i class="fas fa-hdd" style="margin-right:6px;color:#10b981;"></i>온프레미스 API</span>
                    <span id="onpremStatus" class="status-badge status-unknown"><i class="fas fa-spinner fa-spin"></i> 확인 중</span>
                </div>
            </div>
        </div>

        <!-- 오늘 예약 상태별 -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-calendar-check"></i> 오늘 예약 현황</div>
            <div id="apptStatus"><div class="empty-msg">로딩 중...</div></div>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <!-- 보안 이벤트 타입별 (24h) -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-shield-alt"></i> 보안 이벤트 현황 (24h)</div>
            <div id="secEvents"><div class="empty-msg">로딩 중...</div></div>
        </div>

        <!-- 최근 감사 이벤트 -->
        <div class="section-card">
            <div class="section-title"><i class="fas fa-history"></i> 최근 감사 이벤트</div>
            <div style="overflow-x:auto;">
                <table class="event-table">
                    <thead><tr><th>액션</th><th>결과</th><th>시각</th></tr></thead>
                    <tbody id="eventBody">
                        <tr><td colspan="3" class="empty-msg">로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/router.js"></script>
<script>
    const STATUS_LBL = { pending:'대기', confirmed:'확정', completed:'완료', cancelled:'취소', no_show:'미내원' };
    const STATUS_CLS = { pending:'s-pending', confirmed:'s-confirmed', completed:'s-completed', cancelled:'s-cancelled', no_show:'s-no_show' };
    const SEC_LBL = {
        BREAK_GLASS:   '긴급 접근 (Break-glass)',
        USER_LOCK:     '계정 잠금 처리',
        POLICY_UPDATE: '보안 정책 변경',
        ACCOUNT_LOCKED:'계정 자동 잠금',
        USER_DELETE:   '계정 삭제',
        USER_CREATE:   '계정 생성',
    };

    let _refreshTimer = null;

    async function init() {
        const me = await initLayout();
        if (!me) return;
        if (me.role !== 'admin') { alert('관리자 권한이 필요합니다.'); location.href = '/index.html'; return; }
        await load();
        if (_refreshTimer) clearInterval(_refreshTimer);
        _refreshTimer = setInterval(load, 60000);
    }

    async function load() {
        document.getElementById('errMsg').textContent = '';
        const icon = document.getElementById('refreshIcon');
        if (icon) icon.classList.add('fa-spin');

        const res = await apiCall('/admin/dashboard');
        if (icon) icon.classList.remove('fa-spin');

        if (!res || !res.ok) {
            document.getElementById('errMsg').textContent = '대시보드 데이터를 불러오지 못했습니다.';
            return;
        }
        render(await res.json());
    }

    function render(d) {
        const ts = d.generated_at ? new Date(d.generated_at).toLocaleString('ko-KR') : '-';
        document.getElementById('generatedAt').textContent = `기준: ${ts}`;

        const apptTotal   = d.appointments.today_total ?? 0;
        const apptPending = (d.appointments.by_status || {}).pending || 0;
        const locked      = d.security.locked_accounts ?? 0;
        const secTotal    = d.security.security_total_24h ?? 0;
        const pendingNotif = d.pending_notifications ?? 0;

        document.getElementById('s-appt-total').textContent   = apptTotal;
        document.getElementById('s-appt-pending').textContent = apptPending;
        document.getElementById('s-locked').textContent       = locked;
        document.getElementById('s-sec-events').textContent   = secTotal;
        document.getElementById('s-pending-notif').textContent = pendingNotif;

        // 카드 색상
        document.getElementById('sc-appt-pending').className = 'stat-card ' + (apptPending > 0 ? 'warn' : 'ok');
        document.getElementById('sc-locked').className       = 'stat-card clickable ' + (locked > 0 ? 'error' : 'ok');
        document.getElementById('sc-sec-events').className   = 'stat-card ' + (secTotal > 0 ? 'warn' : 'ok');
        document.getElementById('sc-pending-notif').className = 'stat-card ' + (pendingNotif > 10 ? 'warn' : 'info');

        // 온프레미스 상태
        const onp = d.system.onprem_api;
        const onpEl = document.getElementById('onpremStatus');
        const icon  = onp === 'ok' ? 'check-circle' : onp === 'error' ? 'times-circle' : 'question-circle';
        const label = { ok:'정상', error:'오류', not_configured:'미설정', unknown:'알 수 없음', degraded:'일부 오류' }[onp] || onp;
        onpEl.className = `status-badge status-${onp || 'unknown'}`;
        onpEl.innerHTML = `<i class="fas fa-${icon}"></i> ${label}`;
        if (d.system.onprem_detail) onpEl.title = d.system.onprem_detail;

        // 오늘 예약 현황
        const byStatus = d.appointments.by_status || {};
        const apptEl   = document.getElementById('apptStatus');
        const statuses = Object.keys(byStatus);
        apptEl.innerHTML = statuses.length
            ? statuses.map(s => `
                <div class="appt-row">
                    <span class="appt-status-badge ${STATUS_CLS[s] || 's-default'}">${STATUS_LBL[s] || s}</span>
                    <span style="font-weight:700;font-size:16px;color:#1e293b;">${byStatus[s]}</span>
                </div>`).join('')
            : '<div class="empty-msg">오늘 예약이 없습니다.</div>';

        // 보안 이벤트 타입별
        const evByType = d.security.events_by_type || {};
        const secEl    = document.getElementById('secEvents');
        const secKeys  = Object.keys(evByType);
        secEl.innerHTML = secKeys.length
            ? secKeys.map(k => `
                <div class="sec-row">
                    <span style="color:#374151;">${_esc(SEC_LBL[k] || k)}</span>
                    <span class="sec-cnt ${evByType[k] > 0 ? 'has-events' : ''}">${evByType[k]}</span>
                </div>`).join('')
            : '<div class="empty-msg">24시간 내 보안 이벤트 없음</div>';

        // 최근 감사 이벤트
        const tbody = document.getElementById('eventBody');
        tbody.innerHTML = (d.recent_events || []).length
            ? d.recent_events.map(e => {
                const ts  = e.event_at ? e.event_at.replace('T',' ').slice(0,19) : '-';
                const rc  = e.result_code;
                const cls = rc === '200' ? 'color:#10b981' : rc?.startsWith('4') ? 'color:#ef4444' : 'color:#f59e0b';
                return `<tr>
                    <td style="font-weight:600;">${_esc(e.action_type || '-')}</td>
                    <td style="${cls};font-weight:700;">${_esc(rc || '-')}</td>
                    <td style="font-size:12px;color:#78909c;">${_esc(ts)}</td>
                </tr>`;
            }).join('')
            : '<tr><td colspan="3" class="empty-msg">이벤트 없음</td></tr>';
    }

    function _esc(s) {
        return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    init();
</script>
</body>
</html>
