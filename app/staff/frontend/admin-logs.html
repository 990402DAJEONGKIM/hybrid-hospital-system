<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>감사 로그 - MZ Clinic 관리자</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-wrap { max-width:1200px; margin:80px auto 40px; padding:0 16px; }
        .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .toolbar label { font-size:14px; color:#546e7a; font-weight:600; }
        .toolbar select, .toolbar input[type="number"] { padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; }
        .toolbar button { padding:8px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .data-table { width:100%; border-collapse:collapse; font-size:13px; }
        .data-table th { background:#eceff1; padding:9px 10px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; white-space:nowrap; }
        .data-table td { padding:9px 10px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        .data-table tr:hover td { background:#f9f9f9; }
        .action-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; font-family:monospace; }
        .tag-read   { background:#e3f2fd; color:#1565c0; }
        .tag-create { background:#e8f5e9; color:#2e7d32; }
        .tag-update { background:#fff8e1; color:#e65100; }
        .tag-cancel { background:#ffebee; color:#c62828; }
        .tag-login  { background:#f3e5f5; color:#6a1b9a; }
        .tag-other  { background:#f5f5f5; color:#546e7a; }
        .code-ok    { color:#2e7d32; font-weight:600; }
        .code-err   { color:#c62828; font-weight:600; }
        .empty-msg  { text-align:center; padding:40px; color:#90a4ae; }
        .back-link { font-size:13px; color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <a class="back-link" href="/index.html"><i class="fas fa-arrow-left"></i> 대시보드</a>
    <h2 style="margin-bottom:6px;">시스템 감사 로그</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:20px;">ISMS-P 2.9.1 — 전체 사용자 활동 로그 (최신순)</p>

    <div class="toolbar">
        <label>행위 유형</label>
        <select id="actionFilter">
            <option value="">전체</option>
            <option value="CREATE_APPOINTMENT">예약 생성</option>
            <option value="UPDATE_APPOINTMENT">예약 수정</option>
            <option value="CANCEL_APPOINTMENT">예약 취소</option>
            <option value="APPT_STATUS_CONFIRMED">예약 확정</option>
            <option value="APPT_STATUS_COMPLETED">예약 완료</option>
            <option value="APPT_STATUS_CANCELLED">예약 취소(스태프)</option>
            <option value="READ_PATIENT_DETAIL">환자 정보 조회</option>
            <option value="VIEW_WARD_STATUS">병동 현황 조회</option>
        </select>
        <label>최대 건수</label>
        <input type="number" id="limitInput" value="100" min="10" max="500" style="width:80px;">
        <button onclick="load()">조회</button>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th>발생 시각</th>
                <th>행위 유형</th>
                <th>사용자 ID</th>
                <th>대상 테이블</th>
                <th>환자 Hash</th>
                <th>IP</th>
                <th>결과</th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    async function init() {
        const me = await requireLogin();
        if (!me) return;
        if (me.role !== 'admin') {
            alert('관리자 권한이 필요합니다.');
            location.href = 'index.html';
            return;
        }
        await load();
    }

    async function load() {
        const action = document.getElementById('actionFilter').value;
        const limit  = document.getElementById('limitInput').value || 100;
        let path     = `/admin/audit-logs?limit=${limit}`;
        if (action) path += `&action_type=${action}`;

        const res = await apiCall(path);
        if (!res || !res.ok) {
            document.getElementById('logBody').innerHTML =
                `<tr><td colspan="7" class="empty-msg">감사 로그를 불러오지 못했습니다.</td></tr>`;
            return;
        }
        const logs = await res.json();
        renderLogs(logs);
    }

    function actionTagClass(action) {
        if (!action) return 'tag-other';
        if (action.startsWith('READ') || action.startsWith('VIEW')) return 'tag-read';
        if (action.startsWith('CREATE')) return 'tag-create';
        if (action.startsWith('UPDATE') || action.startsWith('APPT_STATUS')) return 'tag-update';
        if (action.startsWith('CANCEL')) return 'tag-cancel';
        if (action.includes('LOGIN')) return 'tag-login';
        return 'tag-other';
    }

    function renderLogs(logs) {
        const tbody = document.getElementById('logBody');
        if (!logs.length) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">조회된 로그가 없습니다.</td></tr>`;
            return;
        }
        tbody.innerHTML = logs.map(log => {
            const ts      = log.event_at ? log.event_at.replace('T', ' ').slice(0, 19) : '-';
            const uid     = log.user_id  ? log.user_id.slice(0, 8) + '…'              : '-';
            const hash    = log.patient_id_hash ? log.patient_id_hash.slice(0, 12) + '…' : '-';
            const tagCls  = actionTagClass(log.action_type);
            const codeCls = log.result_code && log.result_code.startsWith('2') ? 'code-ok' : 'code-err';
            return `
            <tr>
                <td style="white-space:nowrap;">${ts}</td>
                <td><span class="action-tag ${tagCls}">${log.action_type || '-'}</span></td>
                <td style="font-family:monospace;font-size:11px;">${uid}</td>
                <td>${log.target_table || '-'}</td>
                <td style="font-family:monospace;font-size:11px;">${hash}</td>
                <td>${log.source_ip || '-'}</td>
                <td class="${codeCls}">${log.result_code || '-'}</td>
            </tr>`;
        }).join('');
    }

    init();
</script>
</body>
</html>
