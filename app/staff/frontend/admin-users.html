<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사용자 계정 관리 - MZ Clinic 관리자</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-wrap { max-width:1200px; margin:80px auto 40px; padding:0 16px; }
        .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .data-table { width:100%; border-collapse:collapse; font-size:14px; }
        .data-table th { background:#eceff1; padding:10px 12px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
        .badge-active   { background:#e8f5e9; color:#2e7d32; }
        .badge-locked   { background:#ffebee; color:#c62828; }
        .btn-primary  { padding:9px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .btn-sm { padding:5px 12px; border:none; border-radius:4px; font-size:12px; font-weight:600; cursor:pointer; }
        .btn-lock   { background:#fff8e1; color:#e65100; }
        .btn-unlock { background:#e8f5e9; color:#2e7d32; }

        /* 모달 */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:#fff; border-radius:10px; padding:28px; width:420px; max-width:95vw; }
        .modal-box h3 { margin-bottom:20px; font-size:17px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; font-weight:600; color:#546e7a; margin-bottom:5px; }
        .form-group input, .form-group select { width:100%; padding:9px 11px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; box-sizing:border-box; }
        .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
        .btn-cancel-modal { padding:9px 18px; background:#eceff1; color:#546e7a; border:none; border-radius:6px; font-size:14px; cursor:pointer; }
        #errMsg { color:#e53935; font-size:13px; margin-top:6px; min-height:16px; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <div class="toolbar">
        <div>
            <h2 style="margin-bottom:4px;">사용자 계정 관리</h2>
            <p style="color:#78909c;font-size:13px;margin:0;">ISMS-P 2.5.1 — 계정 생성·잠금·해제</p>
        </div>
        <button class="btn-primary" onclick="openCreateModal()">+ 신규 계정 생성</button>
    </div>

    <table class="data-table" id="userTable">
        <thead>
            <tr>
                <th>이메일</th>
                <th>역할</th>
                <th>상태</th>
                <th>마지막 로그인</th>
                <th>생성일</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="userBody"></tbody>
    </table>
</div>

<!-- 신규 계정 생성 모달 -->
<div class="modal-overlay" id="createModal">
    <div class="modal-box">
        <h3>신규 계정 생성</h3>
        <div class="form-group">
            <label>이메일 *</label>
            <input type="email" id="newEmail" placeholder="user@example.com">
        </div>
        <div class="form-group">
            <label>비밀번호 *</label>
            <input type="password" id="newPassword" placeholder="8자 이상, 대·소문자·숫자·특수문자">
        </div>
        <div class="form-group">
            <label>역할 *</label>
            <select id="newRole">
                <option value="doctor">의사</option>
                <option value="nurse">간호사 / 원무과</option>
                <option value="admin">관리자</option>
            </select>
        </div>
        <div class="form-group" id="doctorIdGroup">
            <label>Doctor ID (UUID, 의사 계정 시 선택)</label>
            <input type="text" id="newDoctorId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </div>
        <div id="errMsg"></div>
        <div class="modal-footer">
            <button class="btn-cancel-modal" onclick="closeModal()">취소</button>
            <button class="btn-primary" onclick="createUser()">생성</button>
        </div>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    async function init() {
        const me = await requireLogin();
        if (!me) return;
        if (me.role !== 'admin') {
            alert('관리자 권한이 필요합니다.');
            location.href = 'index.html';
            return;
        }
        await loadUsers();
    }

    async function loadUsers() {
        const res = await apiCall('/admin/users');
        if (!res || !res.ok) {
            document.getElementById('userBody').innerHTML =
                `<tr><td colspan="6" style="text-align:center;padding:30px;color:#90a4ae;">사용자 목록을 불러오지 못했습니다.</td></tr>`;
            return;
        }
        const users = await res.json();
        const ROLE_LABEL = { doctor: '의사', nurse: '간호사/원무과', admin: '관리자', patient: '환자' };
        document.getElementById('userBody').innerHTML = users.map(u => {
            const isActive  = u.is_active;
            const statusLbl = isActive ? '활성' : '잠금';
            const badgeCls  = isActive ? 'badge-active' : 'badge-locked';
            const loginAt   = u.last_login_at ? u.last_login_at.replace('T', ' ').slice(0, 16) : '-';
            const createdAt = u.created_at    ? u.created_at.replace('T', ' ').slice(0, 10)    : '-';
            return `
            <tr>
                <td>${u.email}</td>
                <td>${ROLE_LABEL[u.role_code] || u.role_name || u.role_code}</td>
                <td><span class="badge ${badgeCls}">${statusLbl}</span></td>
                <td>${loginAt}</td>
                <td>${createdAt}</td>
                <td>
                    <button class="btn-sm ${isActive ? 'btn-lock' : 'btn-unlock'}"
                        onclick="toggleLock('${u.user_id}', ${isActive})">
                        ${isActive ? '잠금' : '해제'}
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    async function toggleLock(id, currentActive) {
        const action = currentActive ? '잠금' : '해제';
        if (!confirm(`해당 계정을 ${action}하시겠습니까?`)) return;
        const res = await apiCall(`/admin/users/${id}/lock`, { method: 'PATCH' });
        if (res && res.ok) {
            await loadUsers();
        } else {
            const err = await res?.json().catch(() => ({}));
            alert(err.detail || `${action} 처리 중 오류가 발생했습니다.`);
        }
    }

    function openCreateModal() {
        document.getElementById('newEmail').value     = '';
        document.getElementById('newPassword').value  = '';
        document.getElementById('newDoctorId').value  = '';
        document.getElementById('errMsg').textContent = '';
        document.getElementById('createModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('createModal').classList.remove('open');
    }

    document.getElementById('newRole').addEventListener('change', (e) => {
        document.getElementById('doctorIdGroup').style.display = e.target.value === 'doctor' ? 'block' : 'none';
    });
    document.getElementById('doctorIdGroup').style.display = 'block';

    async function createUser() {
        const email    = document.getElementById('newEmail').value.trim();
        const password = document.getElementById('newPassword').value;
        const roleCode = document.getElementById('newRole').value;
        const doctorId = document.getElementById('newDoctorId').value.trim();

        if (!email || !password) {
            document.getElementById('errMsg').textContent = '이메일과 비밀번호를 입력해주세요.';
            return;
        }

        const body = { email, password, role_code: roleCode };
        if (doctorId) body.doctor_id = doctorId;

        const res = await apiCall('/admin/users', {
            method: 'POST',
            body: JSON.stringify(body),
        });

        if (res && res.ok) {
            alert('계정이 생성되었습니다.');
            closeModal();
            await loadUsers();
        } else {
            const err = await res?.json().catch(() => ({}));
            document.getElementById('errMsg').textContent = err.detail || '계정 생성 중 오류가 발생했습니다.';
        }
    }

    init();
</script>
</body>
</html>
