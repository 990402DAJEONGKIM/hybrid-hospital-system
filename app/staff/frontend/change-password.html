<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - 김이박 클리닉 직원</title>
    <link rel="stylesheet" href="/css/tailwind.min.css">
    <link rel="stylesheet" href="/css/fa-all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh;
        }
        .card {
            border-top: 4px solid #1d4ed8;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }
        .submit-btn { background: #1d3a6e; transition: background 0.2s; }
        .submit-btn:hover { background: #1e40af; }
    </style>
</head>
<body style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1rem;">

    <div class="w-full max-w-md">

        <!-- 로고 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white bg-opacity-10 mb-4">
                <i class="fas fa-key text-2xl text-blue-300"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">김이박 클리닉</h1>
            <p class="text-sm text-blue-300 mt-1 font-medium tracking-widest uppercase">직원 비밀번호 변경</p>
        </div>

        <!-- 카드 -->
        <div class="card bg-white rounded-2xl p-8">

            <!-- 보안 경고 -->
            <div class="flex items-start gap-3 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-6">
                <i class="fas fa-exclamation-triangle text-amber-500 mt-0.5 flex-shrink-0"></i>
                <p class="text-xs text-amber-800 leading-relaxed">
                    보안 정책에 따라 <strong>90일마다</strong> 비밀번호를 변경해야 합니다.<br>
                    변경 후 기존 세션은 모두 종료되며 재로그인이 필요합니다.
                </p>
            </div>

            <form id="changePasswordForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">현재 비밀번호</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-lock text-sm"></i>
                        </span>
                        <input type="password" id="oldPassword" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 outline-none bg-gray-50 focus:bg-white transition">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-lock-open text-sm"></i>
                        </span>
                        <input type="password" id="newPassword" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 outline-none bg-gray-50 focus:bg-white transition">
                    </div>
                    <p class="text-xs text-gray-400 mt-1 pl-1">8자 이상, 영문·숫자·특수문자 중 2종류 이상 조합</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호 확인</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-check-circle text-sm"></i>
                        </span>
                        <input type="password" id="confirmPassword" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 outline-none bg-gray-50 focus:bg-white transition">
                    </div>
                </div>

                <div id="apiError" class="hidden p-3 bg-red-50 border border-red-300 rounded-xl text-sm text-red-700 flex items-center gap-2">
                    <i class="fas fa-exclamation-circle flex-shrink-0"></i>
                    <span id="apiErrorMsg"></span>
                </div>
                <div id="apiSuccess" class="hidden p-3 bg-green-50 border border-green-300 rounded-xl text-sm text-green-700 flex items-center gap-2">
                    <i class="fas fa-check-circle flex-shrink-0"></i>
                    <span id="apiSuccessMsg"></span>
                </div>

                <button type="submit" id="submitBtn"
                    class="submit-btn w-full text-white py-3 rounded-xl font-bold disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-shield-alt mr-2"></i>비밀번호 변경
                </button>
            </form>

            <div class="mt-5 pt-4 border-t border-gray-100 text-center">
                <button id="logoutLink" class="text-sm text-gray-400 hover:text-gray-600 hover:underline">
                    로그아웃 후 나중에 변경
                </button>
            </div>
        </div>

    </div>

    <script src="js/config.js"></script>
    <script>
        (async () => {
            const res = await fetch(`${BASE_URL}/auth/me`, {
                credentials: 'include',
                headers: { 'X-API-Key': API_KEY },
            }).catch(() => null);
            if (!res || !res.ok) window.location.href = 'login.html';
        })();

        document.getElementById('logoutLink').addEventListener('click', async () => {
            await fetch(`${BASE_URL}/auth/logout`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
            }).catch(() => {});
            window.location.href = 'login.html';
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const oldPw     = document.getElementById('oldPassword').value;
            const newPw     = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;
            const errorBox  = document.getElementById('apiError');
            const errorMsg  = document.getElementById('apiErrorMsg');
            const successBox = document.getElementById('apiSuccess');
            const successMsg = document.getElementById('apiSuccessMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorBox.classList.add('hidden');
            successBox.classList.add('hidden');

            if (newPw !== confirmPw) {
                errorMsg.textContent = '새 비밀번호가 일치하지 않습니다.';
                errorBox.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>변경 중...';

            try {
                const res = await fetch(`${BASE_URL}/auth/change-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
                });

                if (res.status === 204) {
                    successMsg.textContent = '비밀번호가 변경되었습니다. 로그인 페이지로 이동합니다.';
                    successBox.classList.remove('hidden');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    const data = await res.json().catch(() => ({}));
                    errorMsg.textContent = data.detail || '비밀번호 변경에 실패했습니다.';
                    errorBox.classList.remove('hidden');
                }
            } catch {
                errorMsg.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
                errorBox.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-shield-alt mr-2"></i>비밀번호 변경';
            }
        });
    </script>
</body>
</html>
