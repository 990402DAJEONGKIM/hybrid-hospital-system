<!DOCTYPE html>
<!-- by 김다정 — 처방전 작성·조회 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>처방전 작성 - 김이박 클리닉 의사</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-wrap { max-width:960px; margin:80px auto 40px; padding:0 16px; }
        .back-link { font-size:13px; color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
        .card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.07); margin-bottom:24px; }
        .form-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
        .form-group { display:flex; flex-direction:column; gap:4px; flex:1; min-width:180px; }
        .form-group label { font-size:13px; font-weight:600; color:#546e7a; }
        .form-group input, .form-group select, .form-group textarea {
            padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; outline:none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
        .btn-primary { padding:9px 22px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .btn-primary:hover { opacity:.9; }
        .drug-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
        .drug-row input { flex:1; min-width:100px; padding:7px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:13px; }
        .btn-remove { background:#ffebee; color:#c62828; border:none; border-radius:4px; padding:5px 10px; font-size:12px; cursor:pointer; }
        .btn-add    { background:#e8f5e9; color:#2e7d32; border:none; border-radius:4px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:14px; }
        .data-table { width:100%; border-collapse:collapse; font-size:14px; }
        .data-table th { background:#eceff1; padding:10px 12px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        .data-table tr:hover td { background:#f5f5f5; }
        #msg { font-size:13px; font-weight:600; min-height:18px; margin-top:8px; }
        .msg-ok  { color:#2e7d32; }
        .msg-err { color:#c62828; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 대시보드</a>
    <h2 style="margin-bottom:4px;">처방전 작성</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:20px;">
        환자 ID(해시)와 진단코드(ICD)를 기반으로 처방합니다.
        <!-- by 김다정 — 1등급 원본 데이터(진단 원문) 미노출, patient_id_hash·ICD코드만 사용 -->
    </p>

    <div class="card">
        <h3 style="margin:0 0 16px;font-size:16px;">처방 정보 입력</h3>
        <div class="form-row">
            <div class="form-group">
                <label>환자 ID (Hash)</label>
                <!-- by 김다정 — 실명·주민번호 대신 patient_id_hash 입력 (ISMS-P 원칙) -->
                <input type="text" id="patientHash" placeholder="patient_id_hash 8자 이상" maxlength="64">
            </div>
            <div class="form-group">
                <label>진단코드 (ICD)</label>
                <input type="text" id="icdCode" placeholder="예: J06.9">
            </div>
            <div class="form-group">
                <label>처방일</label>
                <input type="date" id="prescDate">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex:3;">
                <label>비고</label>
                <textarea id="prescNote" rows="2" placeholder="처방 관련 메모 (로그에 남지 않음)"></textarea>
            </div>
        </div>

        <div style="margin-bottom:8px;font-size:13px;font-weight:600;color:#546e7a;">처방 약품 목록</div>
        <div id="drugList">
            <div class="drug-row">
                <input type="text" placeholder="약품명">
                <input type="text" placeholder="용량" style="max-width:90px;">
                <input type="text" placeholder="횟수/일" style="max-width:80px;">
                <input type="number" placeholder="일수" style="max-width:70px;" min="1">
                <button class="btn-remove" onclick="removeDrug(this)">삭제</button>
            </div>
        </div>
        <button class="btn-add" onclick="addDrug()"><i class="fas fa-plus"></i> 약품 추가</button>

        <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn-primary" onclick="submitPrescription()">처방 저장</button>
            <span id="msg"></span>
        </div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 16px;font-size:16px;">최근 처방 내역</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>처방일</th>
                    <th>환자 ID (Hash)</th>
                    <th>진단코드</th>
                    <th>약품 수</th>
                </tr>
            </thead>
            <tbody id="prescBody">
                <tr><td colspan="4" style="text-align:center;padding:30px;color:#90a4ae;">데이터를 불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/script.js"></script>
<script src="../js/auth.js"></script>
<script>
    // by 김다정 — 처방전 페이지 초기화 (doctor 역할 전용)
    (async () => {
        const me = await requireRole(['doctor']);
        if (!me) return;
        document.getElementById('prescDate').value = new Date().toISOString().split('T')[0];
        await loadRecentPrescriptions();
    })();

    function addDrug() {
        const row = document.createElement('div');
        row.className = 'drug-row';
        row.innerHTML = `
            <input type="text" placeholder="약품명">
            <input type="text" placeholder="용량" style="max-width:90px;">
            <input type="text" placeholder="횟수/일" style="max-width:80px;">
            <input type="number" placeholder="일수" style="max-width:70px;" min="1">
            <button class="btn-remove" onclick="removeDrug(this)">삭제</button>`;
        document.getElementById('drugList').appendChild(row);
    }

    function removeDrug(btn) {
        const rows = document.querySelectorAll('#drugList .drug-row');
        if (rows.length > 1) btn.closest('.drug-row').remove();
    }

    async function submitPrescription() {
        const patientHash = document.getElementById('patientHash').value.trim();
        const icdCode     = document.getElementById('icdCode').value.trim();
        const prescDate   = document.getElementById('prescDate').value;
        const msg         = document.getElementById('msg');

        if (!patientHash || !icdCode || !prescDate) {
            msg.textContent = '환자 ID, 진단코드, 처방일은 필수입니다.';
            msg.className = 'msg-err';
            return;
        }

        const drugs = [];
        document.querySelectorAll('#drugList .drug-row').forEach(row => {
            const inputs = row.querySelectorAll('input');
            if (inputs[0].value.trim()) {
                drugs.push({
                    drug_name: inputs[0].value.trim(),
                    dosage:    inputs[1].value.trim(),
                    frequency: inputs[2].value.trim(),
                    days:      parseInt(inputs[3].value) || 1,
                });
            }
        });

        const res = await apiCall('/emr/prescriptions', {
            method: 'POST',
            body: JSON.stringify({ patient_id_hash: patientHash, icd_code: icdCode, presc_date: prescDate, drugs }),
        });

        if (res && res.ok) {
            msg.textContent = '처방이 저장되었습니다.';
            msg.className = 'msg-ok';
            await loadRecentPrescriptions();
        } else {
            const data = await res?.json().catch(() => ({}));
            msg.textContent = data.detail || '저장 중 오류가 발생했습니다.';
            msg.className = 'msg-err';
        }
    }

    async function loadRecentPrescriptions() {
        const res = await apiCall('/emr/prescriptions');
        const tbody = document.getElementById('prescBody');
        if (!res || !res.ok) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:30px;color:#90a4ae;">처방 내역을 불러올 수 없습니다.</td></tr>';
            return;
        }
        const list = await res.json();
        if (!list.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:30px;color:#90a4ae;">처방 내역이 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(p => `
            <tr>
                <td>${p.presc_date}</td>
                <td style="font-mono;font-size:12px;">${p.patient_id_hash?.slice(0,8) || '-'}…</td>
                <td>${p.icd_code}</td>
                <td>${p.drug_count ?? '-'}개</td>
            </tr>`).join('');
    }
</script>
</body>
</html>
