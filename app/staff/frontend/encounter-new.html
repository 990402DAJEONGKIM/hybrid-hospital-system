<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진료 등록 — 김이박 병원</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-wrap { max-width:640px; margin:80px auto 40px; padding:0 16px; }
        .form-card { background:#fff; border-radius:12px; padding:28px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:13px; font-weight:700; color:#546e7a; margin-bottom:6px; }
        .form-group input, .form-group select, .form-group textarea {
            width:100%; padding:10px 12px; border:1px solid #cfd8dc; border-radius:6px;
            font-size:14px; box-sizing:border-box;
        }
        .form-group textarea { height:90px; resize:vertical; }
        .form-group .hint { font-size:11px; color:#90a4ae; margin-top:4px; }
        .patient-info { background:#f5f7fa; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:14px; color:#374151; }
        .patient-info strong { display:block; font-size:15px; margin-bottom:4px; }
        .btn-submit { width:100%; padding:12px; background:#059669; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; }
        .btn-submit:hover { background:#047857; }
        #statusMsg { margin-top:14px; padding:10px 14px; border-radius:6px; font-size:14px; display:none; }
        .msg-ok  { background:#d1fae5; color:#065f46; }
        .msg-err { background:#fee2e2; color:#991b1b; }
        .back-link { font-size:13px; color:var(--primary,#1e88e5); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
        .isms-notice { background:#fff8e1; border:1px solid #f59e0b; border-radius:6px; padding:10px 16px; font-size:12px; color:#92400e; margin-bottom:18px; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <a class="back-link" href="/patient-search.html"><i class="fas fa-arrow-left"></i> 환자 검색으로 돌아가기</a>
    <h2 style="margin-bottom:4px;">진료 등록</h2>
    <p style="color:#78909c;font-size:13px;margin-bottom:14px;">온프레미스 EMR — 원무과·관리자 전용</p>

    <div class="isms-notice">
        <i class="fas fa-lock" style="margin-right:6px;"></i>
        진료 등록 내용은 <strong>감사 로그</strong>에 기록됩니다 (ISMS-P 2.9.1). 주호소(Chief Complaint)는 1등급 데이터입니다.
    </div>

    <div class="form-card">
        <div class="patient-info">
            <strong id="patientNameDisplay">환자 정보 로딩 중...</strong>
            <span id="patientIdDisplay" style="font-size:12px;color:#78909c;"></span>
        </div>

        <form id="encounterForm" onsubmit="submitEncounter(event)">
            <div class="form-group">
                <label>예약 유형 <span style="color:#e53935;">*</span></label>
                <select id="encounterType" required>
                    <option value="">선택하세요</option>
                    <option value="outpatient_new">초진 외래</option>
                    <option value="outpatient_return">재진 외래</option>
                    <option value="inpatient">입원</option>
                    <option value="pre_surgery">수술 전</option>
                </select>
            </div>

            <div class="form-group">
                <label>진료과</label>
                <select id="departmentCode">
                    <option value="">— 선택 안 함 —</option>
                </select>
            </div>

            <div class="form-group">
                <label>담당 의사</label>
                <select id="doctorId">
                    <option value="">— 선택 안 함 —</option>
                </select>
            </div>

            <div class="form-group">
                <label>방문 일시</label>
                <input type="datetime-local" id="visitDatetime" />
                <div class="hint">미입력 시 현재 시각으로 등록됩니다.</div>
            </div>

            <div class="form-group">
                <label>주호소 (Chief Complaint) <span style="color:#e53935;font-size:11px;">1등급 데이터</span></label>
                <textarea id="chiefComplaint" placeholder="환자 호소 증상을 입력하세요."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save" style="margin-right:6px;"></i>진료 등록
            </button>
        </form>

        <div id="statusMsg"></div>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    const params   = new URLSearchParams(window.location.search);
    const patientId = params.get('pid');
    // by 김다정 — pname URL 파라미터 제거, 백엔드 API로 마스킹된 정보 조회 (ISMS-P 하드스톱 수정)
    async function init() {
        const me = await requireLogin();
        if (!me) return;

        if (!['nurse', 'admin'].includes(me.role)) {
            alert('원무과·관리자만 진료를 등록할 수 있습니다.');
            window.location.href = '/index.html';
            return;
        }

        if (!patientId) {
            alert('환자 정보가 없습니다. 환자 검색 화면으로 이동합니다.');
            window.location.href = '/patient-search.html';
            return;
        }

        // by 김다정 — 실명은 URL에서 받지 않고 API로 조회 후 마스킹 표시
        const pRes = await apiCall(`/emr/patients/${patientId}`);
        if (pRes?.ok) {
            const p = await pRes.json();
            const masked = p.patient_name ? p.patient_name[0] + '●'.repeat(Math.max(p.patient_name.length - 1, 1)) : '환자';
            document.getElementById('patientNameDisplay').textContent = masked;
        } else {
            document.getElementById('patientNameDisplay').textContent = '환자';
        }
        document.getElementById('patientIdDisplay').textContent = `ID: ${patientId.slice(0,8)}…`;

        await loadDepartments();
    }

    async function loadDepartments() {
        const res = await apiCall('/emr/departments');
        if (!res || !res.ok) return;
        const depts = await res.json();
        const sel = document.getElementById('departmentCode');
        depts.forEach(d => {
            const opt = document.createElement('option');
            opt.value       = d.department_code;
            opt.textContent = d.department_name;
            sel.appendChild(opt);
        });
        sel.addEventListener('change', loadDoctors);
    }

    async function loadDoctors() {
        const deptCode = document.getElementById('departmentCode').value;
        const url = deptCode ? `/emr/doctors?department_code=${deptCode}` : '/emr/doctors';
        const res = await apiCall(url);
        const doctorSel = document.getElementById('doctorId');
        doctorSel.innerHTML = '<option value="">— 선택 안 함 —</option>';
        if (!res || !res.ok) return;
        const doctors = await res.json();
        doctors.forEach(d => {
            const opt = document.createElement('option');
            opt.value       = d.doctor_id;
            opt.textContent = d.doctor_name;
            doctorSel.appendChild(opt);
        });
    }

    async function submitEncounter(e) {
        e.preventDefault();
        const msgEl = document.getElementById('statusMsg');
        msgEl.style.display = 'none';

        const body = {
            patient_id:      patientId,
            encounter_type:  document.getElementById('encounterType').value,
            department_code: document.getElementById('departmentCode').value || null,
            doctor_id:       document.getElementById('doctorId').value || null,
            chief_complaint: document.getElementById('chiefComplaint').value.trim() || null,
            visit_datetime:  document.getElementById('visitDatetime').value || null,
        };

        const res = await apiCall('/emr/encounters', {
            method: 'POST',
            body: JSON.stringify(body),
        });

        if (!res) return;
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            msgEl.textContent   = `오류: ${err.detail || '등록에 실패했습니다.'}`;
            msgEl.className     = 'msg-err';
            msgEl.style.display = 'block';
            return;
        }
        const data = await res.json();
        msgEl.textContent   = `진료가 등록되었습니다. (ID: ${data.encounter_id?.slice(0,8)}…)`;
        msgEl.className     = 'msg-ok';
        msgEl.style.display = 'block';
        document.getElementById('encounterForm').reset();

        setTimeout(() => { window.location.href = `/patient-search.html`; }, 2000);
    }

    init();
</script>
</body>
</html>
