<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김이박 클리닉 - 의료진 포털(임시.)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portal-wrap { max-width:1100px; margin:80px auto 40px; padding:0 24px; }
        .welcome-bar {
            background: linear-gradient(90deg, #0f172a, #1e3a5f);
            color:#fff; border-radius:12px; padding:20px 28px;
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:32px;
        }
        .welcome-bar h2 { margin:0; font-size:20px; }
        .welcome-bar p  { margin:4px 0 0; font-size:13px; opacity:.75; }
        .role-badge {
            background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
            border-radius:20px; padding:4px 14px; font-size:12px; font-weight:700;
            letter-spacing:.5px; text-transform:uppercase;
        }
        .menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; }
        .menu-card {
            background:#fff; border-radius:12px; padding:24px 22px;
            box-shadow:0 2px 12px rgba(0,0,0,.07); cursor:pointer;
            transition:transform .15s, box-shadow .15s;
            border-left:4px solid var(--primary);
            text-decoration:none; display:block; color:inherit;
        }
        .menu-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,.12); }
        .menu-card .icon {
            width:44px; height:44px; border-radius:10px;
            background:#e3f2fd; color:var(--primary);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; margin-bottom:14px;
        }
        .menu-card h3 { margin:0 0 4px; font-size:16px; color:#1e293b; }
        .menu-card p  { margin:0; font-size:13px; color:#78909c; }

        /* 역할별 accent */
        .role-nurse  .menu-card { border-left-color:#059669; }
        .role-nurse  .menu-card .icon { background:#d1fae5; color:#059669; }
        .role-doctor .menu-card { border-left-color:#7c3aed; }
        .role-doctor .menu-card .icon { background:#ede9fe; color:#7c3aed; }
        .role-admin  .menu-card { border-left-color:#dc2626; }
        .role-admin  .menu-card .icon { background:#fee2e2; color:#dc2626; }

        .logout-btn {
            background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.4);
            color:#fff; padding:7px 16px; border-radius:8px; font-size:13px;
            cursor:pointer; transition:background .2s;
        }
        .logout-btn:hover { background:rgba(255,255,255,.25); }
        .pw-expired-banner {
            background:#fef3c7; border:1px solid #f59e0b; border-radius:8px;
            padding:12px 18px; margin-bottom:20px; font-size:13px; color:#92400e;
            display:flex; align-items:center; gap:10px;
        }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">

<div class="portal-wrap" id="portalWrap">
    <!-- pw expired banner -->
    <div class="pw-expired-banner" id="pwBanner" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i>
        비밀번호가 만료되었습니다. 지금 바로 변경해주세요.
        <a href="/change-password.html" style="margin-left:auto;font-weight:700;color:#92400e;text-decoration:underline;">변경하기</a>
    </div>

    <!-- welcome bar -->
    <div class="welcome-bar" id="welcomeBar">
        <div>
            <h2 id="welcomeTitle">의료진 포털</h2>
            <p id="welcomeSub">로딩 중...</p>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <span class="role-badge" id="roleBadge"></span>
            <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt mr-1"></i>로그아웃</button>
        </div>
    </div>

    <!-- menu grid -->
    <div class="menu-grid" id="menuGrid"></div>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    const ROLE_LABELS = { nurse:'간호사', doctor:'의사', admin:'관리자' };
    const MENU_DESC = {
        NURSE_DASHBOARD:  '날짜·상태별 예약 목록 및 처리',
        NURSE_APPT_NEW:   '방문 환자 직접 예약 등록',
        WARD_STATUS:      '병동별 가용 병상 현황',
        DOCTOR_SCHEDULE:  '오늘 확정된 진료 일정',
        PATIENT_DETAIL:   '예약 정보 및 진료기록 조회',
        ADMIN_USERS:      '계정 생성·수정·잠금·삭제',
        ADMIN_ROLES:      '역할 추가 및 권한 할당',
        ADMIN_POLICY:     '비밀번호 복잡도·만료 설정',
        ADMIN_LOGS:       '전체 사용자 활동 감사 로그',
        ADMIN_LOGIN_HIST: '로그인 성공·실패·잠금 이력',
        CHANGE_PW:        '비밀번호 주기적 변경',
        DOCTOR_PRESCRIPTION: '처방전 작성 및 조회',
        NURSE_MEDICATION: '투약 내역 기록 및 확인',
    };

    async function init() {
        const me = await requireLogin();
        if (!me) return;

        if (me.password_expired) {
            document.getElementById('pwBanner').style.display = 'flex';
        }

        const roleLabel = ROLE_LABELS[me.role] || me.role;
        document.getElementById('welcomeTitle').textContent = `${roleLabel} 포털`;
        document.getElementById('welcomeSub').textContent   = `ISMS-P 보안 정책 적용 시스템 — 모든 접근이 기록됩니다.`;
        document.getElementById('roleBadge').textContent    = roleLabel;
        document.getElementById('portalWrap').classList.add(`role-${me.role}`);

        // 메뉴 로드
        const res = await apiCall('/auth/me/menus');
        if (!res || !res.ok) { renderDefaultMenu(me.role); return; }
        const menus = await res.json();
        renderMenus(menus);
    }

    function renderMenus(menus) {
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = menus.map(m => `
            <a class="menu-card" href="${m.menu_url}">
                <div class="icon"><i class="fas fa-${m.icon || 'circle'}"></i></div>
                <h3>${m.menu_name}</h3>
                <p>${MENU_DESC[m.menu_code] || ''}</p>
            </a>
        `).join('');
    }

    function renderDefaultMenu(role) {
        const defaults = {
            nurse:  [
                // AWS — 예약
                {url:'/nurse-dashboard.html',       icon:'calendar-alt',  name:'예약 현황',      desc:'날짜·상태별 예약 목록 및 처리'},
                {url:'/nurse-appointment-new.html', icon:'plus-circle',   name:'수동 예약 등록', desc:'방문 환자 직접 예약 등록'},
                // 온프레미스 — EMR
                {url:'/patient-register.html',      icon:'user-plus',     name:'환자 등록',      desc:'신규 환자 정보 등록 및 회원번호 발급'},
                {url:'/patient-search.html',        icon:'search',        name:'환자 검색',      desc:'이름·회원번호로 환자 조회'},
                {url:'/ward-status.html',           icon:'hospital',      name:'병동 현황',      desc:'병동별 가용 병상 현황'},
                {url:'/encounter-new.html',         icon:'plus-circle',   name:'진료 등록',      desc:'외래·입원 진료 접수'},
                {url:'/change-password.html',       icon:'key',           name:'비밀번호 변경',  desc:'비밀번호 주기적 변경'},
            ],
            doctor: [
                // AWS — 예약
                {url:'/doctor-schedule.html',  icon:'stethoscope',  name:'오늘 진료',      desc:'오늘 확정된 진료 일정'},
                // 온프레미스 — EMR
                {url:'/patient-search.html',   icon:'search',       name:'환자 검색',      desc:'담당 환자 검색 및 EMR 조회'},
                {url:'/my-patients.html',      icon:'user-injured', name:'내 환자 목록',   desc:'담당 환자 진료기록 확인'},
                {url:'/encounter-new.html',    icon:'notes-medical',name:'진료 기록',      desc:'진료 내용·처방 기록'},
                {url:'/change-password.html',  icon:'key',          name:'비밀번호 변경',  desc:'비밀번호 주기적 변경'},
            ],
            admin: [
                // AWS — 사용자·보안 관리
                {url:'/admin-users.html',           icon:'users',          name:'사용자 관리',    desc:'계정 생성·수정·잠금·삭제'},
                {url:'/admin-roles.html',           icon:'shield-alt',     name:'역할/권한 관리', desc:'역할 추가 및 권한 할당'},
                {url:'/admin-policy.html',          icon:'lock',           name:'보안 정책',      desc:'비밀번호 복잡도·만료 설정'},
                {url:'/admin-logs.html',            icon:'clipboard-list', name:'감사 로그 (AWS)',desc:'AWS 사용자 활동 감사 로그'},
                {url:'/admin-login-history.html',   icon:'history',        name:'로그인 이력',    desc:'로그인 성공·실패·잠금 이력'},
                {url:'/change-password.html',       icon:'key',            name:'비밀번호 변경',  desc:'비밀번호 주기적 변경'},
            ],
        };
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = (defaults[role] || []).map(m => `
            <a class="menu-card" href="${m.url}">
                <div class="icon"><i class="fas fa-${m.icon}"></i></div>
                <h3>${m.name}</h3>
                <p>${m.desc}</p>
            </a>
        `).join('');
    }

    async function doLogout() {
        await apiCall('/auth/logout', { method: 'POST' }).catch(() => {});
        window.location.href = 'login.html';
    }

    init();
</script>
</body>
</html>
