<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 로그인 - 김이박 클리닉</title>
    <link rel="stylesheet" href="/css/tailwind.min.css">
    <link rel="stylesheet" href="/css/fa-all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh;
        }
        .login-card {
            border-top: 4px solid #1d4ed8;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }
        .login-btn {
            background: #1d3a6e;
            transition: background 0.2s;
        }
        .login-btn:hover { background: #1e40af; }
        .security-badge {
            background: #fef3c7;
            border: 1px solid #f59e0b;
        }
    </style>
</head>
<body style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:1rem;">

    <div class="w-full max-w-md">

        <!-- 로고 영역 -->
        <div class="text-center mb-4">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-white bg-opacity-10 mb-2">
                <i class="fas fa-shield-alt text-2xl text-blue-300"></i>
            </div>
            <h1 class="text-xl font-bold text-white">김이박 클리닉</h1>
            <p class="text-xs text-blue-300 mt-0.5 font-medium tracking-widest uppercase">직원 전용 시스템</p>
        </div>

        <!-- 카드 -->
        <div class="login-card bg-white rounded-2xl p-6">
            <h2 class="text-base font-bold text-gray-800 mb-0.5">직원 로그인</h2>
            <p class="text-xs text-gray-500 mb-4">회원번호와 비밀번호를 입력하세요.</p>

            <form id="loginForm" class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">회원번호</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-id-card text-sm"></i>
                        </span>
                        <input type="text" id="loginMemberNumber" required placeholder="회원번호 입력" autocomplete="username"
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 outline-none bg-gray-50 focus:bg-white transition text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <i class="fas fa-lock text-sm"></i>
                        </span>
                        <input type="password" id="loginPw" required
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 outline-none bg-gray-50 focus:bg-white transition text-sm">
                    </div>
                </div>

                <div id="apiError" class="hidden p-2.5 bg-red-50 border border-red-300 rounded-xl text-xs text-red-700 flex items-center gap-2">
                    <i class="fas fa-exclamation-circle flex-shrink-0"></i>
                    <span id="apiErrorMsg"></span>
                </div>

                <button type="submit" id="submitBtn"
                    class="login-btn w-full text-white py-2.5 rounded-xl font-bold disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                    <i class="fas fa-sign-in-alt mr-2"></i>로그인
                </button>
            </form>

            <!-- 직원용 안내 -->
            <div class="mt-4 pt-3 border-t border-gray-100">
                <p class="text-xs text-gray-400 text-center leading-relaxed">
                    <i class="fas fa-info-circle mr-1"></i>
                    계정 발급 및 비밀번호 초기화는 IT 지원팀에 문의하세요.
                    로그인 5회 실패 시 계정이 잠깁니다.
                </p>
            </div>
        </div>

        <!-- 하단 -->
        <p class="text-center text-xs text-gray-500 mt-3">
            모든 접근 기록은 보안 감사 로그에 기록됩니다 (ISMS-P 2.9.1)
        </p>
    </div>

    <script src="js/config.js"></script>
    <script>
        // URL 해시 자동 로그인 — by 김다정, 2026-06-06
        // mzclinic.cloud 에서 직원 로그인 후 "내부 진료 DB 바로가기" 버튼으로 진입 시
        // URL 해시(#access_token=...)에서 토큰을 꺼내 /auth/set-token 으로 전달
        // 서버가 HTTP-only 쿠키를 설정한 뒤 index.html 로 이동
        (async () => {
            const hash = window.location.hash;
            if (!hash.startsWith('#access_token=')) return;

            const token = decodeURIComponent(hash.slice('#access_token='.length));
            history.replaceState(null, '', window.location.pathname);  // 주소창에서 토큰 제거

            try {
                const res = await fetch('/auth/set-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token }),
                });
                if (res.ok) {
                    window.location.replace('/index.html');
                } else {
                    console.warn('토큰 검증 실패, 일반 로그인 화면을 표시합니다.');
                }
            } catch {
                console.warn('set-token 요청 실패, 일반 로그인 화면을 표시합니다.');
            }
        })();

        // 인증 기준 URL:
        //   ONPREM_BASE_URL 설정 시 → 온프레미스 로그인 (병원 내부망)
        //   미설정 시              → AWS 로그인 (외부 접속 폴백)
        const _AUTH_BASE    = ONPREM_BASE_URL || BASE_URL;
        const _authHeaders  = () => ONPREM_BASE_URL
            ? { 'Content-Type': 'application/json' }
            : { 'Content-Type': 'application/json', 'X-API-Key': API_KEY };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const memberNumber = document.getElementById('loginMemberNumber').value.trim();
            const pw           = document.getElementById('loginPw').value;
            const errorBox  = document.getElementById('apiError');
            const errorMsg  = document.getElementById('apiErrorMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorBox.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>확인 중...';

            try {
                // 1단계: 1차 로그인 (온프레미스 우선, 없으면 AWS)
                const res = await fetch(`${_AUTH_BASE}/auth/login`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: _authHeaders(),
                    body: JSON.stringify({ member_number: memberNumber, password: pw }),
                });

                const data = await res.json();

                if (res.ok) {
                    // 2단계: 온프레미스 로그인 성공 시 AWS 세션도 동시 생성 (비민감 API 인증용)
                    if (ONPREM_BASE_URL) {
                        fetch(`${BASE_URL}/auth/login`, {
                            method: 'POST',
                            credentials: 'include',
                            headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                            body: JSON.stringify({ member_number: memberNumber, password: pw }),
                        }).catch(() => {});  // 실패해도 무시 (AWS DB에 계정 없을 수 있음)
                    }

                    // 3단계: 사용자 정보 확인
                    const meRes = await fetch(`${_AUTH_BASE}/auth/me`, {
                        credentials: 'include',
                        headers: _authHeaders(),
                    });
                    const meData = await meRes.json();

                    if (meData.must_change_password || meData.password_expired) {
                        window.location.href = 'change-password.html';
                        return;
                    }
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.detail || '로그인 중 오류가 발생했습니다.';
                    errorBox.classList.remove('hidden');
                }
            } catch {
                errorMsg.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
                errorBox.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>로그인';
            }
        });
    </script>
</body>
</html>
