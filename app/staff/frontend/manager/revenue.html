<!DOCTYPE html>
<!-- by 김다정 — 운영관리자 매출 현황 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>매출 현황 - 김이박 클리닉 운영관리자</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-wrap { max-width:1100px; margin:80px auto 40px; padding:0 16px; }
        .back-link { font-size:13px; color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
        .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .toolbar input  { padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; }
        .toolbar button { padding:8px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
        .stat-card { background:#fff; border-radius:12px; padding:20px 24px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
        .stat-card .num { font-size:26px; font-weight:700; color:var(--primary); }
        .stat-card .lbl { font-size:13px; color:#78909c; margin-top:4px; }
        .card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.07); margin-bottom:24px; }
        .data-table { width:100%; border-collapse:collapse; font-size:14px; }
        .data-table th { background:#eceff1; padding:10px 12px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; text-align:right; }
        .data-table td:first-child { text-align:left; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 대시보드</a>
    <h2 style="margin-bottom:4px;">매출 현황</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:20px;">
        수납·보험청구 매출을 집계합니다. 개인 식별 정보는 포함되지 않습니다.
        <!-- by 김다정 — 매출 통계는 집계 데이터만, 개인정보 미포함 -->
    </p>

    <div class="toolbar">
        <label style="font-size:14px;font-weight:600;color:#546e7a;">기간</label>
        <input type="date" id="startDate">
        <span style="color:#78909c;">~</span>
        <input type="date" id="endDate">
        <button onclick="loadRevenue()"><i class="fas fa-chart-line mr-1"></i> 매출 조회</button>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <div class="num" id="revTotal">-</div>
            <div class="lbl">총 수납금액</div>
        </div>
        <div class="stat-card">
            <div class="num" id="revCash">-</div>
            <div class="lbl">현금 수납</div>
        </div>
        <div class="stat-card">
            <div class="num" id="revCard">-</div>
            <div class="lbl">카드 수납</div>
        </div>
        <div class="stat-card">
            <div class="num" id="revInsurance">-</div>
            <div class="lbl">보험 청구 합계</div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 16px;font-size:16px;">일별 매출</h3>
        <table class="data-table">
            <thead>
                <tr><th>날짜</th><th>수납 건수</th><th>현금</th><th>카드</th><th>보험</th><th>합계</th></tr>
            </thead>
            <tbody id="revBody">
                <tr><td colspan="6" style="text-align:center;padding:24px;color:#90a4ae;">기간을 선택 후 조회하세요.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/script.js"></script>
<script src="../js/auth.js"></script>
<script>
    // by 김다정 — 매출 현황 페이지 초기화 (manager 역할 전용)
    (async () => {
        const me = await requireRole(['manager', 'admin']);
        if (!me) return;
        const today = new Date(); const d = new Date(today); d.setDate(1);
        document.getElementById('startDate').value = d.toISOString().split('T')[0];
        document.getElementById('endDate').value   = today.toISOString().split('T')[0];
        await loadRevenue();
    })();

    async function loadRevenue() {
        const start = document.getElementById('startDate').value;
        const end   = document.getElementById('endDate').value;
        const res   = await apiCall(`/portal/doctor/stats/revenue?start_date=${start}&end_date=${end}`);

        const fmt = v => v != null ? v.toLocaleString() + '원' : '-';

        if (!res || !res.ok) {
            ['revTotal','revCash','revCard','revInsurance'].forEach(id => {
                document.getElementById(id).textContent = '-';
            });
            document.getElementById('revBody').innerHTML =
                '<tr><td colspan="6" style="text-align:center;padding:20px;color:#e53935;">데이터를 불러올 수 없습니다.</td></tr>';
            return;
        }
        const data = await res.json();
        document.getElementById('revTotal').textContent     = fmt(data.summary?.total);
        document.getElementById('revCash').textContent      = fmt(data.summary?.cash);
        document.getElementById('revCard').textContent      = fmt(data.summary?.card);
        document.getElementById('revInsurance').textContent = fmt(data.summary?.insurance);

        const tbody = document.getElementById('revBody');
        if (!data.daily?.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#90a4ae;">일별 데이터가 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = data.daily.map(d => `
            <tr>
                <td>${d.date}</td>
                <td>${d.count       ?? 0}</td>
                <td>${fmt(d.cash)}</td>
                <td>${fmt(d.card)}</td>
                <td>${fmt(d.insurance)}</td>
                <td style="font-weight:700;">${fmt(d.total)}</td>
            </tr>`).join('');
    }
</script>
</body>
</html>
