<!DOCTYPE html>
<!-- by 김다정 — 운영관리자 인력 현황 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인력 현황 - 김이박 클리닉 운영관리자</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-wrap { max-width:1100px; margin:80px auto 40px; padding:0 16px; }
        .back-link { font-size:13px; color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
        .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .toolbar select, .toolbar input { padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; }
        .toolbar button { padding:8px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.07); margin-bottom:24px; }
        .data-table { width:100%; border-collapse:collapse; font-size:14px; }
        .data-table th { background:#eceff1; padding:10px 12px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        .data-table tr:hover td { background:#f5f5f5; }
        .role-badge { padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
        .role-doctor   { background:#ede9fe; color:#7c3aed; }
        .role-nurse    { background:#d1fae5; color:#059669; }
        .role-staff_op { background:#fff3e0; color:#e65100; }
        .notice-box { background:#e8f5e9; border-left:4px solid #2e7d32; border-radius:6px; padding:10px 16px; font-size:13px; color:#1b5e20; margin-bottom:20px; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 대시보드</a>
    <h2 style="margin-bottom:4px;">인력 현황</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:16px;">
        의료진 스케줄 및 인력 현황을 조회합니다.
        <!-- by 김다정 — audit_log STAFF_VIEW 기록, 개인정보 최소화 표시 -->
    </p>

    <!-- by 김다정 — 실명 대신 이메일 앞부분만 표시, 연락처 미표시 -->
    <div class="notice-box">
        <i class="fas fa-info-circle mr-1"></i>
        인력 현황 조회 시 연락처 등 개인정보는 표시되지 않습니다. 이메일은 앞 5자만 표시됩니다.
    </div>

    <div class="toolbar">
        <label style="font-size:14px;font-weight:600;color:#546e7a;">역할</label>
        <select id="roleFilter">
            <option value="">전체</option>
            <option value="doctor">의사</option>
            <option value="nurse">간호사</option>
            <option value="staff_op">원무과</option>
        </select>
        <label style="font-size:14px;font-weight:600;color:#546e7a;">날짜</label>
        <input type="date" id="scheduleDate">
        <button onclick="loadStaff()"><i class="fas fa-users mr-1"></i> 조회</button>
    </div>

    <div class="card">
        <h3 style="margin:0 0 16px;font-size:16px;">의료진 목록</h3>
        <table class="data-table">
            <thead>
                <tr><th>역할</th><th>이메일 (일부)</th><th>소속 진료과</th><th>오늘 진료 건수</th><th>계정 상태</th></tr>
            </thead>
            <tbody id="staffBody">
                <tr><td colspan="5" style="text-align:center;padding:30px;color:#90a4ae;">불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/script.js"></script>
<script src="../js/auth.js"></script>
<script>
    // by 김다정 — 인력 현황 페이지 초기화 (manager 역할 전용)
    const ROLE_KR = { doctor:'의사', nurse:'간호사', staff_op:'원무과', manager:'운영관리자', admin:'관리자' };

    (async () => {
        const me = await requireRole(['manager', 'admin']);
        if (!me) return;
        document.getElementById('scheduleDate').value = new Date().toISOString().split('T')[0];
        await loadStaff();
    })();

    async function loadStaff() {
        const role = document.getElementById('roleFilter').value;
        const date = document.getElementById('scheduleDate').value;
        const params = new URLSearchParams({ date });
        if (role) params.set('role', role);

        const res   = await apiCall(`/admin/staff-schedule?${params}`);
        const tbody = document.getElementById('staffBody');

        if (!res || !res.ok) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#e53935;">데이터를 불러올 수 없습니다.</td></tr>';
            return;
        }
        const list = await res.json();
        if (!list.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#90a4ae;">조회된 인력이 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(s => {
            // by 김다정 — 이메일 앞 5자만 표시 (개인정보 최소화)
            const emailMasked = s.email ? s.email.slice(0, 5) + '***' : '-';
            return `<tr>
                <td><span class="role-badge role-${s.role}">${ROLE_KR[s.role] || s.role}</span></td>
                <td>${emailMasked}</td>
                <td>${s.department_name || '-'}</td>
                <td>${s.today_appointments ?? 0}건</td>
                <td>${s.is_active
                    ? '<span style="color:#2e7d32;font-weight:600;">활성</span>'
                    : '<span style="color:#c62828;font-weight:600;">비활성</span>'}</td>
            </tr>`;
        }).join('');
    }
</script>
</body>
</html>
