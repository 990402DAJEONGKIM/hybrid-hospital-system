<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2차 인증(MFA) 설정 - MZ Clinic</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <h2>2차 인증 활성화</h2>
        <p>Google Authenticator 등 OTP 앱을 사용하여 아래 QR 코드를 스캔하세요.</p>
        <div id="qrcode" class="qr-placeholder">
            <!-- 백엔드에서 생성된 QR 이미지 노출 -->
            <img id="qrImg" src="" alt="MFA QR Code">
        </div>
        <div class="form-group">
            <label>OTP 번호 6자리 입력</label>
            <input type="text" id="otpCode" maxlength="6" placeholder="000000">
        </div>
        <button onclick="verifyMfa()" class="btn-primary">인증 및 활성화</button>
    </div>
    <script src="/js/config.js"></script>
    <script>
        async function loadQr() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/auth/mfa/setup`, {
                method: 'POST', headers: { 'X-API-Key': CONFIG.API_KEY }
            });
            const data = await res.json();
            document.getElementById('qrImg').src = data.qr_url;
        }
        async function verifyMfa() {
            const code = document.getElementById('otpCode').value;
            const res = await fetch(`${CONFIG.API_BASE_URL}/auth/mfa/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': CONFIG.API_KEY },
                body: JSON.stringify({ code: code })
            });
            if (res.ok) { alert("MFA 설정이 완료되었습니다."); location.href = '/'; }
        }
        window.onload = loadQr;
    </script>
</body>
</html>
