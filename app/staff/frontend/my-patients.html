<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 진료 목록 — 김이박 병원</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-wrap { max-width:1100px; margin:80px auto 40px; padding:0 16px; }
        .filter-bar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .filter-bar label { font-size:14px; color:#546e7a; font-weight:600; }
        .filter-bar input[type="date"] { padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; }
        .filter-bar button { padding:8px 18px; background:var(--primary,#1e88e5); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .data-table { width:100%; border-collapse:collapse; font-size:14px; }
        .data-table th { background:#eceff1; padding:10px 12px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        .data-table tr:hover td { background:#f5f5f5; }
        .status-badge { padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; white-space:nowrap; }
        .status-open      { background:#e8f5e9; color:#2e7d32; }
        .status-closed    { background:#e3f2fd; color:#1565c0; }
        .status-cancelled { background:#ffebee; color:#c62828; }
        .btn-sm { padding:5px 12px; background:#ede9fe; color:#6d28d9; border:none; border-radius:4px; font-size:12px; font-weight:600; cursor:pointer; }
        .btn-sm:hover { background:#ddd6fe; }
        .empty-msg { text-align:center; padding:40px; color:#90a4ae; }
        .back-link { font-size:13px; color:var(--primary,#1e88e5); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
        .isms-notice { background:#fff8e1; border:1px solid #f59e0b; border-radius:6px; padding:10px 16px; font-size:12px; color:#92400e; margin-bottom:18px; }
        /* 상세 모달 */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:#fff; border-radius:12px; padding:28px; max-width:640px; width:100%; max-height:90vh; overflow-y:auto; position:relative; }
        .modal-close { position:absolute; top:12px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:#78909c; }
        .detail-section h4 { font-size:13px; font-weight:700; color:#546e7a; margin:14px 0 6px; text-transform:uppercase; letter-spacing:.5px; }
        .detail-table { width:100%; border-collapse:collapse; font-size:13px; }
        .detail-table th { width:130px; text-align:left; padding:6px 8px; color:#78909c; font-weight:600; background:#f9fafb; }
        .detail-table td { padding:6px 8px; color:#374151; }
        .detail-table tr { border-bottom:1px solid #f0f0f0; }
        .sub-list { font-size:13px; padding-left:0; list-style:none; }
        .sub-list li { padding:4px 0; border-bottom:1px solid #f0f0f0; color:#374151; }
        .enc-status-form { display:flex; gap:8px; align-items:center; margin-top:16px; }
        .enc-status-form select { padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; }
        .enc-status-form button { padding:8px 16px; background:#059669; color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <a class="back-link" href="/index.html"><i class="fas fa-arrow-left"></i> 대시보드</a>
    <h2 style="margin-bottom:4px;">오늘 진료 목록</h2>
    <p style="color:#78909c;font-size:13px;margin-bottom:14px;">온프레미스 EMR — 담당 의사 전용</p>

    <div class="isms-notice">
        <i class="fas fa-lock" style="margin-right:6px;"></i>
        이 화면의 모든 조회는 <strong>감사 로그</strong>에 기록됩니다 (ISMS-P 2.9.1).
    </div>

    <div class="filter-bar">
        <label>날짜</label>
        <input type="date" id="dateFilter" />
        <button onclick="loadEncounters()"><i class="fas fa-sync-alt" style="margin-right:5px;"></i>조회</button>
    </div>

    <div id="errMsg" style="color:#e53935;font-size:13px;margin-bottom:10px;min-height:18px;"></div>

    <table class="data-table">
        <thead>
            <tr>
                <th>환자명</th>
                <th>방문 유형</th>
                <th>방문 일시</th>
                <th>주호소</th>
                <th>상태</th>
                <th>상세</th>
            </tr>
        </thead>
        <tbody id="encounterBody">
            <tr><td colspan="6" class="empty-msg">날짜를 선택하고 조회 버튼을 누르세요.</td></tr>
        </tbody>
    </table>
</div>

<!-- 환자 상세 모달 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        <h3 id="modalTitle" style="margin:0 0 12px;font-size:18px;">진료 상세</h3>

        <div class="detail-section">
            <h4>환자 기본 정보</h4>
            <table class="detail-table">
                <tr><th>환자명</th><td id="dName"></td></tr>
                <tr><th>생년월일</th><td id="dBirth"></td></tr>
                <tr><th>성별</th><td id="dGender"></td></tr>
                <tr><th>전화번호</th><td id="dPhone"></td></tr>
            </table>
        </div>

        <div class="detail-section">
            <h4>진료 정보</h4>
            <table class="detail-table">
                <tr><th>방문 유형</th><td id="dEncType"></td></tr>
                <tr><th>방문 일시</th><td id="dVisit"></td></tr>
                <tr><th>주호소</th><td id="dComplaint" style="white-space:pre-wrap;"></td></tr>
                <tr><th>진료과</th><td id="dDept"></td></tr>
            </table>
        </div>

        <div class="detail-section">
            <h4>진단</h4>
            <ul class="sub-list" id="dDiagnoses"><li>없음</li></ul>
        </div>

        <div class="detail-section">
            <h4>알레르기</h4>
            <ul class="sub-list" id="dAllergies"><li>없음</li></ul>
        </div>

        <div class="detail-section">
            <h4>임상 노트</h4>
            <ul class="sub-list" id="dNotes"><li>없음</li></ul>
        </div>

        <div class="enc-status-form">
            <label style="font-size:14px;font-weight:600;color:#546e7a;">상태 변경:</label>
            <select id="statusSelect">
                <option value="open">진행 중</option>
                <option value="closed">완료</option>
                <option value="cancelled">취소</option>
            </select>
            <button onclick="updateStatus()">저장</button>
        </div>
        <div id="statusMsg" style="font-size:13px;margin-top:8px;min-height:18px;"></div>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    let currentEncounterId = null;
    const _encMap = new Map();

    function _esc(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    const TYPE_LABEL = {
        outpatient_new: '초진 외래', outpatient_return: '재진 외래',
        inpatient: '입원', pre_surgery: '수술 전',
    };
    const STATUS_LABEL = { open: '진행 중', closed: '완료', cancelled: '취소' };

    async function init() {
        const me = await requireLogin();
        if (!me) return;
        if (me.role !== 'doctor') {
            alert('의사 계정만 접근할 수 있습니다.');
            window.location.href = '/index.html';
            return;
        }
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('dateFilter').value = today;
        await loadEncounters();
    }

    async function loadEncounters() {
        const date  = document.getElementById('dateFilter').value;
        const errEl = document.getElementById('errMsg');
        errEl.textContent = '';

        const url = `/emr/my/encounters${date ? `?date=${date}` : ''}`;
        const res = await apiCall(url);
        if (!res || !res.ok) {
            errEl.textContent = res?.status === 503
                ? '온프레미스 DB에 연결할 수 없습니다. VPN 연결을 확인하세요.'
                : '조회에 실패했습니다.';
            return;
        }
        const data = await res.json();
        renderEncounters(data);
    }

    function renderEncounters(items) {
        _encMap.clear();
        const tbody = document.getElementById('encounterBody');
        if (!items.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">해당 날짜에 진료가 없습니다.</td></tr>';
            return;
        }
        items.forEach(e => _encMap.set(e.encounter_id, e));
        // by 김다정 — 목록에서 실명·주호소 제거 (ISMS-P 하드스톱 수정)
        tbody.innerHTML = items.map(e => `
            <tr>
                <td style="font-weight:600;font-family:monospace;font-size:12px;">${_esc(e.patient_id_hash?.slice(0,8) || '-')}…</td>
                <td>${_esc(TYPE_LABEL[e.encounter_type] || e.encounter_type || '-')}</td>
                <td>${_esc(e.visit_datetime?.replace('T',' ').slice(0,16) || '-')}</td>
                <td><span class="status-badge status-${_esc(e.status_code)}">${_esc(STATUS_LABEL[e.status_code] || e.status_code)}</span></td>
                <td>
                    <button class="btn-sm" data-eid="${_esc(e.encounter_id)}" onclick="openDetail(this.dataset.eid)">
                        <i class="fas fa-folder-open" style="margin-right:4px;"></i>상세
                    </button>
                </td>
            </tr>
        `).join('');
    }

    async function openDetail(encId) {
        const e = _encMap.get(encId);
        if (!e) return;
        currentEncounterId = encId;

        // by 김다정 — 모달 제목에서 실명 제거, chief_complaint 표시 제거 (ISMS-P 하드스톱 수정)
        document.getElementById('modalTitle').textContent  = `진료 상세 — ${e.patient_id_hash?.slice(0,8) || '-'}…`;
        document.getElementById('dEncType').textContent    = TYPE_LABEL[e.encounter_type] || e.encounter_type || '-';
        document.getElementById('dVisit').textContent      = e.visit_datetime?.replace('T',' ').slice(0,16) || '-';
        document.getElementById('dComplaint').textContent  = '(열람 제한)';
        document.getElementById('dDept').textContent       = e.department_code || '-';
        document.getElementById('statusMsg').textContent   = '';
        document.getElementById('statusSelect').value      = e.status_code;

        // by 김다정 — 실명·전화번호 마스킹, 출생연도만 표시 (ISMS-P 하드스톱 수정)
        const pRes = await apiCall(`/emr/patients/${e.patient_id}`);
        if (pRes?.ok) {
            const p = await pRes.json();
            const maskName  = n => n ? n[0] + '●'.repeat(Math.max(n.length - 1, 1)) : '-';
            const maskPhone = ph => ph ? ph.replace(/(\d{3})-?(\d{3,4})-?(\d{4})/, '$1-****-$3') : '-';
            document.getElementById('dName').textContent   = maskName(p.patient_name);
            document.getElementById('dBirth').textContent  = p.birth_date ? p.birth_date.slice(0,4) + '년생' : '-';
            document.getElementById('dGender').textContent = p.gender_code === 'M' ? '남' : p.gender_code === 'F' ? '여' : '-';
            document.getElementById('dPhone').textContent  = maskPhone(p.phone_number);
        }

        // by 김다정 — 진단 원문(diagnosis_text) 제거, ICD 코드만 표시 (ISMS-P 하드스톱 수정)
        const diagRes = await apiCall(`/emr/patients/${e.patient_id}/diagnoses`);
        const diagList = diagRes?.ok ? await diagRes.json() : [];
        document.getElementById('dDiagnoses').innerHTML = diagList.length
            ? diagList.map(d => `<li>${_esc(d.diagnosis_code)}${d.is_primary ? ' <strong>(주)</strong>' : ''}</li>`).join('')
            : '<li>없음</li>';

        // 알레르기
        const algRes = await apiCall(`/emr/patients/${e.patient_id}/allergies`);
        const algList = algRes?.ok ? await algRes.json() : [];
        document.getElementById('dAllergies').innerHTML = algList.length
            ? algList.map(a => `<li>${_esc(a.allergy_name)} (${_esc(a.severity_code)})</li>`).join('')
            : '<li>없음</li>';

        // by 김다정 — 임상 노트 원문(note_content) 제거, 작성 일시만 표시 (ISMS-P 하드스톱 수정)
        const noteRes = await apiCall(`/emr/patients/${e.patient_id}/clinical-notes?encounter_id=${encId}`);
        const noteList = noteRes?.ok ? await noteRes.json() : [];
        document.getElementById('dNotes').innerHTML = noteList.length
            ? noteList.map(n => `<li><span style="color:#546e7a;">${_esc(n.created_at?.slice(0,16) || '-')}</span> — <em style="color:#90a4ae;">내용 열람은 담당 의사에게 문의하세요.</em></li>`).join('')
            : '<li>없음</li>';

        document.getElementById('detailModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    async function updateStatus() {
        if (!currentEncounterId) return;
        const statusCode = document.getElementById('statusSelect').value;
        const res = await apiCall(`/emr/encounters/${currentEncounterId}`, {
            method: 'PATCH',
            body: JSON.stringify({ status_code: statusCode }),
        });
        const msgEl = document.getElementById('statusMsg');
        if (res?.ok) {
            msgEl.textContent = '상태가 업데이트되었습니다.';
            msgEl.style.color = '#059669';
            await loadEncounters();
        } else {
            msgEl.textContent = '업데이트에 실패했습니다.';
            msgEl.style.color = '#e53935';
        }
    }

    function closeModal() {
        document.getElementById('detailModal').classList.remove('open');
        document.body.style.overflow = '';
        currentEncounterId = null;
    }

    init();
</script>
</body>
</html>
