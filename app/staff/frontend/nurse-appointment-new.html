<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수동 예약 등록 - MZ Clinic 원무과</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="page-content">
<div style="max-width:560px;margin:0 auto;">

    <a href="/nurse-dashboard.html"
       style="font-size:13px;color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:5px;margin-bottom:24px;">
        <i class="fas fa-arrow-left"></i> 예약 현황으로
    </a>

    <div style="background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:40px 36px;text-align:center;">
        <div style="width:64px;height:64px;background:#fff3e0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;">
            <i class="fas fa-hospital-alt" style="font-size:28px;color:#f57c00;"></i>
        </div>
        <h2 style="font-size:18px;font-weight:800;color:#212121;margin-bottom:8px;">온프레미스 내부 시스템에서 진행해주세요</h2>
        <p style="font-size:14px;color:#78909c;line-height:1.7;margin-bottom:28px;">
            수동 예약 등록은 환자 실명 확인이 필요합니다.<br>
            외부 포털에서는 환자 개인정보(1등급)를 조회할 수 없으므로<br>
            원내 온프레미스 HIS에서 등록해주세요.
        </p>

        <div style="background:#f5f5f5;border-radius:8px;padding:16px 20px;text-align:left;font-size:13px;color:#546e7a;line-height:1.8;">
            <div style="font-weight:700;margin-bottom:8px;color:#37474f;">
                <i class="fas fa-info-circle" style="margin-right:6px;color:#1976d2;"></i>
                이 포털에서 할 수 있는 작업
            </div>
            <div><i class="fas fa-check" style="color:#43a047;margin-right:8px;"></i>예약 상태 변경 (확정·취소·완료)</div>
            <div><i class="fas fa-check" style="color:#43a047;margin-right:8px;"></i>날짜·의사별 예약 현황 조회</div>
            <div><i class="fas fa-check" style="color:#43a047;margin-right:8px;"></i>병동 현황 확인</div>
            <div style="margin-top:12px;">
                <i class="fas fa-times" style="color:#e53935;margin-right:8px;"></i>환자 이름·전화번호로 검색
            </div>
            <div><i class="fas fa-times" style="color:#e53935;margin-right:8px;"></i>신규 환자 예약 등록</div>
        </div>

        <a href="/nurse-dashboard.html"
           style="display:inline-block;margin-top:24px;padding:11px 28px;background:var(--primary);color:#fff;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;">
            <i class="fas fa-calendar-alt" style="margin-right:6px;"></i>예약 현황으로 이동
        </a>
    </div>
</div>

</div>
<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/router.js"></script>
<script>
    (async () => {
        const me = await initLayout();
        if (!me) return;
    })();
</script>
</body>
</html>
