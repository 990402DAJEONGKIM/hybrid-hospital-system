<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예약 관리 - MZ Clinic 원무과</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-wrap { max-width:1200px; margin:80px auto 40px; padding:0 16px; }
        .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .toolbar label { font-size:14px; color:#546e7a; font-weight:600; }
        .toolbar input[type="date"] { padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; }
        .toolbar select { padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; }
        .toolbar button { padding:8px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .data-table { width:100%; border-collapse:collapse; font-size:14px; }
        .data-table th { background:#eceff1; padding:10px 12px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        .data-table tr:hover td { background:#f5f5f5; }
        .status-badge { padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; white-space:nowrap; }
        .status-pending   { background:#fff8e1; color:#f57f17; }
        .status-confirmed { background:#e8f5e9; color:#2e7d32; }
        .status-cancelled { background:#ffebee; color:#c62828; }
        .status-completed { background:#e3f2fd; color:#1565c0; }
        .status-no_show   { background:#f3e5f5; color:#6a1b9a; }
        .action-btns { display:flex; gap:6px; flex-wrap:wrap; }
        .btn-xs { padding:4px 10px; border:none; border-radius:4px; font-size:12px; font-weight:600; cursor:pointer; }
        .btn-confirm  { background:#e8f5e9; color:#2e7d32; }
        .btn-complete { background:#e3f2fd; color:#1565c0; }
        .btn-noshow   { background:#f3e5f5; color:#6a1b9a; }
        .btn-cancel   { background:#ffebee; color:#c62828; }
        .empty-msg { text-align:center; padding:40px; color:#90a4ae; }
        #errMsg { color:#e53935; font-size:13px; margin-bottom:10px; min-height:18px; }
        .back-link { font-size:13px; color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
        .new-btn { padding:8px 16px; background:#059669; color:#fff; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <a class="back-link" href="/index.html"><i class="fas fa-arrow-left"></i> 대시보드</a>
        <a class="new-btn" href="/nurse-appointment-new.html"><i class="fas fa-plus"></i> 수동 예약 등록</a>
    </div>
    <h2 style="margin-bottom:6px;">예약 현황 관리</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:20px;">날짜 및 상태별로 예약을 조회하고 처리합니다.</p>

    <div class="toolbar">
        <label>날짜</label>
        <input type="date" id="searchDate">
        <label>상태</label>
        <select id="statusFilter">
            <option value="">전체</option>
            <option value="pending">대기</option>
            <option value="confirmed">확정</option>
            <option value="completed">완료</option>
            <option value="no_show">미내원</option>
            <option value="cancelled">취소</option>
        </select>
        <button onclick="load()">조회</button>
        <button onclick="clearDate()" style="background:#eceff1;color:#546e7a;">날짜 초기화</button>
    </div>

    <div id="errMsg"></div>

    <table class="data-table">
        <thead>
            <tr>
                <th>예약일시</th>
                <th>유형</th>
                <th>진료과</th>
                <th>환자(Hash)</th>
                <th>상태</th>
                <th>처리</th>
            </tr>
        </thead>
        <tbody id="apptBody"></tbody>
    </table>
</div>

<script src="/js/config.js"></script>
<script src="/js/script.js"></script>
<script>
    const STATUS_LBL = {
        pending: '대기', confirmed: '확정',
        cancelled: '취소', completed: '완료', no_show: '미내원',
    };
    const TYPE_LBL = {
        outpatient_new: '초진', outpatient_return: '재진',
        inpatient: '입원', pre_surgery: '수술 전',
    };

    let deptMap = {};

    async function init() {
        const me = await requireLogin();
        if (!me) return;
        document.getElementById('searchDate').value = new Date().toISOString().split('T')[0];

        const dr = await apiCall('/portal/doctor/staff/departments');
        if (dr && dr.ok) {
            const depts = await dr.json();
            depts.forEach(d => { deptMap[d.department_code] = d.department_name; });
        }
        await load();
    }

    function clearDate() {
        document.getElementById('searchDate').value = '';
        load();
    }

    async function load() {
        const date   = document.getElementById('searchDate').value;
        const status = document.getElementById('statusFilter').value;
        let path     = '/portal/doctor/staff/appointments';
        const params = [];
        if (date)   params.push(`appt_date=${date}`);
        if (status) params.push(`status_code=${status}`);
        if (params.length) path += '?' + params.join('&');

        const res = await apiCall(path);
        if (!res || !res.ok) {
            document.getElementById('errMsg').textContent = '예약 목록을 불러오지 못했습니다.';
            return;
        }
        const list = await res.json();
        renderTable(list);
    }

    function renderTable(list) {
        const tbody = document.getElementById('apptBody');
        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="6" class="empty-msg">조회된 예약이 없습니다.</td></tr>`;
            return;
        }
        tbody.innerHTML = list.map(a => {
            const dept   = deptMap[a.department_code] || a.department_code || '-';
            const type   = TYPE_LBL[a.type_code] || a.type_name || '-';
            const status = STATUS_LBL[a.status_code] || a.status_name || '-';
            const hash   = a.patient_id_hash ? a.patient_id_hash.slice(0, 12) + '…' : '-';
            const actions = buildActions(a);
            return `
            <tr>
                <td>${a.appointment_date} ${a.appointment_time || ''}</td>
                <td>${type}</td>
                <td>${dept}</td>
                <td style="font-family:monospace;font-size:12px;">${hash}</td>
                <td><span class="status-badge status-${a.status_code}">${status}</span></td>
                <td><div class="action-btns">${actions}</div></td>
            </tr>`;
        }).join('');
    }

    function buildActions(a) {
        if (a.status_code === 'pending') {
            return `<button class="btn-xs btn-confirm"  onclick="updateStatus('${a.appointment_id}','confirmed')">확정</button>
                    <button class="btn-xs btn-cancel"   onclick="updateStatus('${a.appointment_id}','cancelled')">취소</button>`;
        }
        if (a.status_code === 'confirmed') {
            return `<button class="btn-xs btn-complete" onclick="updateStatus('${a.appointment_id}','completed')">완료</button>
                    <button class="btn-xs btn-noshow"   onclick="updateStatus('${a.appointment_id}','no_show')">미내원</button>
                    <button class="btn-xs btn-cancel"   onclick="updateStatus('${a.appointment_id}','cancelled')">취소</button>`;
        }
        return '';
    }

    async function updateStatus(id, code) {
        const labels = { confirmed: '확정', completed: '완료', no_show: '미내원', cancelled: '취소' };
        if (!confirm(`예약을 "${labels[code]}" 처리하시겠습니까?`)) return;

        const res = await apiCall(`/portal/doctor/staff/appointments/${id}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ status_code: code }),
        });
        if (res && res.ok) {
            await load();
        } else {
            const err = await res?.json().catch(() => ({}));
            document.getElementById('errMsg').textContent = err.detail || '처리 중 오류가 발생했습니다.';
        }
    }

    init();
</script>
</body>
</html>
