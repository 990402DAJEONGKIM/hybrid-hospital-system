<!DOCTYPE html>
<!-- by 김다정 — 원무과 수납 처리 페이지 (웹 구조도 반영) -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수납 처리 - 김이박 클리닉 원무과</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-wrap { max-width:960px; margin:80px auto 40px; padding:0 16px; }
        .back-link { font-size:13px; color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:5px; margin-bottom:16px; }
        .back-link:hover { text-decoration:underline; }
        .card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.07); margin-bottom:24px; }
        .form-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
        .form-group { display:flex; flex-direction:column; gap:4px; flex:1; min-width:160px; }
        .form-group label { font-size:13px; font-weight:600; color:#546e7a; }
        .form-group input, .form-group select {
            padding:8px 10px; border:1px solid #cfd8dc; border-radius:6px; font-size:14px; outline:none;
        }
        .btn-primary { padding:9px 22px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
        .data-table { width:100%; border-collapse:collapse; font-size:14px; }
        .data-table th { background:#eceff1; padding:10px 12px; text-align:left; font-weight:600; color:#546e7a; border-bottom:2px solid #cfd8dc; }
        .data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; }
        .data-table tr:hover td { background:#f5f5f5; }
        .paid-badge   { background:#e8f5e9; color:#2e7d32; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
        .unpaid-badge { background:#ffebee; color:#c62828; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
        #msg { font-size:13px; font-weight:600; min-height:18px; margin-top:8px; }
        .msg-ok { color:#2e7d32; } .msg-err { color:#c62828; }
    </style>
</head>
<body style="background:#f5f7fa;min-height:100vh;">
<div class="page-wrap">
    <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 대시보드</a>
    <h2 style="margin-bottom:4px;">수납 처리</h2>
    <p style="color:#78909c;font-size:14px;margin-bottom:20px;">
        진료비 수납을 처리합니다. 모든 수납은 감사로그(PAYMENT_CREATE)에 기록됩니다.
        <!-- by 김다정 — audit_log PAYMENT_CREATE 기록 안내 -->
    </p>

    <div class="card">
        <h3 style="margin:0 0 16px;font-size:16px;">미수납 조회</h3>
        <div class="form-row">
            <div class="form-group">
                <label>환자 ID (Hash)</label>
                <input type="text" id="searchHash" placeholder="patient_id_hash 입력">
            </div>
            <div class="form-group" style="flex:0;min-width:140px;justify-content:flex-end;">
                <label>&nbsp;</label>
                <button class="btn-primary" onclick="searchPayments()">조회</button>
            </div>
        </div>
        <table class="data-table">
            <thead>
                <tr><th>진료일</th><th>환자 ID (Hash)</th><th>청구금액</th><th>수납상태</th><th>처리</th></tr>
            </thead>
            <tbody id="payBody">
                <tr><td colspan="5" style="text-align:center;padding:24px;color:#90a4ae;">환자 ID를 입력 후 조회하세요.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3 style="margin:0 0 16px;font-size:16px;">수납 직접 등록</h3>
        <div class="form-row">
            <div class="form-group">
                <label>환자 ID (Hash)</label>
                <input type="text" id="payHash" placeholder="patient_id_hash">
            </div>
            <div class="form-group">
                <label>진료일</label>
                <input type="date" id="payDate">
            </div>
            <div class="form-group">
                <label>수납금액 (원)</label>
                <input type="number" id="payAmount" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label>결제 방법</label>
                <select id="payMethod">
                    <option value="cash">현금</option>
                    <option value="card">카드</option>
                    <option value="insurance">보험</option>
                </select>
            </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn-primary" onclick="registerPayment()">수납 등록</button>
            <span id="msg"></span>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/script.js"></script>
<script src="../js/auth.js"></script>
<script>
    // by 김다정 — 수납 처리 페이지 초기화 (staff_op 역할 전용)
    (async () => {
        const me = await requireRole(['staff_op']);
        if (!me) return;
        document.getElementById('payDate').value = new Date().toISOString().split('T')[0];
    })();

    async function searchPayments() {
        const hash  = document.getElementById('searchHash').value.trim();
        if (!hash) { alert('환자 ID를 입력해주세요.'); return; }
        const res   = await apiCall(`/portal/doctor/payments?patient_id_hash=${encodeURIComponent(hash)}&status=unpaid`);
        const tbody = document.getElementById('payBody');
        if (!res || !res.ok) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#e53935;">데이터를 불러올 수 없습니다.</td></tr>';
            return;
        }
        const list = await res.json();
        if (!list.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#90a4ae;">미수납 내역이 없습니다.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(p => `
            <tr>
                <td>${p.treatment_date}</td>
                <td style="font-size:12px;font-family:monospace;">${p.patient_id_hash?.slice(0,8) || '-'}…</td>
                <td>${p.amount?.toLocaleString() || 0}원</td>
                <td>${p.is_paid
                    ? '<span class="paid-badge">수납완료</span>'
                    : '<span class="unpaid-badge">미수납</span>'}</td>
                <td>${!p.is_paid
                    ? `<button style="padding:4px 10px;background:#e8f5e9;color:#2e7d32;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;"
                        onclick="markPaid('${p.payment_id}', this)">수납 처리</button>`
                    : '-'}</td>
            </tr>`).join('');
    }

    async function markPaid(paymentId, btn) {
        const res = await apiCall(`/portal/doctor/payments/${paymentId}/pay`, { method: 'PATCH' });
        if (res && res.ok) {
            btn.closest('tr').querySelector('.unpaid-badge').outerHTML = '<span class="paid-badge">수납완료</span>';
            btn.closest('td').innerHTML = '-';
        } else {
            alert('수납 처리 중 오류가 발생했습니다.');
        }
    }

    async function registerPayment() {
        const hash   = document.getElementById('payHash').value.trim();
        const date   = document.getElementById('payDate').value;
        const amount = parseInt(document.getElementById('payAmount').value);
        const method = document.getElementById('payMethod').value;
        const msg    = document.getElementById('msg');

        if (!hash || !date || !amount) {
            msg.textContent = '환자 ID, 진료일, 금액은 필수입니다.';
            msg.className = 'msg-err';
            return;
        }
        const res = await apiCall('/portal/doctor/payments', {
            method: 'POST',
            body: JSON.stringify({ patient_id_hash: hash, treatment_date: date, amount, payment_method: method }),
        });
        if (res && res.ok) {
            msg.textContent = '수납이 등록되었습니다.';
            msg.className = 'msg-ok';
        } else {
            const data = await res?.json().catch(() => ({}));
            msg.textContent = data.detail || '등록 중 오류가 발생했습니다.';
            msg.className = 'msg-err';
        }
    }
</script>
</body>
</html>
