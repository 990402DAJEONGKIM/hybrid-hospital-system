services:

  api-onprem:
    build:
      context: .
      dockerfile: docker/api-onprem/Dockerfile
    container_name: hospital-staff-api
    environment:
      DATABASE_URL: postgresql://hospital_user:jUOuyijkzuNPWTUHNg1tHeimnRgz0QPhtXcWZq3epRY=@hospital_db:5432/hospital
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS}
      API_KEY: ${API_KEY}
      COOKIE_SECURE: "true"
      # DB SSL 모드 — by 김다정, 2026-06-06
      # ISMS-P 2.7.1: prefer = TLS 시도(Docker 내부망 fallback 허용)
      # PostgreSQL SSL 인증서 구성 완료 후 require 로 상향 권장
      DB_SSLMODE: prefer
      # staff/admin 온프레미스 도메인만 허용 — by 김다정, 2026-06-06
      # mzclinic.cloud(환자 포털)는 온프레미스 API를 호출하지 않으므로 제거 (CORS 범위 최소화)
      ALLOWED_HOSTS: "staff.mzclinic.cloud,admin.mzclinic.cloud,172.30.1.76,localhost"
      ALLOWED_ORIGINS: "https://staff.mzclinic.cloud,https://admin.mzclinic.cloud"
      TZ: Asia/Seoul
    networks:
      - hospital-db_default
      - staff-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx-onprem:
    build:
      context: .
      dockerfile: docker/nginx-onprem/Dockerfile
    container_name: hospital-staff-nginx
    ports:
      - "80:80"
      - "443:443"
    # Let's Encrypt 인증서 볼륨 마운트 — 기존 Dockerfile COPY 방식 대체 — by 김다정, 2026-06-06
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    network_mode: "service:api-onprem"
    depends_on:
      api-onprem:
        condition: service_healthy
    restart: unless-stopped

networks:
  hospital-db_default:
    external: true
  staff-internal:
    driver: bridge
