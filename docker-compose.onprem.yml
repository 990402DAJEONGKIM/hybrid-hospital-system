services:

  api-onprem:
    build:
      context: .
      dockerfile: docker/api-onprem/Dockerfile
    container_name: hospital-staff-api
    environment:
      DATABASE_URL: postgresql://hospital_user:jUOuyijkzuNPWTUHNg1tHeimnRgz0QPhtXcWZq3epRY=@hospital_db:5432/hospital
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS}
      API_KEY: ${API_KEY}
      COOKIE_SECURE: "true"
      # DB SSL 모드 — by 김다정, 2026-06-06
      # ISMS-P 2.7.1: prefer = TLS 시도(Docker 내부망 fallback 허용)
      # PostgreSQL SSL 인증서 구성 완료 후 require 로 상향 권장
      DB_SSLMODE: prefer
      DB_MODE: onprem  # 온프레미스 스키마 분기 — by 김다정, 2026-06-06
      # staff.mzclinic.cloud 추가 — by 김다정, 2026-06-06
      # 의사 PC hosts 파일에서 172.30.1.76 으로 해석되는 내부 전용 도메인
      # mzclinic.cloud(AWS)에서 발급한 JWT 를 들고 진입하므로 CORS 허용 필요
      # staff.mzclinic.cloud 단일 도메인으로 통합 — by 김다정, 2026-06-06
      ALLOWED_HOSTS: "staff.mzclinic.cloud,172.30.1.76,localhost"
      ALLOWED_ORIGINS: "https://staff.mzclinic.cloud:8443"
      TZ: Asia/Seoul
    # nginx-onprem이 network_mode: service:api-onprem 으로 네트워크 공유 — by 김다정, 2026-06-06
    # nginx가 80/443 을 listen하므로 ports는 api-onprem에 선언
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - hospital-db_default
      - staff-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx-onprem:
    build:
      context: .
      dockerfile: docker/nginx-onprem/Dockerfile
    container_name: hospital-staff-nginx
    environment:
      API_KEY: ${API_KEY}
    # 사설 CA 인증서 — 04-api.sh 로 생성, 두 도메인 모두 이 경로에서 로드 — by 김다정, 2026-06-06
    volumes:
      - /opt/hospital/nginx/ssl:/opt/hospital/nginx/ssl:ro
    network_mode: "service:api-onprem"
    depends_on:
      api-onprem:
        condition: service_healthy
    restart: unless-stopped

networks:
  hospital-db_default:
    external: true
  staff-internal:
    driver: bridge
