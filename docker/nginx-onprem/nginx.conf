# NGINX — 온프레미스 통합 — by 김다정, 2026-06-06
# 인증서: 사설 CA 인증서 사용 (04-api.sh 로 생성)
#   staff.mzclinic.cloud → /opt/hospital/nginx/ssl/staff.mzclinic.cloud/fullchain.pem
#   의사 PC hosts 파일: 172.30.1.76 staff.mzclinic.cloud
#   의사 PC OS 에 사설 CA 루트 인증서 설치 필요 → 브라우저 경고 없음
# admin.mzclinic.cloud 제거 → /admin/ 경로로 통합 (유지보수 단순화)
# 외부 인터넷 비노출 — 병원 내부망 전용

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # ── AWS ALB 프라이빗 IP (VPN 터널 경유) ─────────────────────
    # 의사 PC → 172.30.1.76 → VPN → ALB 프라이빗 IP → ECS
    # ALB IP 변경 시 이 블록만 업데이트
    upstream aws_alb {
        server 10.0.1.77:443;
        server 10.0.3.198:443;
        server 10.0.2.200:443;
        keepalive 16;
    }

    # ── mzclinic.cloud → AWS ALB (VPN 터널 경유) ────────────────
    # 의사 PC hosts: 172.30.1.76 mzclinic.cloud
    # 인터넷 미경유 — 병원 내부망 → VPN → ALB 프라이빗 IP
    server {
        listen 443 ssl;
        server_name mzclinic.cloud;

        ssl_certificate     /opt/hospital/nginx/ssl/hospital.crt;
        ssl_certificate_key /opt/hospital/nginx/ssl/hospital.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass              https://aws_alb;
            proxy_http_version      1.1;
            proxy_set_header        Host              mzclinic.cloud;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        Connection        "";
            proxy_ssl_verify        off;
            proxy_ssl_server_name   on;
            proxy_ssl_name          mzclinic.cloud;
            proxy_read_timeout      30s;
        }
    }

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── staff.mzclinic.cloud — 사설 CA 인증서 (내부망 전용) — by 김다정, 2026-06-06 ──
    # 의사 PC hosts 파일에 172.30.1.76 staff.mzclinic.cloud 등록 필요
    # 04-api.sh 가 생성하는 사설 CA 인증서 사용
    server {
        listen 443 ssl;
        server_name staff.mzclinic.cloud;

        ssl_certificate     /opt/hospital/nginx/ssl/hospital.crt;
        ssl_certificate_key /opt/hospital/nginx/ssl/hospital.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /var/www/html/staff;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src wazuh.mzclinic.cloud;" always;

        location = /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        location = /api/staff/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/staff/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location = /api/portal/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/portal/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /api/staff/ {
            proxy_pass         http://fastapi/staff/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /api/portal/ {
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        location /auth/ {
            proxy_pass         http://fastapi/staff/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /portal/ {
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /staff/ {
            proxy_pass         http://fastapi/staff/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\. {
            deny all;
        }
    }
}
