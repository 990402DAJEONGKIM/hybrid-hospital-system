# NGINX — 온프레미스 통합 — by 김다정, 2026-06-06
# staff.mzclinic.cloud → 의사/간호사 포털 (내부 DNS → 온프레미스)
# admin.mzclinic.cloud → 관리자 포털 (내부 DNS → 온프레미스)
# 외부 인터넷 비노출 — 병원 내부망 전용
# 인증서: Let's Encrypt DNS Challenge (certbot --dns-cloudflare) — by 김다정, 2026-06-06

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    upstream fastapi {
        server localhost:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── staff.mzclinic.cloud — 의사/간호사 포털 — by 김다정, 2026-06-06 ──
    server {
        listen 443 ssl;
        server_name staff.mzclinic.cloud;

        ssl_certificate     /etc/letsencrypt/live/staff.mzclinic.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staff.mzclinic.cloud/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /var/www/html/staff;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP 외부 CDN 제거 — by 김다정, 2026-06-06
        # Tailwind·Font Awesome 로컬 번들 전환으로 cdn.tailwindcss.com / cdnjs.cloudflare.com 허용 불필요
        # 내부망 PC 화이트리스트(*.mzclinic.cloud)와 CSP 정책 일치
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;

        location = /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        location = /api/staff/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/staff/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /api/staff/ {
            proxy_pass         http://fastapi/staff/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\. {
            deny all;
        }
    }

    # ── admin.mzclinic.cloud — 관리자 포털 — by 김다정, 2026-06-06 ─
    server {
        listen 443 ssl;
        server_name admin.mzclinic.cloud;

        ssl_certificate     /etc/letsencrypt/live/staff.mzclinic.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staff.mzclinic.cloud/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /var/www/html/admin;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP 외부 CDN 제거 — by 김다정, 2026-06-06
        # Tailwind·Font Awesome 로컬 번들 전환으로 cdn.tailwindcss.com / cdnjs.cloudflare.com 허용 불필요
        # 내부망 PC 화이트리스트(*.mzclinic.cloud)와 CSP 정책 일치
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;

        location = /api/portal/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/portal/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /api/portal/ {
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Key       ${API_KEY};
            proxy_read_timeout 30s;
        }

        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\. {
            deny all;
        }
    }
}
