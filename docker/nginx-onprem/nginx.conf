# NGINX — 온프레미스 HIS (nginx-onprem 컨테이너)
# 역할: 정적 파일 서빙 + /auth/ /portal/ /admin/ → FastAPI(localhost:8000) 프록시
# API Key 없음 — 내부망 전용

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;

    server_tokens off;

    upstream fastapi {
        server localhost:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;" always;

        root  /usr/share/nginx/html;
        index login.html;

        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        location /auth/ {
            proxy_pass         http://fastapi/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /portal/ {
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /admin/ {
            proxy_pass         http://fastapi/admin/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        location / {
            try_files $uri $uri/ /login.html;
        }

        location ~ /\. {
            deny all;
        }
    }
}
