# NGINX — 온프레미스 통합 (직원 포털: 의사·간호사·관리자)
# 역할: 정적 파일 서빙 + /api/staff/, /api/portal/ → FastAPI(localhost:8000) 프록시
# 외부 인터넷 비노출 — 병원 내부망 전용

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;

    # 로그인 엔드포인트 rate limit (내부망이지만 기본 보호 유지)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    upstream fastapi {
        server localhost:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;" always;

        # ── ALB/프록시 헬스체크 ─────────────────────────────────
        location = /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        # ── 로그인 rate limit ───────────────────────────────────
        location = /api/staff/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/staff/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location = /api/portal/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/portal/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── 직원 API (/api/staff/ → FastAPI /staff/) ────────────
        location /api/staff/ {
            proxy_pass         http://fastapi/staff/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── 포털 API (/api/portal/ → FastAPI /portal/) ──────────
        location /api/portal/ {
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── 정적 파일 캐시 정책 ─────────────────────────────────
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── 직원 화면 (/staff/) — 의사·간호사·관리자 ────────────
        location /staff/ {
            try_files $uri $uri/ /staff/index.html;
        }

        # ── 포털 화면 (/admin/) ─────────────────────────────────
        location /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }

        # ── 루트 → /staff/ 리다이렉트 ───────────────────────────
        location = / {
            return 302 /staff/;
        }

        location ~ /\. {
            deny all;
        }
    }
}
