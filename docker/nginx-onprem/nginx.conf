# NGINX — 온프레미스 HIS (nginx-onprem 컨테이너)
# 역할: 정적 파일 서빙 + /auth/ /portal/ /admin/ → FastAPI(localhost:8000) 프록시
# CORS: ${CORS_ALLOW_ORIGIN} — 컨테이너 기동 시 envsubst로 주입 (AWS 프론트 도메인)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;

    upstream fastapi {
        server localhost:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── 보안 헤더 ────────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;" always;

        # ── CORS 헤더 ─────────────────────────────────────────────
        # AWS 프론트엔드(mzclinic.cloud)에서 이 온프레미스 API를 직접 호출할 때 필요.
        # onpremApiCall() 이 credentials:'include' 로 요청하므로 Credentials 허용 필수.
        # ${CORS_ALLOW_ORIGIN}: envsubst가 CORS_ALLOW_ORIGIN 환경변수로 교체
        #   운영: https://mzclinic.cloud
        #   로컬: http://localhost  (빈 문자열이면 CORS 비활성화)
        add_header Access-Control-Allow-Origin      "${CORS_ALLOW_ORIGIN}" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods     "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Content-Type" always;
        add_header Access-Control-Max-Age           "86400" always;

        root  /usr/share/nginx/html;
        index login.html;

        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── /auth/ → FastAPI ──────────────────────────────────────
        location /auth/ {
            # OPTIONS 프리플라이트 — 브라우저가 실제 요청 전 허가 확인
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass         http://fastapi/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── /portal/ → FastAPI ────────────────────────────────────
        location /portal/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── /admin/ → FastAPI ─────────────────────────────────────
        location /admin/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass         http://fastapi/admin/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        location / {
            try_files $uri $uri/ /login.html;
        }

        location ~ /\. {
            deny all;
        }
    }
}
