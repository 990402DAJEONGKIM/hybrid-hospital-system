# NGINX — 환자 포털 (nginx-patient 컨테이너)
# 역할: 정적 파일 서빙 + /auth/ /portal/ 을 FastAPI(localhost:8000)로 프록시
# 배포: ECS Task 내 api-patient 컨테이너와 동일 Task에서 실행 (sidecar)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;

    # 버전 정보 숨김 (보안)
    server_tokens off;

    upstream fastapi {
        server localhost:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # 보안 헤더 (NGINX에서 일괄 적용 — FastAPI SecurityHeadersMiddleware와 중복 방지)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;" always;

        root  /usr/share/nginx/html;
        index index.html;

        # 정적 파일 캐싱
        location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # FastAPI — 인증 엔드포인트
        location /auth/ {
            proxy_pass         http://fastapi/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # FastAPI — 환자 포털 엔드포인트
        location /portal/ {
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # 헬스체크 (ALB Target Group health check용)
        location /health {
            proxy_pass http://fastapi/health;
        }

        # 정적 파일 fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 숨김 파일 접근 차단
        location ~ /\. {
            deny all;
        }
    }
}
