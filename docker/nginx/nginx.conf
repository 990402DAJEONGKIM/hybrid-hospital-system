# NGINX — 통합 병원 시스템 (단일 컨테이너)
# server_name으로 도메인별 정적 파일 서빙 + API 프록시 분기
# 로컬 테스트: 각 server block이 별도 포트도 listen (8002/8003/8004)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;

    set_real_ip_from 10.0.0.0/8;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # rate limit은 /auth/login 엔드포인트에만 적용
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }


    # ── 공통 헬스체크 (ALB Target Group health check) ───────────
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        location / {
            return 444;
        }
    }

    # ── 의료진 포털 — staff.mzclinic.cloud ──────────────────────
    server {
        listen 80;
        listen 8002;   # 로컬 테스트용
        server_name staff.mzclinic.cloud;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;" always;

        root  /usr/share/nginx/html/staff;
        index index.html;

        location ~* \.html$ { add_header Cache-Control "no-cache, must-revalidate"; expires 0; }
        location ~* \.(css|js)$ { add_header Cache-Control "no-cache, must-revalidate"; expires 0; }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ { expires 7d; add_header Cache-Control "public"; }

        # 로그인만 rate limit
        location = /auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/staff/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # 나머지 auth 엔드포인트 (rate limit 없음)
        location /auth/ {
            proxy_pass         http://fastapi/staff/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /portal/ {
            proxy_pass         http://fastapi/staff/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /admin/ {
            proxy_pass         http://fastapi/staff/admin/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /emr/ {
            proxy_pass         http://fastapi/staff/emr/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /health { proxy_pass http://fastapi/health; proxy_set_header Host localhost; }
        location / { try_files $uri $uri/ /index.html; }
        location ~ /\. { deny all; }
    }

    # ── 환자 포털 — patient.mzclinic.cloud ──────────────────────
    server {
        listen 80;
        listen 8003;   # 로컬 테스트용
