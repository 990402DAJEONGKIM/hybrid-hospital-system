# NGINX — AWS EC2 통합 병원 시스템
# 단일 서버 블록, 경로 기반 정적 파일 서빙 + /api/ 프록시
# ALB → Nginx(80) → FastAPI(8000)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;

    # ALB가 실제 클라이언트 IP를 X-Forwarded-For에 담아 전달
    set_real_ip_from 10.0.0.0/8;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # 로그인 엔드포인트 rate limit
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;" always;

        # ── ALB 헬스체크 ────────────────────────────────────────
        location = /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        # ── API 로그인 rate limit (각 포털별) ──────────────────
        location = /api/patient/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/patient/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location = /api/staff/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/staff/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location = /api/portal/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/portal/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── AWS 백엔드 API 프록시 (/api/ → FastAPI, prefix 제거) ─
        location /api/ {
            proxy_pass         http://fastapi/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── 정적 파일 캐시 정책 ─────────────────────────────────
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── 환자 화면 (/patient/) ───────────────────────────────
        location /patient/ {
            try_files $uri $uri/ /patient/index.html;
        }

        # ── 직원 화면 (/staff/) — 간호사·의사·관리자 공통 ──────
        location /staff/ {
            try_files $uri $uri/ /staff/index.html;
        }

        # ── 관리자 화면 (/admin/) ───────────────────────────────
        location /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }

        # ── 구URL 리다이렉트 (/nurse/, /doctor/ → /staff/) ─────
        location /nurse/ { return 301 /staff/; }
        location /doctor/ { return 301 /staff/; }

        # ── 루트 → 환자 화면으로 리다이렉트 ────────────────────
        location = / {
            return 302 /patient/;
        }

        location ~ /\. {
            deny all;
        }
    }
}
