            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location /portal/ {
            proxy_pass         http://fastapi/patient/portal/;
