# NGINX — AWS 환자 포털 — by 김다정, 2026-06-06
# 역할: 환자 정적 파일 서빙 + /api/patient/ → FastAPI(localhost:8000) 프록시
# 구조: mzclinic.cloud → 환자 전용 (의료진/관리자는 각자 도메인에서 독립 인증)
# ALB → Nginx(80) → FastAPI(8000)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    server_tokens off;

    # ALB가 실제 클라이언트 IP를 X-Forwarded-For에 담아 전달
    set_real_ip_from 10.0.0.0/8;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # 로그인 엔드포인트 rate limit
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src https://cdnjs.cloudflare.com;" always;

        # ── ALB 헬스체크 ────────────────────────────────────────
        location = /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        # ── 직원(의사/간호사) 로그인 — by 김다정, 2026-06-06 ──────
        # mzclinic.cloud 에서 의사가 로그인 후 office.mzclinic.local 로 이동하는 구조.
        # 로그인·me 엔드포인트만 AWS nginx에서 노출 (진료 데이터 API는 온프레미스 전용 유지).
        location = /api/staff/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/staff/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        location = /api/staff/auth/me {
            proxy_pass         http://fastapi/staff/auth/me;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── 환자 로그인 rate limit ──────────────────────────────
        location = /api/patient/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass         http://fastapi/patient/auth/login;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── 환자 API (/api/patient/ → FastAPI /patient/) ────────
        location /api/patient/ {
            proxy_pass         http://fastapi/patient/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── 정적 파일 캐시 정책 ─────────────────────────────────
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── 환자 화면 (/patient/) ───────────────────────────────
        location /patient/ {
            try_files $uri $uri/ /patient/index.html;
        }

        # ── 루트 → /patient/ 리다이렉트 — by 김다정, 2026-06-06 ─
        # mzclinic.cloud는 환자 전용. 의료진/관리자는 각자 도메인 사용
        location = / {
            return 302 /patient/;
        }

        location ~ /\. {
            deny all;
        }
    }
}
