services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hospital
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user -d hospital"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: local-test/Dockerfile.backend
    env_file: .env
    environment:
      # DB_MODE=cloud: AWS RDS와 동일한 스키마(patient_id_hash) 사용
      DB_MODE: cloud
      DATABASE_URL: postgresql://hospital_user:${POSTGRES_PASSWORD}@db:5432/hospital
      DATABASE_READ_URL: postgresql://hospital_user:${POSTGRES_PASSWORD}@db:5432/hospital
      # 로컬 PostgreSQL은 SSL 없음
      DB_SSLMODE: disable
      # Vault 미설정 → vault_loader가 즉시 반환, env 직접 사용
      VAULT_ADDR: ""
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    environment:
      API_KEY: ${API_KEY}
    # envsubst로 nginx.conf 내 ${API_KEY} 치환 후 기동
    command: >
      /bin/sh -c "apk add --no-cache gettext &&
      envsubst '$$API_KEY' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf &&
      nginx -g 'daemon off;'"
    ports:
      - "80:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf.template:ro
      - ../app/patient/frontend:/var/www/html/patient:ro
      - ../app/staff/frontend:/var/www/html/staff:ro
      - ../app/portal/frontend:/var/www/html/portal:ro
    depends_on:
      - api

volumes:
  pgdata:
