# NGINX 로컬 테스트용 설정
# compose.yml의 envsubst가 ${API_KEY}를 .env의 값으로 치환
# upstream: api 컨테이너(포트 8000)로 프록시

user  nginx;
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events { worker_connections 256; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream fastapi {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        root /var/www/html;

        # ── 헬스체크 ────────────────────────────────────────
        location = /health {
            proxy_pass http://fastapi/health;
            proxy_set_header Host localhost;
        }

        # ── 환자 API (/api/patient/ → FastAPI /patient/) ───
        location /api/patient/ {
            proxy_pass         http://fastapi/patient/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── 스태프 API (/api/staff/ → FastAPI /staff/) ─────
        location /api/staff/ {
            proxy_pass         http://fastapi/staff/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── 병원 포털 API (/api/portal/ → FastAPI /portal/) ─
        location /api/portal/ {
            proxy_pass         http://fastapi/portal/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-API-Key         ${API_KEY};
            proxy_read_timeout 30s;
        }

        # ── 환자 프론트엔드 (/patient/) ─────────────────────
        location /patient/ {
            alias  /var/www/html/patient/;
            try_files $uri $uri/ /patient/index.html;
        }

        # ── 스태프 프론트엔드 (/staff/) ─────────────────────
        location /staff/ {
            alias  /var/www/html/staff/;
            try_files $uri $uri/ /staff/login.html;
        }

        # ── 병원 포털 프론트엔드 (/portal/) ─────────────────
        location /portal/ {
            alias  /var/www/html/portal/;
            try_files $uri $uri/ /portal/login.html;
        }

        # ── 루트 → 환자 로그인으로 리다이렉트 ──────────────
        location = / {
            return 302 /patient/login.html;
        }

        location ~ /\. { deny all; }
    }
}
