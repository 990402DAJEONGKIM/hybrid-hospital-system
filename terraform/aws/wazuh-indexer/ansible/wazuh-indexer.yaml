---
- name: Wazuh Indexer 설치
  hosts: wazuh-indexer
  become: yes
  vars_files:
    - vault.yml

  handlers:
    - name: systemd reload
      command: systemctl daemon-reload
      changed_when: false

  tasks:

    # ──────────────────────────────────────────
    # 시스템 기본 설정
    # ──────────────────────────────────────────
    - name: swap 생성
      shell: |
        fallocate -l 4G /swapfile
        chmod 600 /swapfile
        mkswap /swapfile
        swapon /swapfile
        grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
      args:
        creates: /swapfile

    - name: Ensure Timezone is set to UTC
      community.general.timezone:
        name: Etc/UTC
      tags: system

    - name: vm.swappiness 설정
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes

    - name: vm.max_map_count 설정
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes

    # ──────────────────────────────────────────
    # Wazuh 버전 고정
    # ──────────────────────────────────────────
    - name: Wazuh 버전 고정
      copy:
        dest: /etc/apt/preferences.d/wazuh
        content: |
          Package: wazuh-indexer
          Pin: version 4.14.5*
          Pin-Priority: 1001

    - name: 시스템 업데이트
      apt:
        update_cache: yes
        upgrade: safe
      timeout: 300

    - name: 필수 패키지 설치
      apt:
        name:
          - curl
          - apt-transport-https
          - gnupg
          - python3
          - awscli
          - openssl
        state: present

    # ──────────────────────────────────────────
    # 설치 여부 확인 (indexer 기준)
    # ──────────────────────────────────────────
    - name: Wazuh Indexer 설치 여부 확인
      stat:
        path: /etc/wazuh-indexer/opensearch.yml
      register: wazuh_indexer_installed

    # ──────────────────────────────────────────
    # 설치 블록 (최초 1회)
    # ──────────────────────────────────────────
    - name: Wazuh Indexer 신규 설치
      when: not wazuh_indexer_installed.stat.exists
      block:
        - name: Wazuh 잔재 정리
          shell: |
            systemctl stop wazuh-manager 2>/dev/null || true
            systemctl stop wazuh-dashboard 2>/dev/null || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-manager.prerm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-manager.postrm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-dashboard.prerm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-dashboard.postrm || true
            dpkg --force-all --purge wazuh-manager wazuh-dashboard || true
            apt autoremove -y || true
            dpkg --configure -a || true
            apt-get install -f -y || true
            rm -rf /etc/wazuh-dashboard || true
            rm -rf /var/ossec || true
            rm -rf /usr/share/wazuh-dashboard || true
            systemctl daemon-reload || true
            systemctl reset-failed || true
        - name: wazuh-install.sh 다운로드
          get_url:
            url: 'https://packages.wazuh.com/4.14/wazuh-install.sh'
            dest: '/tmp/wazuh-install.sh'
            mode: '0755'

        - name: 이전 설치 파일 정리
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/wazuh-install-files
            - /tmp/wazuh-install-files.tar

        - name: 다중 노드 config.yml 작성
          copy:
            dest: /tmp/config.yml
            content: |
              nodes:
                indexer:
                  - name: node-1
                    ip: "{{ ansible_default_ipv4.address }}"
                server:
                  - name: wazuh-1
                    ip: "{{ wazuh_manager1_ip }}"
                    node_type: master
                dashboard:
                  - name: dashboard-1
                    ip: "{{ wazuh_manager1_ip }}"

        - name: 인증서 생성
          shell: bash /tmp/wazuh-install.sh --generate-config-files
          args:
            chdir: /tmp/
          async: 600
          poll: 30

        - name: wazuh-install-files.tar S3 업로드 (Manager EC2들이 사용)
          shell: >
            aws s3 cp /tmp/wazuh-install-files.tar
            s3://aws-k2p-storage-01/wazuh/wazuh-install-files.tar
            --region {{ ansible_env.AWS_DEFAULT_REGION | default('ap-south-2') }}
          environment:
            AWS_DEFAULT_REGION: "ap-south-2"

        - name: Wazuh Indexer 설치
          shell: bash /tmp/wazuh-install.sh --wazuh-indexer node-1 --overwrite
          args:
            chdir: /tmp/
          async: 1800
          poll: 30

        - name: Indexer API 준비 대기 (start-cluster 실행 전)
          wait_for:
            port: 9200
            host: "{{ ansible_default_ipv4.address }}"
            delay: 15
            timeout: 300
            msg: "Indexer가 start-cluster 전에 응답하지 않습니다."

        - name: Wazuh Cluster 시작
          shell: bash /tmp/wazuh-install.sh --start-cluster
          args:
            chdir: /tmp/
          async: 600
          poll: 30

      rescue:
        - name: 설치 실패 로그 출력
          shell: tail -50 /var/log/wazuh-install.log
          register: wazuh_log
          failed_when: false

        - name: 에러 로그 출력
          debug:
            var: wazuh_log.stdout_lines

        - name: 설치 실패 처리
          fail:
            msg: "Wazuh Indexer 설치 실패. 위 로그를 확인하세요."

    # ──────────────────────────────────────────
    # start-cluster 항상 실행 (재부팅 후 /tmp 날아가도 대비)
    # ──────────────────────────────────────────
    - name: wazuh-install.sh 다운로드 (없을 경우)
      get_url:
        url: 'https://packages.wazuh.com/4.14/wazuh-install.sh'
        dest: '/tmp/wazuh-install.sh'
        mode: '0755'
        force: no

    - name: wazuh-install-files.tar S3 다운로드 (없을 경우)
      shell: >
        aws s3 cp s3://aws-k2p-storage-01/wazuh/wazuh-install-files.tar
        /tmp/wazuh-install-files.tar --region ap-south-2
      args:
        creates: /tmp/wazuh-install-files.tar
      environment:
        AWS_DEFAULT_REGION: "ap-south-2"

    - name: wazuh-install-files 압축 해제
      shell: tar -xf /tmp/wazuh-install-files.tar -C /tmp/

    - name: Wazuh Cluster start-cluster 실행
      shell: bash /tmp/wazuh-install.sh --start-cluster
      args:
        chdir: /tmp/
      async: 600
      poll: 30
      ignore_errors: yes


    - name: JVM 힙 메모리 설정
      replace:
        path: /etc/wazuh-indexer/jvm.options
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: '^-Xms.*', replace: '-Xms7g' }
        - { regexp: '^-Xmx.*', replace: '-Xmx7g' }

    - name: Indexer 메모리 lock 설정
      lineinfile:
        path: /etc/wazuh-indexer/opensearch.yml
        regexp: '^bootstrap.memory_lock:'
        line: 'bootstrap.memory_lock: true'
        state: present

    - name: systemd override 디렉토리 생성
      file:
        path: /etc/systemd/system/wazuh-indexer.service.d
        state: directory
        mode: '0755'

    - name: Indexer systemd 재시작 설정
      copy:
        dest: /etc/systemd/system/wazuh-indexer.service.d/restart.conf
        content: |
          [Unit]
          StartLimitIntervalSec=300
          StartLimitBurst=5
          RequiresMountsFor=/mnt/wazuh-indexer-data  

          [Service]
          Restart=always
          RestartSec=30
          LimitMEMLOCK=infinity
      notify: systemd reload

    - meta: flush_handlers


    # ──────────────────────────────────────────
    # 인덱서 데이터 전용 EBS 마운트 + 데이터 이전
    # 추가 260610 김강환
    # ──────────────────────────────────────────
    - name: 데이터 디스크(/dev/sdf) 존재 확인
      stat:
        path: /dev/nvme1n1
      register: data_disk

    - name: 데이터 디스크 파일시스템 생성 (비어있을 때만, 최초 1회)
      filesystem:
        fstype: ext4
        dev: /dev/nvme1n1
      when: data_disk.stat.exists

    - name: 마운트 포인트 생성
      file:
        path: /mnt/wazuh-indexer-data
        state: directory
      when: data_disk.stat.exists

    - name: fstab 등록 후 마운트 (nofail 필수)
      # nofail: EBS 미부착 상태로 부팅해도 서버가 멈추지 않게
      # x-systemd.device-timeout: 디스크 없을 때 무한대기 방지
      mount:
        path: /mnt/wazuh-indexer-data
        src: /dev/nvme1n1
        fstype: ext4
        opts: defaults,nofail,x-systemd.device-timeout=10
        state: mounted
      when: data_disk.stat.exists

    - name: 기존 인덱스 데이터를 EBS로 이전 (EBS가 비어있을 때만, 최초 1회)
      # 재구축(AMI) 시엔 EBS에 이미 데이터가 있으므로 이 블록은 건너뜀 → 멱등
      shell: |
        if [ ! -d /mnt/wazuh-indexer-data/nodes ] && [ -d /var/lib/wazuh-indexer/nodes ]; then
          systemctl stop wazuh-indexer
          cp -a /var/lib/wazuh-indexer/. /mnt/wazuh-indexer-data/
          echo "MOVED"
        fi
      register: data_move
      changed_when: "'MOVED' in data_move.stdout"
      when: data_disk.stat.exists

    - name: 데이터 디렉토리 소유권 부여
      file:
        path: /mnt/wazuh-indexer-data
        owner: wazuh-indexer
        group: wazuh-indexer
        recurse: yes
      when: data_disk.stat.exists

    - name: opensearch.yml path.data 를 EBS 마운트로 변경
      lineinfile:
        path: /etc/wazuh-indexer/opensearch.yml
        regexp: '^path.data:'
        line: 'path.data: /mnt/wazuh-indexer-data'
      when: data_disk.stat.exists

    - name: opensearch-security 백업 디렉토리 권한 fix
      shell: |
        find /etc/wazuh-indexer/ -name "opensearch-security.bak.*" \
          -exec chown -R wazuh-indexer:wazuh-indexer {} \;
      ignore_errors: yes
      tags: config


# ──────────────────────────────────────────
    # 서비스 재시작
    # ──────────────────────────────────────────
    - name: Wazuh Indexer 재시작
      systemd:
        name: wazuh-indexer
        state: restarted
        enabled: yes

    - name: Wazuh Indexer API 응답 대기
      wait_for:
        port: 9200
        host: "{{ ansible_default_ipv4.address }}"
        delay: 15
        timeout: 300
        msg: "Indexer가 제한 시간 내에 시작되지 않았습니다."

    - name: Wazuh admin 비밀번호 고정
      shell: >
        timeout 60
        /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh
        -u admin -p '{{ wazuh_admin_password }}'
      no_log: true
      changed_when: false
      register: pwd_change
      until: pwd_change.rc == 0
      retries: 5
      delay: 10

    - name: kibanaserver 비밀번호 고정
      shell: >
        timeout 60
        /usr/share/wazuh-indexer/plugins/opensearch-security/tools/wazuh-passwords-tool.sh
        -u kibanaserver -p '{{ kibanaserver_password }}'
      no_log: true
      changed_when: false
      register: kibana_pwd_change
      until: kibana_pwd_change.rc == 0
      retries: 5
      delay: 10

    # ──────────────────────────────────────────
    # Keycloak OIDC JWT role mapping for Wazuh Dashboard SSO
    # ──────────────────────────────────────────
    - name: Keycloak JWKS 조회 # [2026-06-10 박경수] Wazuh OIDC JWT signing_key 자동 반영
      uri:
        url: "{{ keycloak_base_url | default('https://monitoring.mzclinic.cloud') }}/realms/{{ keycloak_realm | default('mzclinic') }}/protocol/openid-connect/certs"
        method: GET
        return_content: yes
        validate_certs: yes
      register: keycloak_jwks
      changed_when: false
      tags: oidc


    #  .keys → ['keys']로 수정  -> 2026-06-10 김강환
    # 원인: Jinja2에서 .keys는 Python dict.keys() 메서드로 인식되어
    # selectattr 필터에 'builtin_function_or_method' 에러 발생
    #['keys']로 접근하면 JSON 응답의 keys 배열로 올바르게 인식됨
    - name: Keycloak 서명용 인증서 PEM 생성 # [2026-06-10 박경수]
      copy:
        dest: /tmp/keycloak-sig.crt
        mode: '0600'
        content: |
          -----BEGIN CERTIFICATE-----
          {{ (keycloak_jwks.json['keys'] | selectattr('use', 'equalto', 'sig') | list | first).x5c[0] }}
          -----END CERTIFICATE-----
      no_log: true
      tags: oidc

    - name: Keycloak 공개키 추출 # [2026-06-10 박경수] jwt_auth_domain signing_key 값 생성
      shell: |
        openssl x509 -pubkey -noout -in /tmp/keycloak-sig.crt \
          | sed '/BEGIN PUBLIC KEY/d;/END PUBLIC KEY/d' \
          | tr -d '\n'

      register: keycloak_signing_key
      changed_when: false
      no_log: true
      tags: oidc


    - name: Keycloak signing_key 추출 결과 검증
      ansible.builtin.fail:
        msg: "Keycloak signing_key is empty. Wazuh Indexer JWT authentication cannot work."
      when: keycloak_signing_key.stdout | trim | length == 0
      tags: oidc

    - name: OpenSearch Security config 백업 # [2026-06-10 박경수]
      copy:
        src: /etc/wazuh-indexer/opensearch-security/config.yml
        dest: /etc/wazuh-indexer/opensearch-security/config.yml.bak.before-keycloak-oidc
        remote_src: yes
        force: no
        mode: '0640'
      tags: oidc


    # [2026-06-10 박경수] Keycloak OIDC JWT 인증 설정. Wazuh Indexer JWT authenticator가 jwks_uri 및 중첩 roles_key를 안정적으로 처리하지 못해 signing_key + flat roles claim 사용.
    # config yml 내 주석을 밖으로 빼냄 - 260610 김강환 
    - name: JWT 인증 도메인 Keycloak 공개키/flat roles 기준으로 보정
      # [2026-06-10 박경수] Keycloak OIDC JWT 인증 설정
      # [2026-06-10 김강환] config.yml 내 주석 제거 - OpenSearch Security 파서가 주석 허용 안 함
      replace:
        path: /etc/wazuh-indexer/opensearch-security/config.yml
        regexp: '(?s)^      jwt_auth_domain:\n.*?^      clientcert_auth_domain:'
        replace: "      jwt_auth_domain:\n        description: \"Authenticate via Keycloak OIDC JWT\"\n        http_enabled: true\n        transport_enabled: true\n        order: 0\n        http_authenticator:\n          type: jwt\n          challenge: false\n          config:\n            signing_key: \"{{ keycloak_signing_key.stdout }}\"\n            jwt_header: \"Authorization\"\n            jwt_clock_skew_tolerance_seconds: 30\n            roles_key: \"roles\"\n            subject_key: \"preferred_username\"\n        authentication_backend:\n          type: noop\n      clientcert_auth_domain:"
      no_log: true
      register: oidc_config_replace
      tags: oidc

    - name: Wazuh Indexer JWT signing_key config 반영 확인
      ansible.builtin.shell: |
        grep -q 'signing_key: "' /etc/wazuh-indexer/opensearch-security/config.yml
      changed_when: false
      tags: oidc

    - name: all_access role mapping에 Keycloak admin backend role 매핑 # [2026-06-10 박경수]
      replace:
        path: /etc/wazuh-indexer/opensearch-security/roles_mapping.yml
        regexp: '(?ms)^all_access:\n.*?(?=^[A-Za-z0-9_]+:)'
        replace: |
          all_access:
            reserved: true
            hidden: false
            backend_roles:
            - "admin"
            hosts: []
            users: []
            and_backend_roles: []
            description: "Maps Keycloak admin backend role to all_access"
      register: all_access_mapping_replace
      tags: oidc

    - name: OpenSearch Security 설정 재적용 # [2026-06-10 박경수]
      command: >
        /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh
        -cd /etc/wazuh-indexer/opensearch-security/
        -icl -nhnv
        -cacert /etc/wazuh-indexer/certs/root-ca.pem
        -cert /etc/wazuh-indexer/certs/admin.pem
        -key /etc/wazuh-indexer/certs/admin-key.pem
        -h {{ ansible_default_ipv4.address }}
      environment:
        JAVA_HOME: /usr/share/wazuh-indexer/jdk
      register: securityadmin_apply
      changed_when: "'Done with success' in securityadmin_apply.stdout"
      failed_when: securityadmin_apply.rc != 0 or ('Done with success' not in securityadmin_apply.stdout)
      tags: oidc

    # ──────────────────────────────────────────
    # Grafana Alloy 설치
    # 공식문서: https://grafana.com/docs/alloy/latest/set-up/install/linux/
    # ──────────────────────────────────────────
    - name: /etc/apt/keyrings 디렉토리 생성
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      tags: alloy

    - name: Grafana GPG 키 다운로드
      get_url:
        url: https://apt.grafana.com/gpg-full.key
        dest: /etc/apt/keyrings/grafana.asc
        mode: '0644'
      tags: alloy

    - name: Grafana APT 레포지토리 추가
      copy:
        dest: /etc/apt/sources.list.d/grafana.list
        content: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main\n"
        mode: '0644'
      tags: alloy

    - name: APT 캐시 업데이트 및 Alloy 설치
      apt:
        name: alloy
        state: present
        update_cache: yes
      tags: alloy

    - name: Alloy 설정 배포
      copy:
        dest: /etc/alloy/config.alloy
        owner: alloy
        group: alloy
        mode: '0644'
        content: |
          // Wazuh Indexer 시스템 메트릭 수집
          // node exporter 내장 — 별도 설치 불필요
          prometheus.exporter.unix "local" {
            include_exporter_metrics = true
          }
          discovery.relabel "local" {
            targets = prometheus.exporter.unix.local.targets
            rule {
              target_label = "instance"
              replacement  = "wazuh-indexer"
            }
          }
          prometheus.scrape "local" {
            targets         = discovery.relabel.local.output
            forward_to      = [prometheus.remote_write.prometheus.receiver]
            scrape_interval = "15s"
          }
          prometheus.remote_write "prometheus" {
            endpoint {
              url = "http://10.0.12.128:9090/api/v1/write"
            }
            wal {
              truncate_frequency = "2h"
              min_keepalive_time = "5m"
              max_keepalive_time = "8h"
            }
          }
      tags: alloy

    - name: Alloy 서비스 시작
      systemd:
        name: alloy
        state: started
        enabled: yes
        daemon_reload: yes
      tags: alloy

    - name: Alloy 상태 확인
      shell: systemctl is-active alloy
      register: alloy_status
      tags: alloy

    - name: Alloy 상태 출력
      debug:
        var: alloy_status.stdout
      tags: alloy

    - name: ISM 90일 보존 정책 설정
      uri:
        url: "https://{{ ansible_default_ipv4.address }}:9200/_plugins/_ism/policies/wazuh-90day-retention"
        method: PUT
        user: admin
        password: "{{ wazuh_admin_password }}"
        validate_certs: no
        body_format: json
        status_code: [200, 201, 409]
        body:
          policy:
            description: "Wazuh 인덱스 90일 보존 후 삭제"
            default_state: hot
            states:
              - name: hot
                actions: []
                transitions:
                  - state_name: delete
                    conditions:
                      min_index_age: "90d"
              - name: delete
                actions:
                  - delete: {}
                transitions: []
            ism_template:
              - index_patterns:
                  - "wazuh-alerts-*"
                  - "wazuh-archives-*"
                priority: 100
      tags: ism

    # ──────────────────────────────────────────
    # Indexer S3 스냅샷
    # ──────────────────────────────────────────
    - name: repository-s3 플러그인 설치
      shell: |
        /usr/share/wazuh-indexer/bin/opensearch-plugin install repository-s3 --batch
      args:
        creates: /usr/share/wazuh-indexer/plugins/repository-s3
      tags: snapshot

    - name: repository-s3 플러그인 설치 후 재시작
      systemd:
        name: wazuh-indexer
        state: restarted
        enabled: yes
      tags: snapshot

    - name: Indexer API 응답 대기 (플러그인 재시작 후)
      wait_for:
        port: 9200
        host: "{{ ansible_default_ipv4.address }}"
        delay: 15
        timeout: 300
      tags: snapshot

    - name: S3 스냅샷 레포지토리 등록
      uri:
        url: "https://{{ ansible_default_ipv4.address }}:9200/_snapshot/aws-wazuh-indexer-snapshot-repo"
        method: PUT
        user: admin
        password: "{{ wazuh_admin_password }}"
        validate_certs: no
        body_format: json
        status_code: [200, 201, 409]
        body:
          type: s3
          settings:
            bucket: "aws-k2p-storage-01"
            region: "ap-south-2"
            base_path: "wazuh/snapshots"
            compress: true
            endpoint: "s3.ap-south-2.amazonaws.com"
      tags: snapshot

    - name: admin 비밀번호 파일 저장
      copy:
        dest: /etc/wazuh-indexer/.admin_password
        content: "{{ wazuh_admin_password }}"
        owner: root
        group: root
        mode: '0600'
      no_log: true
      tags: snapshot

    - name: 스냅샷 크론 스크립트 배포
      copy:
        dest: /usr/local/bin/wazuh-snapshot.sh
        mode: '0700'
        content: |
          #!/bin/bash
          DATE=$(date +%Y%m%d-%H%M)
          INDEXER_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)
          ADMIN_PW=$(cat /etc/wazuh-indexer/.admin_password)
          curl -sk -u admin:${ADMIN_PW} \
            -X PUT "https://${INDEXER_IP}:9200/_snapshot/aws-wazuh-indexer-snapshot-repo/snapshot-${DATE}?wait_for_completion=false" \
            -H "Content-Type: application/json" \
            -d '{
              "indices": "wazuh-alerts-*,wazuh-archives-*",
              "ignore_unavailable": true,
              "include_global_state": false
            }'
      tags: snapshot

    - name: 스냅샷 크론 등록 (1시간마다)
      cron:
        name: "wazuh-snapshot"
        minute: "0"
        hour: "*"
        job: "/usr/local/bin/wazuh-snapshot.sh >> /var/log/wazuh-snapshot.log 2>&1"
        user: root
      tags: snapshot


    # ──────────────────────────────────────────
    # 인덱서 헬스 메트릭 (자동복구 트리거용)
    # 추가 260610 김강환
    # ──────────────────────────────────────────
    - name: 인덱서 헬스 메트릭 푸시 스크립트
      copy:
        dest: /usr/local/bin/wazuh-indexer-health.sh
        mode: '0700'
        content: |
          #!/bin/bash
          # wazuh-indexer active면 1, 아니면 0
          ACTIVE=$(systemctl is-active wazuh-indexer >/dev/null 2>&1 && echo 1 || echo 0)
          aws cloudwatch put-metric-data --namespace Custom/Wazuh \
            --metric-name wazuh_indexer_up --value $ACTIVE \
            --dimensions Role=wazuh-indexer --region ap-south-2
      tags: recovery

    - name: 헬스 메트릭 크론 등록 (1분마다)
      cron:
        name: "wazuh-indexer-health"
        minute: "*"
        job: "/usr/local/bin/wazuh-indexer-health.sh >/dev/null 2>&1"
        user: root
      tags: recovery

    # ──────────────────────────────────────────
    # 결과 확인
    # ──────────────────────────────────────────
    - name: 서비스 상태 확인
      shell: |
        echo "=== Indexer ===" && systemctl is-active wazuh-indexer
      register: service_status

    - name: 서비스 상태 출력
      debug:
        var: service_status.stdout_lines

    - name: 메모리 상태 확인
      command: free -h
      register: memory_status

    - name: 메모리 상태 출력
      debug:
        var: memory_status.stdout_lines