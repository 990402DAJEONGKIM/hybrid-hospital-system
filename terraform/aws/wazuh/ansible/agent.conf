<agent_config>

  <!-- ======================================= -->
  <!-- FIM (파일 무결성 모니터링)                -->
  <!-- ======================================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- realtime 모니터링 (중요 경로) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/var/www/html</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/usr/share/nginx/html</directories>
    <directories realtime="yes" check_all="yes">/root/.ssh</directories>
    <directories realtime="yes" check_all="yes">/home/*/.ssh</directories>

    <!-- 주기 모니터링 -->
    <directories check_all="yes">/usr/bin,/usr/sbin</directories>

    <!-- 무시 목록 -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>

  </syscheck>

  <!-- ======================================= -->
  <!-- 로그 수집                               -->
  <!-- ======================================= -->

  <!-- Nginx 로그 -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Ubuntu 경로 -->
    <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Amazon Linux 경로 -->
    <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

</agent_config>