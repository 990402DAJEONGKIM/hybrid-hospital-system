<agent_config>
  <syscheck>
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/root/.ssh</directories>
    <directories realtime="yes" check_all="yes">/home/*/.ssh</directories>
    <directories check_all="yes">/usr/bin,/usr/sbin,/usr/local/bin,/usr/lib/systemd/system</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/usr/bin/vector</ignore>
    <ignore>/var/lib/vector</ignore>
    <ignore>/etc/vector</ignore>
    <ignore>/etc/systemd/system/vector.service</ignore>
    <ignore>/etc/systemd/system/vector.service.d</ignore>
    <ignore>/etc/systemd/system/multi-user.target.wants/vector.service</ignore>
  </syscheck>

<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/auth.log</location>
</localfile>
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/syslog</location>
</localfile>