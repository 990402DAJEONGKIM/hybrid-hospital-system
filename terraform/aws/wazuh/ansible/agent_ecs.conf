<agent_config>
  <syscheck>
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/root/.ssh</directories>
    <directories realtime="yes" check_all="yes">/home/*/.ssh</directories>
    <directories check_all="yes">/usr/bin,/usr/sbin,/usr/local/bin,/usr/lib/systemd/system</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
  </syscheck>

  <!-- SSH 로그인/실패 (5712, 5715, 100013, 100017 룰) -->
  <!-- 공식문서 예제: filter field="_SYSTEMD_UNIT" -->
  <localfile>
    <location>journald</location>
    <log_format>journald</log_format>
    <filter field="_SYSTEMD_UNIT">^sshd.service$</filter>
  </localfile>

  <!-- sudo 권한 상승 (5402, 100001~100003 룰) -->
  <!-- 공식문서 예제: filter field="SYSLOG_IDENTIFIER" -->
  <localfile>
    <location>journald</location>
    <log_format>journald</log_format>
    <filter field="SYSLOG_IDENTIFIER">^sudo$</filter>
  </localfile>

  <!-- 계정 생성/삭제 (5902, 100018 룰) -->
  <!-- 공식문서 예제: filter field="SYSLOG_IDENTIFIER" -->
  <localfile>
    <location>journald</location>
    <log_format>journald</log_format>
    <filter field="SYSLOG_IDENTIFIER">^useradd$</filter>
  </localfile>

  <localfile>
    <location>journald</location>
    <log_format>journald</log_format>
    <filter field="SYSLOG_IDENTIFIER">^userdel$</filter>
  </localfile>

  <!-- 에러 이상 심각도 (커널 포함) -->
  <!-- 공식문서 예제: PRIORITY [0-3], ignore_if_missing="yes" -->
  <localfile>
    <location>journald</location>
    <log_format>journald</log_format>
    <filter field="PRIORITY" ignore_if_missing="yes">[0-3]</filter>
  </localfile>

</agent_config>