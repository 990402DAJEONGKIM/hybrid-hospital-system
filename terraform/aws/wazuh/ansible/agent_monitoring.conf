<agent_config>
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>50000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <packages>yes</packages>
    <os>yes</os>
    <processes>yes</processes>
  </wodle>

  <!-- FIM - ISMS-P 2.9.1 - 추가 260612 김강환 -->
  <syscheck>
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/home/ubuntu</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore type="sregex">\.swp$</ignore>
  </syscheck>

  <!-- SSH/sudo 접근 기록 - ISMS-P 2.5.1 -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Nginx 접근 기록 (Keycloak) - ISMS-P 2.9.1 -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Grafana 로그 - 운영 모니터링 -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/grafana/grafana.log</location>
  </localfile>

  <!-- kernel/UFW 로그 - 추가 260612 김강환 -->
  <localfile>
    <location>journald</location>
    <log_format>journald</log_format>
    <filter field="_TRANSPORT">kernel</filter>
  </localfile>
</agent_config>