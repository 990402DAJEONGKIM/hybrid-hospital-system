<agent_config>
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>50000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <packages>yes</packages>
    <os>yes</os>
    <processes>yes</processes>
  </wodle>

  <syscheck>
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/home/mspadmin</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/adjtime</ignore>
    <!-- vim swap, psql history 오탐 제거 - 260609 김강환 -->
    <ignore type="sregex">\.swp$</ignore>
    <ignore type="sregex">\.psql_history$</ignore>
    <!-- Vault 내부 스토리지 파일 오탐 제거 - 260609 김강환 -->
    <!-- vault-data/sys, core는 토큰/lease/키 파일이 상시 생성/삭제되어 노이즈 발생 -->
    <!-- 룰(100049~100056)로 세분화 처리하므로 syscheck ignore 불필요 -->
    <!-- vault-logs/audit.log는 삭제 탐지 유지를 위해 ignore 제거 -->
  </syscheck>

  <!-- SSH 로그인/실패, sudo 기록 - ISMS-P 2.5.1 -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- 시스템 로그 -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Nginx 접근 기록 - ISMS-P 2.9.1 -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/deident/nginx/access.log</location>
  </localfile>

  <!-- Nginx 에러 로그 -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/deident/nginx/error.log</location>
  </localfile>

  <!-- DB 감사 로그 - ISMS-P 2.9.1 개인정보처리시스템 접근기록 -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/deident/db_audit.log</location>
  </localfile>

  <!-- EMR FastAPI 감사 로그 - ISMS-P 2.9.1 -->
  <!-- 형식: 타임스탬프+AUDIT+JSON, wazuh-logtest 확인으로 json decoder 자동 파싱 확인됨 -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/onprem-emr/audit.log</location>
  </localfile>

  <!-- Vault 감사 로그 - ISMS-P 2.5.1, 2.7.1 -->
  <localfile>
    <log_format>json</log_format>
    <location>/home/mspadmin/hospital-db/vault-logs/audit.log</location>
  </localfile>

</agent_config>