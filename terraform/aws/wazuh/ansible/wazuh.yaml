# wazuh.yaml
---
- name: Wazuh Manager + Dashboard 설치
  hosts: wazuh
  become: yes
  vars_files:
    - vault.yml

  handlers:
    - name: systemd reload
      command: systemctl daemon-reload
      changed_when: false

  tasks:

    # ──────────────────────────────────────────
    # 시스템 기본 설정
    # ──────────────────────────────────────────
    - name: swap 생성
      shell: |
        fallocate -l 4G /swapfile
        chmod 600 /swapfile
        mkswap /swapfile
        swapon /swapfile
        grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
      args:
        creates: /swapfile
      tags: system

    - name: Timezone KST 설정
      shell: timedatectl set-timezone Asia/Seoul
      tags: system

    - name: vm.swappiness 설정
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes
      tags: system

    - name: vm.max_map_count 설정
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes
      tags: system

    # ──────────────────────────────────────────
    # Wazuh 버전 고정
    # ──────────────────────────────────────────
    - name: Wazuh 버전 고정
      copy:
        dest: /etc/apt/preferences.d/wazuh
        content: |
          Package: wazuh-manager wazuh-dashboard
          Pin: version 4.14.5*
          Pin-Priority: 1001
      tags: install

    - name: 시스템 업데이트
      apt:
        update_cache: yes
        upgrade: safe
      timeout: 300
      tags: install

    - name: 필수 패키지 설치
      apt:
        name:
          - curl
          - apt-transport-https
          - gnupg
          - python3
          - libxml2-utils
          - awscli
        state: present
      tags: install

    # ──────────────────────────────────────────
    # 설치 여부 확인
    # ──────────────────────────────────────────
    - name: Wazuh 설치 여부 확인
      shell: |
        test -f /var/ossec/etc/ossec.conf && \
        test -d /etc/wazuh-dashboard && \
        echo "installed" || echo "not_installed"
      register: wazuh_installed
      changed_when: false
      tags: always

    # ──────────────────────────────────────────
    # 설치 블록 (최초 1회)
    # ──────────────────────────────────────────
    - name: Wazuh 신규 설치
      when: wazuh_installed.stdout == "not_installed"
      tags: install
      block:
        - name: Wazuh 잔재 정리
          shell: |
            systemctl stop wazuh-manager 2>/dev/null || true
            systemctl stop wazuh-dashboard 2>/dev/null || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-manager.prerm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-manager.postrm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-dashboard.prerm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-dashboard.postrm || true
            dpkg --force-all --purge wazuh-manager wazuh-dashboard || true
            apt autoremove -y || true
            dpkg --configure -a || true
            apt-get install -f -y || true
            rm -rf /etc/wazuh-dashboard || true
            rm -rf /var/ossec || true
            rm -rf /usr/share/wazuh-dashboard || true
            systemctl daemon-reload || true
            systemctl reset-failed || true

        - name: wazuh-install.sh 다운로드
          get_url:
            url: 'https://packages.wazuh.com/4.14/wazuh-install.sh'
            dest: '/tmp/wazuh-install.sh'
            mode: '0755'

        - name: 이전 설치 파일 정리
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/wazuh-install-files
            - /tmp/wazuh-install-files.tar


        - name: wazuh-install-files.tar S3 다운로드
          shell: >
            aws s3 cp s3://wazuh-ansible-ssm/wazuh-install-files.tar
            /tmp/wazuh-install-files.tar --region ap-south-2
          environment:
            AWS_DEFAULT_REGION: "ap-south-2"

        - name: Wazuh Manager 설치 (master)
          shell: bash /tmp/wazuh-install.sh --wazuh-server wazuh-1 --overwrite
          args:
            chdir: /tmp/
          async: 1800
          poll: 30

        - name: Wazuh Dashboard 설치
          shell: bash /tmp/wazuh-install.sh --wazuh-dashboard dashboard-1 --overwrite -fd
          args:
            chdir: /tmp/
          async: 1800
          poll: 30

      rescue:
        - name: 설치 실패 로그 출력
          shell: tail -50 /var/log/wazuh-install.log
          register: wazuh_log
          failed_when: false

        - name: 에러 로그 출력
          debug:
            var: wazuh_log.stdout_lines

        - name: 설치 실패 처리
          fail:
            msg: "Wazuh 설치 실패. 위 로그를 확인하세요."

    # ──────────────────────────────────────────
    # 설정 블록
    # ──────────────────────────────────────────
    - name: 로컬 Indexer 서비스 중지
      systemd:
        name: wazuh-indexer
        state: stopped
        enabled: no
      ignore_errors: yes
      tags: config

    - name: 최신 인증서 S3에서 다운로드
      shell: >
        aws s3 cp s3://wazuh-ansible-ssm/wazuh-install-files.tar
        /tmp/wazuh-install-files.tar --region ap-south-2
      environment:
        AWS_DEFAULT_REGION: "ap-south-2"
      tags: config

    - name: 인증서 압축 해제
      shell: tar -xf /tmp/wazuh-install-files.tar -C /tmp/
      tags: config

    - name: Filebeat 인증서 갱신
      shell: |
        cp /tmp/wazuh-install-files/{{ wazuh_cert_name }}.pem /etc/filebeat/certs/
        cp /tmp/wazuh-install-files/{{ wazuh_cert_name }}-key.pem /etc/filebeat/certs/
        cp /tmp/wazuh-install-files/root-ca.pem /etc/filebeat/certs/
        cp /tmp/wazuh-install-files/root-ca.pem /etc/wazuh-dashboard/certs/
      tags: config

    - name: ossec.conf 템플릿 배포
      template:
        src: ossec.conf.j2
        dest: /var/ossec/etc/ossec.conf
        owner: root
        group: wazuh
        mode: '0640'
      tags: config

    - name: 커스텀 룰 배포
      copy:
        src: rules/{{ item }}
        dest: /var/ossec/etc/rules/{{ item }}
        owner: root
        group: wazuh
        mode: '0640'
      loop:
        - local_rules.xml
        - rds_rules.xml
        - onprem_rules.xml
      tags: config

    # 1. ecs-ec2 그룹 생성
    - name: ecs-ec2 Agent 그룹 생성
      shell: |
        /var/ossec/bin/agent_groups -a -g ecs-ec2 -q || true
      tags: config

    # 2. ecs-ec2 그룹 디렉토리 생성
    - name: ecs-ec2 그룹 디렉토리 생성
      file:
        path: /var/ossec/etc/shared/ecs-ec2
        state: directory
        owner: wazuh
        group: wazuh
        mode: '0770'
      tags: config

    # 3. 기존 agent.conf를 ecs-ec2 그룹에도 배포
    - name: ecs-ec2 Agent 설정 배포
      copy:
        src: agent_ecs.conf 
        dest: /var/ossec/etc/shared/ecs-ec2/agent.conf
        owner: wazuh
        group: wazuh
        mode: '0640'
      tags: config

    - name: Agent 중앙 설정 배포
      copy:
        src: agent.conf
        dest: /var/ossec/etc/shared/default/agent.conf
        owner: wazuh
        group: wazuh
        mode: '0640'
      tags: config

    - name: onprem 그룹 디렉토리 생성
      file:
        path: /var/ossec/etc/shared/onprem
        state: directory
        owner: wazuh
        group: wazuh
        mode: '0770'
      tags: config

    - name: onprem Agent 설정 배포
      copy:
        src: agent_onprem.conf
        dest: /var/ossec/etc/shared/onprem/agent.conf
        owner: wazuh
        group: wazuh
        mode: '0640'
      tags: config

    - name: onprem Agent 그룹 이동
      shell: |
        /var/ossec/bin/agent_groups -a -i $(
          /var/ossec/bin/agent_control -l | grep onprem-mspserver | awk '{print $2}' | tr -d ','
        ) -g onprem -q
      ignore_errors: yes
      tags: config

    - name: ossec.conf XML 검증
      shell: |
        python3 -c "
        import xml.etree.ElementTree as ET
        ET.parse('/var/ossec/etc/ossec.conf')
        print('XML OK')
        "
      register: xml_check
      failed_when: "'XML OK' not in xml_check.stdout"
      tags: config

    - name: Wazuh 설정 파서 검증
      command: /var/ossec/bin/wazuh-analysisd -t
      register: analysisd_check
      failed_when: analysisd_check.rc != 0
      tags: config

    - name: analysisd 검증 결과 출력
      debug:
        var: analysisd_check.stdout_lines
      when: analysisd_check.stdout_lines is defined
      tags: config

    - name: Dashboard server.host 설정
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^server.host:'
        line: 'server.host: 0.0.0.0'
      tags: config

    - name: Dashboard session TTL 설정
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.session.ttl:'
        line: 'opensearch_security.session.ttl: 900000'
      tags: config

    - name: Filebeat 설정 배포
      template:
        src: filebeat.yml.j2
        dest: /etc/filebeat/filebeat.yml
        owner: root
        group: root
        mode: '0600'
      tags: config

    - name: Filebeat 기본 경로 설정
      copy:
        dest: /etc/default/filebeat
        content: |
          BEAT_PATH_OPTS="--path.home /usr/share/filebeat --path.config /etc/filebeat --path.data /var/lib/filebeat --path.logs /var/log/filebeat"
        mode: '0644'
      tags: config

    - name: Dashboard opensearch.hosts
      replace:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: 'opensearch.hosts:.*'
        replace: 'opensearch.hosts: ["https://{{ wazuh_indexer_ip }}:9200"]'
      tags: config

    - name: systemd override 디렉토리 생성
      file:
        path: "/etc/systemd/system/{{ item }}.service.d"
        state: directory
        mode: '0755'
      loop:
        - wazuh-manager
        - wazuh-dashboard
      tags: config

    - name: Manager systemd 재시작 설정
      copy:
        dest: /etc/systemd/system/wazuh-manager.service.d/restart.conf
        content: |
          [Unit]
          StartLimitIntervalSec=300
          StartLimitBurst=5

          [Service]
          Restart=always
          RestartSec=10
      notify: systemd reload
      tags: config

    - name: Dashboard systemd 재시작 설정
      copy:
        dest: /etc/systemd/system/wazuh-dashboard.service.d/restart.conf
        content: |
          [Unit]
          StartLimitIntervalSec=300
          StartLimitBurst=5

          [Service]
          Restart=always
          RestartSec=10
          Environment="NODE_OPTIONS=--max-old-space-size=2048"
      notify: systemd reload
      tags: config

    - meta: flush_handlers
      tags: always

    - name: Dashboard keystore kibanaserver 비밀번호 업데이트
      shell: |
        echo '{{ kibanaserver_password }}' | \
        sudo -u wazuh-dashboard \
        NODE_OPTIONS="--max-old-space-size=2048" \
        /usr/share/wazuh-dashboard/bin/opensearch-dashboards-keystore \
        add opensearch.password --force --stdin
      no_log: true
      tags: config

    - name: wazuh-passwords-tool 다운로드
      get_url:
        url: https://packages.wazuh.com/4.14/wazuh-passwords-tool.sh
        dest: /tmp/wazuh-passwords-tool.sh
        mode: '0755'
        force: yes
      tags: config


    - name: wazuh-wui API 비밀번호 설정
      shell: >
        bash /tmp/wazuh-passwords-tool.sh --api
        -u wazuh-wui
        -p '{{ wazuh_wui_password }}'
        -au wazuh
        -ap '{{ wazuh_api_password }}' 
      no_log: true
      tags: config

    - name: wazuh.yml run_as true 설정
      replace:
        path: /usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
        regexp: 'run_as: false'
        replace: 'run_as: true'
      tags: config


    # ──────────────────────────────────────────
    # Vector
    # ──────────────────────────────────────────
    - name: Vector 설치
      shell: |
        bash -c "$(curl -L https://setup.vector.dev)"
        apt-get install -y vector
      args:
        creates: /usr/bin/vector
      tags: vector

    - name: vector 유저 wazuh 그룹 추가
      user:
        name: vector
        groups: wazuh
        append: yes
      tags: vector

    - name: Vector 기본 설정 파일 삭제
      file:
        path: /etc/vector/vector.yaml
        state: absent
      tags: vector

    - name: Vector config 경로 설정
      copy:
        dest: /etc/default/vector
        content: |
          VECTOR_CONFIG=/etc/vector/vector.toml
        mode: '0644'
      tags: vector

    - name: /var/lib/vector 디렉토리 권한 설정
      file:
        path: /var/lib/vector
        state: directory
        owner: vector
        group: vector
        mode: '0755'
      tags: vector
      
    - name: Vector systemd override 디렉토리 생성
      file:
        path: /etc/systemd/system/vector.service.d
        state: directory
        mode: '0755'
      tags: vector

    - name: Vector 설정 배포
      template:
        src: vector.toml.j2
        dest: /etc/vector/vector.toml
        owner: root
        group: root
        mode: '0644'
      tags: vector

    - name: Vector systemd 재시작 설정
      copy:
        dest: /etc/systemd/system/vector.service.d/restart.conf
        content: |
          [Service]
          Restart=always
          RestartSec=10
      notify: systemd reload
      tags: vector

    - meta: flush_handlers
      tags: always

    - name: Vector 서비스 시작
      systemd:
        name: vector
        state: restarted
        enabled: yes
        daemon_reload: yes
      tags: vector

    - name: Vector 상태 확인
      shell: systemctl is-active vector
      register: vector_status
      tags: vector

    - name: Vector 상태 출력
      debug:
        var: vector_status.stdout
      tags: vector

    # ──────────────────────────────────────────
    # CloudWatch Agent
    # ──────────────────────────────────────────
    - name: CloudWatch Agent 설치
      shell: |
        wget -q https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb -O /tmp/amazon-cloudwatch-agent.deb
        dpkg -i /tmp/amazon-cloudwatch-agent.deb
      args:
        creates: /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent
      tags: cloudwatch

    - name: CloudWatch Agent 설정 배포
      copy:
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
        content: |
          {
            "metrics": {
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"]
                },
                "disk": {
                  "measurement": ["disk_used_percent"],
                  "resources": ["/"]
                }
              },
              "append_dimensions": {
                "InstanceId": "${aws:InstanceId}"
              }
            }
          }
      tags: cloudwatch

    - name: CloudWatch Agent 시작
      shell: |
        /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
        -a fetch-config -m ec2 \
        -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      args:
        creates: /var/run/amazon-cloudwatch-agent.pid
      tags: cloudwatch


    # ──────────────────────────────────────────
    # wazuh-manager 헬스체크 크론
    # ──────────────────────────────────────────
    - name: 헬스체크 스크립트 배포
      copy:
        dest: /usr/local/bin/wazuh-manager-health.sh
        mode: '0755'
        content: |
          #!/bin/bash
          INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)

          if systemctl is-active --quiet wazuh-manager; then
            VALUE=1
          else
            VALUE=0
          fi

          aws cloudwatch put-metric-data \
            --namespace "Custom/Wazuh" \
            --metric-name "wazuh_manager_running" \
            --value $VALUE \
            --dimensions InstanceId=$INSTANCE_ID \
            --region $REGION \
            --storage-resolution 1
      tags: cloudwatch

    - name: 헬스체크 크론 등록
      cron:
        name: "wazuh-manager-health"
        minute: "*"
        job: "/usr/local/bin/wazuh-manager-health.sh >> /var/log/wazuh-health.log 2>&1"
        user: root
      tags: cloudwatch

    - name: wodle DB 백업 스크립트 배포
      copy:
        dest: /usr/local/bin/wazuh-db-backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          aws s3 cp /var/ossec/wodles/aws/aws_services.db \
            s3://aws-k2p-storage-01/wazuh/db-backup/aws_services.db \
            --region $REGION 
      tags: cloudwatch

    - name: wodle DB 백업 크론 등록
      cron:
        name: "wazuh-db-backup"
        minute: "*/5"
        job: "/usr/local/bin/wazuh-db-backup.sh >> /var/log/wazuh-db-backup.log 2>&1"
        user: root
      tags: cloudwatch


    # ──────────────────────────────────────────
    # SSM Agent
    # ──────────────────────────────────────────
    - name: SSM Agent 최신 버전으로 업데이트
      shell: |
        snap refresh amazon-ssm-agent --channel=stable
        systemctl restart snap.amazon-ssm-agent.amazon-ssm-agent.service
      ignore_errors: yes
      tags: ssm

    - name: SSM Agent 설정 디렉토리 생성
      file:
        path: /etc/amazon/ssm
        state: directory
        mode: '0755'
      tags: ssm

    - name: SSM Agent Instance Profile만 사용하도록 설정
      copy:
        dest: /etc/amazon/ssm/amazon-ssm-agent.json
        content: |
          {
            "Profile": {
              "ShareCreds": true,
              "ShareProfile": ""
            }
          }
        mode: '0644'
      tags: ssm

    - name: SSM Agent 재시작
      shell: systemctl restart snap.amazon-ssm-agent.amazon-ssm-agent.service
      ignore_errors: yes
      tags: ssm

    # ──────────────────────────────────────────
    # 서비스 재시작
    # ──────────────────────────────────────────
    - name: 1단계 - Wazuh Manager 재시작
      systemd:
        name: wazuh-manager
        state: restarted
        enabled: yes
      tags: service

    - name: 2단계 - Manager 포트 대기
      wait_for:
        port: 1514
        delay: 5
        timeout: 120
      tags: service

    - name: 2-1단계 - Manager API 포트 대기
      wait_for:
        port: 55000
        delay: 5
        timeout: 120
      tags: service

    - name: 3단계 - Filebeat, Dashboard 기동
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - filebeat
        - wazuh-dashboard
      tags: service

    # ──────────────────────────────────────────
    # 결과 확인
    # ──────────────────────────────────────────
    - name: 서비스 상태 확인
      shell: |
        echo "=== Manager ===" && systemctl is-active wazuh-manager
        echo "=== Dashboard ===" && systemctl is-active wazuh-dashboard
      register: service_status
      tags: service

    - name: 서비스 상태 출력
      debug:
        var: service_status.stdout_lines
      tags: service

    - name: 메모리 상태 확인
      command: free -h
      register: memory_status
      tags: service

    - name: 메모리 상태 출력
      debug:
        var: memory_status.stdout_lines
      tags: service