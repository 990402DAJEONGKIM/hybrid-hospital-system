    # ──────────────────────────────────────────
    # wazuh-manager 헬스체크 크론
    # ──────────────────────────────────────────
    - name: 헬스체크 스크립트 배포
      copy:
        dest: /usr/local/bin/wazuh-manager-health.sh
        mode: '0755'
        content: |
          #!/bin/bash
          INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)

          if systemctl is-active --quiet wazuh-manager; then
            VALUE=1
          else
            VALUE=0
          fi

          aws cloudwatch put-metric-data \
            --namespace "Custom/Wazuh" \
            --metric-name "wazuh_manager_running" \
            --value $VALUE \
            --dimensions InstanceId=$INSTANCE_ID \
            --region $REGION \
            --storage-resolution 60
      tags: cloudwatch

    - name: 헬스체크 크론 등록
      cron:
        name: "wazuh-manager-health"
        minute: "*"
        job: "/usr/local/bin/wazuh-manager-health.sh >> /var/log/wazuh-health.log 2>&1"
        user: root
      tags: cloudwatch

    - name: wodle DB 백업 스크립트 배포
      copy:
        dest: /usr/local/bin/wazuh-db-backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          aws s3 cp /var/ossec/wodles/aws/aws_services.db \
            s3://aws-k2p-storage-01/wazuh/db-backup/aws_services.db \
            --region $REGION 
      tags: cloudwatch

    - name: wodle DB 백업 크론 등록
      cron:
        name: "wazuh-db-backup"
        minute: "*/5"
        job: "/usr/local/bin/wazuh-db-backup.sh >> /var/log/wazuh-db-backup.log 2>&1"
        user: root
      tags: cloudwatch

    - name: 로컬 Wazuh 로그 7일 초과 파일 삭제 cron 등록
      cron:
        name: "wazuh-log-cleanup"
        minute: "0"
        hour: "1"
        job: >
          find /var/ossec/logs/alerts/ -type f -mtime +7 -exec rm -f {} \; &&
          find /var/ossec/logs/archives/ -type f -mtime +7 -exec rm -f {} \;
        user: root
      tags: cloudwatch

    # ──────────────────────────────────────────
    # 취약점 스냅샷 → S3 (일일 보고서용)
    # 인덱서 취약점 집계를 S3에 저장, report 람다가 읽음
    # ──────────────────────────────────────────
    - name: 취약점 추출 스크립트 배포
      template:
        src: vuln-export.sh
        dest: /usr/local/bin/vuln-export.sh
        owner: root
        group: root
        mode: '0700'   # root만 (인덱서 비번 다루므로 엄격히)
      tags: vuln

    - name: 취약점 추출 크론 등록 (매일 KST 08:00 = UTC 23:00)
      cron:
        name: "wazuh-vuln-export"
        minute: "0"
        hour: "23"   # report 람다(08:30)보다 30분 먼저
        job: "/usr/local/bin/vuln-export.sh >> /var/log/wazuh-vuln-export.log 2>&1"
        user: root
      tags: vuln

    # ──────────────────────────────────────────
    # SSM Agent
    # ──────────────────────────────────────────
    - name: SSM Agent 최신 버전으로 업데이트
      shell: |
        snap refresh amazon-ssm-agent --channel=stable
        systemctl restart snap.amazon-ssm-agent.amazon-ssm-agent.service
      ignore_errors: yes
      tags: ssm

    - name: SSM Agent 설정 디렉토리 생성
      file:
        path: /etc/amazon/ssm
        state: directory
        mode: '0755'
      tags: ssm

    - name: SSM Agent Instance Profile만 사용하도록 설정
      copy:
        dest: /etc/amazon/ssm/amazon-ssm-agent.json
        content: |
          {
            "Profile": {
              "ShareCreds": true,
              "ShareProfile": ""
            }
          }
        mode: '0644'
      tags: ssm

    - name: SSM Agent 재시작
      shell: systemctl restart snap.amazon-ssm-agent.amazon-ssm-agent.service
      ignore_errors: yes
      tags: ssm




    # ──────────────────────────────────────────
    # 서비스 재시작
    # ──────────────────────────────────────────

    - name: Indexer keystore username 설정
      shell: /var/ossec/bin/wazuh-keystore -f indexer -k username -v admin
      no_log: true
      tags: config

    - name: Indexer keystore password 설정
      shell: /var/ossec/bin/wazuh-keystore -f indexer -k password -v '{{ wazuh_admin_password }}'
      no_log: true
      tags: config

    - name: root .aws 디렉토리 생성
      file:
        path: /root/.aws
        state: directory
        mode: '0700'
      tags: config

    - name: AWS wodle 리전 설정
      copy:
        dest: /root/.aws/config
        content: |
          [default]
          region = {{ aws_region }}
        mode: '0600'
      tags: config

    - name: remoted.guess_agent_group 설정
      lineinfile:
        path: /var/ossec/etc/local_internal_options.conf
        regexp: '^remoted.guess_agent_group='
        line: 'remoted.guess_agent_group=1'
        create: yes
        owner: root
        group: wazuh
        mode: '0640'
      tags: config


    # ──────────────────────────────────────────
    # Grafana Alloy 설치
    # 공식문서: https://grafana.com/docs/alloy/latest/set-up/install/linux/
    # ──────────────────────────────────────────
    - name: /etc/apt/keyrings 디렉토리 생성
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      tags: alloy

    - name: Grafana GPG 키 다운로드
      get_url:
        url: https://apt.grafana.com/gpg-full.key
        dest: /etc/apt/keyrings/grafana.asc
        mode: '0644'
      tags: alloy

    - name: Grafana APT 레포지토리 추가
      copy:
        dest: /etc/apt/sources.list.d/grafana.list
        content: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main\n"
        mode: '0644'
      tags: alloy

    - name: APT 캐시 업데이트 및 Alloy 설치
      apt:
        name: alloy
        state: present
        update_cache: yes
      tags: alloy

    - name: Alloy 설정 배포
      copy:
        dest: /etc/alloy/config.alloy
        owner: alloy
        group: alloy
        mode: '0644'
        content: |
          // Wazuh Manager 시스템 메트릭 수집
          prometheus.exporter.unix "local" {
            include_exporter_metrics = true
          }
          discovery.relabel "local" {
            targets = prometheus.exporter.unix.local.targets
            rule {
              target_label = "instance"
              replacement  = "wazuh-manager"
            }
          }
          prometheus.scrape "local" {
            targets         = discovery.relabel.local.output
            forward_to      = [prometheus.remote_write.prometheus.receiver]
            scrape_interval = "15s"
          }
          prometheus.remote_write "prometheus" {
            endpoint {
              url = "http://10.0.12.128:9090/api/v1/write"
            }
            wal {
              truncate_frequency = "2h"
              min_keepalive_time = "5m"
              max_keepalive_time = "8h"
            }
          }
      tags: alloy

    - name: Alloy 서비스 시작
      systemd:
        name: alloy
        state: started
        enabled: yes
        daemon_reload: yes
      tags: alloy

    - name: Alloy 상태 확인
      shell: systemctl is-active alloy
      register: alloy_status
      tags: alloy

    - name: Alloy 상태 출력
      debug:
        var: alloy_status.stdout
      tags: alloy

    - name: 1단계 - Wazuh Manager 재시작
      systemd:
        name: wazuh-manager
        state: restarted
        enabled: yes
      tags: service

    - name: 2단계 - Manager 포트 대기
      wait_for:
        port: 1514
        delay: 5
        timeout: 120
      tags: service

    - name: 2-1단계 - Manager API 포트 대기
      wait_for:
        port: 55000
        delay: 5
        timeout: 120
      tags: service

    - name: filebeat template 파일 확인 및 복구
      shell: |
        if [ ! -f /etc/filebeat/wazuh-template.json ]; then
          curl -so /etc/filebeat/wazuh-template.json \
            https://raw.githubusercontent.com/wazuh/wazuh/v4.14.5/extensions/elasticsearch/7.x/wazuh-template.json
        fi
      tags: service

    - name: 3단계 - Filebeat, Dashboard 기동
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - filebeat
        - wazuh-dashboard
      tags: service

    # ──────────────────────────────────────────
    # 결과 확인
    # ──────────────────────────────────────────
    - name: 서비스 상태 확인
      shell: |
        echo "=== Manager ===" && systemctl is-active wazuh-manager
        echo "=== Dashboard ===" && systemctl is-active wazuh-dashboard
      register: service_status
      tags: service

    - name: 서비스 상태 출력
      debug:
        var: service_status.stdout_lines
      tags: service

    - name: 메모리 상태 확인
      command: free -h
      register: memory_status
      tags: service

    - name: 메모리 상태 출력
      debug:
        var: memory_status.stdout_lines
      tags: service
      
    # ──────────────────────────────────────────
    # 와주 대시보드 iframe 임베드 가능 설정 변경
    # ──────────────────────────────────────────
    - name: Dashboard X-Frame-Options 허용 (통합 포털 iframe 임베드) # #260609 박경수
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^server.customResponseHeaders:'
        line: 'server.customResponseHeaders: {"X-Frame-Options": "ALLOWALL"}'
      tags: config

    - name: Dashboard X-Frame-Options 적용 후 재시작 # #260609 박경수
      systemd:
        name: wazuh-dashboard
        state: restarted
      tags: config