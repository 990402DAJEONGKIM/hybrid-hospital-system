# wazuh.yaml
---
- name: Wazuh Manager + Dashboard 설치
  hosts: wazuh
  become: yes
  vars_files:
    - vault.yml 

  handlers:
    - name: systemd reload
      command: systemctl daemon-reload
      changed_when: false


  tasks:

    - name: Slack webhook URL SM에서 읽기
      set_fact:
        slack_webhook_url: "{{ lookup('amazon.aws.aws_secret', 'aws-wazuh-slack-alarm-webhook', region='ap-south-2') }}"
      tags: always


    - name: Wazuh OIDC client secret 변수 사용 # [2026-06-10 박경수]
      set_fact:
        wazuh_openid_client_secret_effective: "{{ wazuh_openid_client_secret }}"
      when: wazuh_openid_client_secret is defined
      no_log: true
      tags: always

    - name: Wazuh OIDC client secret SM에서 읽기 # [2026-06-10 박경수]
      set_fact:
        wazuh_openid_client_secret_effective: "{{ lookup('amazon.aws.aws_secret', 'aws-wazuh-openid-client-secret', region=aws_region | default('ap-south-2')) }}"
      when: wazuh_openid_client_secret is not defined
      no_log: true
      tags: always

    - name: Wazuh Dashboard cookie password 변수 사용 # [2026-06-10 박경수]
      set_fact:
        wazuh_dashboard_cookie_password_effective: "{{ wazuh_dashboard_cookie_password }}"
      when: wazuh_dashboard_cookie_password is defined
      no_log: true
      tags: always

    - name: Wazuh Dashboard cookie password SM에서 읽기 # [2026-06-10 박경수]
      set_fact:
        wazuh_dashboard_cookie_password_effective: "{{ lookup('amazon.aws.aws_secret', 'aws-wazuh-dashboard-cookie-password', region=aws_region | default('ap-south-2')) }}"
      when: wazuh_dashboard_cookie_password is not defined
      no_log: true
      tags: always

    # ──────────────────────────────────────────
    # 시스템 기본 설정
    # ──────────────────────────────────────────
    - name: swap 생성
      shell: |
        fallocate -l 4G /swapfile
        chmod 600 /swapfile
        mkswap /swapfile
        swapon /swapfile
        grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
      args:
        creates: /swapfile
      tags: system

    - name: vm.swappiness 설정
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes
      tags: system

    - name: vm.max_map_count 설정
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes
      tags: system

    # ──────────────────────────────────────────
    # Wazuh 버전 고정
    # ──────────────────────────────────────────
    - name: Wazuh 버전 고정
      copy:
        dest: /etc/apt/preferences.d/wazuh
        content: |
          Package: wazuh-manager wazuh-dashboard
          Pin: version 4.14.5*
          Pin-Priority: 1001
      tags: install

    - name: 시스템 업데이트
      apt:
        update_cache: yes
        upgrade: safe
      timeout: 300
      tags: install

    - name: 필수 패키지 설치
      apt:
        name:
          - curl
          - apt-transport-https
          - gnupg
          - python3
          - libxml2-utils
          - awscli
        state: present
      tags: install

    # ──────────────────────────────────────────
    # 설치 여부 확인
    # ──────────────────────────────────────────
    - name: Wazuh 설치 여부 확인
      shell: |
        test -f /var/ossec/etc/ossec.conf && \
        test -d /etc/wazuh-dashboard && \
        echo "installed" || echo "not_installed"
      register: wazuh_installed
      changed_when: false
      tags: always

    # ──────────────────────────────────────────
    # 설치 블록 (최초 1회)
    # ──────────────────────────────────────────
    - name: Wazuh 신규 설치
      when: wazuh_installed.stdout == "not_installed"
      tags: install
      block:
        - name: Wazuh 잔재 정리
          shell: |
            systemctl stop wazuh-manager 2>/dev/null || true
            systemctl stop wazuh-dashboard 2>/dev/null || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-manager.prerm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-manager.postrm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-dashboard.prerm || true
            echo "exit 0" > /var/lib/dpkg/info/wazuh-dashboard.postrm || true
            dpkg --force-all --purge wazuh-manager wazuh-dashboard || true
            apt autoremove -y || true
            dpkg --configure -a || true
            apt-get install -f -y || true
            rm -rf /etc/wazuh-dashboard || true
            rm -rf /var/ossec || true
            rm -rf /usr/share/wazuh-dashboard || true
            systemctl daemon-reload || true
            systemctl reset-failed || true

        - name: wazuh-install.sh 다운로드
          get_url:
            url: 'https://packages.wazuh.com/4.14/wazuh-install.sh'
            dest: '/tmp/wazuh-install.sh'
            mode: '0755'

        - name: 이전 설치 파일 정리
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/wazuh-install-files
            - /tmp/wazuh-install-files.tar


        - name: wazuh-install-files.tar S3 다운로드
          shell: >
            aws s3 cp s3://wazuh-ansible-ssm/wazuh-install-files.tar
            /tmp/wazuh-install-files.tar --region ap-south-2
          environment:
            AWS_DEFAULT_REGION: "ap-south-2"

        - name: Wazuh Manager 설치 (master)
          shell: bash /tmp/wazuh-install.sh --wazuh-server wazuh-1 --overwrite
          args:
            chdir: /tmp/
          async: 1800
          poll: 30

        - name: Wazuh Dashboard 설치
          shell: bash /tmp/wazuh-install.sh --wazuh-dashboard dashboard-1 --overwrite -fd
          args:
            chdir: /tmp/
          async: 1800
          poll: 30

        - name: wazuh-passwords-tool 다운로드
          get_url:
            url: https://packages.wazuh.com/4.14/wazuh-passwords-tool.sh
            dest: /tmp/wazuh-passwords-tool.sh
            mode: '0755'
            force: yes

        - name: wazuh-wui API 비밀번호 설정
          shell: >
            bash /tmp/wazuh-passwords-tool.sh --api
            -u wazuh-wui
            -p '{{ wazuh_wui_password }}'
            -au wazuh
            -ap '{{ wazuh_api_password }}'
          no_log: true



      rescue:
        - name: 설치 실패 로그 출력
          shell: tail -50 /var/log/wazuh-install.log
          register: wazuh_log
          failed_when: false

        - name: 에러 로그 출력
          debug:
            var: wazuh_log.stdout_lines

        - name: 설치 실패 처리
          fail:
            msg: "Wazuh 설치 실패. 위 로그를 확인하세요."

    # ──────────────────────────────────────────
    # 설정 블록
    # ──────────────────────────────────────────
    - name: 로컬 Indexer 서비스 중지
      systemd:
        name: wazuh-indexer
        state: stopped
        enabled: no
      ignore_errors: yes
      tags: config

    - name: 최신 인증서 S3에서 다운로드
      shell: >
        aws s3 cp s3://wazuh-ansible-ssm/wazuh-install-files.tar
        /tmp/wazuh-install-files.tar --region ap-south-2
      environment:
        AWS_DEFAULT_REGION: "ap-south-2"
      tags: config

    - name: 인증서 압축 해제
      shell: tar -xf /tmp/wazuh-install-files.tar -C /tmp/
      tags: config

    - name: Filebeat 인증서 갱신
      shell: |
        cp /tmp/wazuh-install-files/{{ wazuh_cert_name }}.pem /etc/filebeat/certs/
        cp /tmp/wazuh-install-files/{{ wazuh_cert_name }}-key.pem /etc/filebeat/certs/
        cp /tmp/wazuh-install-files/root-ca.pem /etc/filebeat/certs/
        cp /tmp/wazuh-install-files/root-ca.pem /etc/wazuh-dashboard/certs/
        chmod 644 /etc/filebeat/certs/root-ca.pem
        chmod 644 /etc/filebeat/certs/{{ wazuh_cert_name }}.pem
        chmod 600 /etc/filebeat/certs/{{ wazuh_cert_name }}-key.pem
        chmod 644 /etc/wazuh-dashboard/certs/root-ca.pem
        chmod 640 /etc/wazuh-dashboard/certs/dashboard-1.pem
        chmod 640 /etc/wazuh-dashboard/certs/dashboard-1-key.pem
      tags: config

    - name: ossec.conf 템플릿 배포
      template:
        src: ossec.conf.j2
        dest: /var/ossec/etc/ossec.conf
        owner: root
        group: wazuh
        mode: '0640'
      tags: config

    - name: Wazuh 내부 timezone을 호스트와 일치
      copy:
        src: /etc/localtime
        dest: /var/ossec/etc/localtime
        remote_src: yes
        owner: root
        group: wazuh
        mode: '0640'
      tags: config


    - name: 커스텀 룰 배포
      copy:
        src: rules/{{ item }}
        dest: /var/ossec/etc/rules/{{ item }}
        owner: root
        group: wazuh
        mode: '0640'
      loop:
        - local_rules.xml
        - rds_rules.xml
        - onprem_rules.xml
        - cloudsql_rules.xml
        - vpn_rules.xml
        - waf_rules.xml
      tags: config

    # 1. ecs-ec2 그룹 생성
    - name: ecs-ec2 Agent 그룹 생성
      shell: |
        /var/ossec/bin/agent_groups -a -g ecs-ec2 -q || true
      tags: config

    # 2. ecs-ec2 그룹 디렉토리 생성
    - name: ecs-ec2 그룹 디렉토리 생성
      file:
        path: /var/ossec/etc/shared/ecs-ec2
        state: directory
        owner: wazuh
        group: wazuh
        mode: '0770'
      tags: config

    # 3. 기존 agent.conf를 ecs-ec2 그룹에도 배포
    - name: ecs-ec2 Agent 설정 배포
      copy:
        src: agent_ecs.conf 
        dest: /var/ossec/etc/shared/ecs-ec2/agent.conf
        owner: wazuh
        group: wazuh
        mode: '0640'
      tags: config

    - name: Agent 중앙 설정 배포
      copy:
        src: agent.conf
        dest: /var/ossec/etc/shared/default/agent.conf
        owner: wazuh
        group: wazuh
        mode: '0640'
      tags: config

    - name: onprem 그룹 디렉토리 생성
      file:
        path: /var/ossec/etc/shared/onprem
        state: directory
        owner: wazuh
        group: wazuh
        mode: '0770'
      tags: config

    - name: onprem Agent 설정 배포
      copy:
        src: agent_onprem.conf
        dest: /var/ossec/etc/shared/onprem/agent.conf
        owner: wazuh
        group: wazuh
        mode: '0640'
      tags: config

    - name: onprem Agent 그룹 이동
      shell: |
        /var/ossec/bin/agent_groups -a -i $(
          /var/ossec/bin/agent_control -l | grep onprem-mspserver | awk '{print $2}' | tr -d ','
        ) -g onprem -q
      ignore_errors: yes
      tags: config

    - name: gcp-proxy 그룹 생성
      shell: |
        /var/ossec/bin/agent_groups -a -g gcp-proxy -q || true
      tags: config

    - name: gcp-proxy 그룹 디렉토리 생성
      file:
        path: /var/ossec/etc/shared/gcp-proxy
        state: directory
        owner: wazuh
        group: wazuh
        mode: '0770'
      tags: config

    - name: gcp-proxy Agent 설정 배포
      copy:
        src: agent_gcp_proxy.conf
        dest: /var/ossec/etc/shared/gcp-proxy/agent.conf
        owner: wazuh
        group: wazuh
        mode: '0640'
      tags: config


    - name: ossec.conf XML 검증
      shell: |
        python3 -c "
        import xml.etree.ElementTree as ET
        ET.parse('/var/ossec/etc/ossec.conf')
        print('XML OK')
        "
      register: xml_check
      failed_when: "'XML OK' not in xml_check.stdout"
      tags: config

    - name: Wazuh 설정 파서 검증
      command: /var/ossec/bin/wazuh-analysisd -t
      register: analysisd_check
      failed_when: analysisd_check.rc != 0
      tags: config

    - name: analysisd 검증 결과 출력
      debug:
        var: analysisd_check.stdout_lines
      when: analysisd_check.stdout_lines is defined
      tags: config

    - name: Dashboard server.host 설정
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^server.host:'
        line: 'server.host: 0.0.0.0'
      tags: config

    - name: Dashboard session TTL 설정
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.session.ttl:'
        line: 'opensearch_security.session.ttl: 3600000'
      tags: config

    - name: Dashboard session keepalive 설정
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.session.keepalive:'
        line: 'opensearch_security.session.keepalive: true'
      tags: config
          
    # Dashboard session keepalive 설정 다음에 추가 260609 박경수
    - name: Dashboard CSP frame-ancestors 설정 
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^csp.rules:'
        line: 'csp.rules: ["script-src ''unsafe-eval'' ''unsafe-inline'' ''self''; worker-src blob: ''self''; frame-ancestors ''self'' https://monitoring.mzclinic.cloud"]'
      tags: config

    - name: Filebeat 설정 배포
      template:
        src: filebeat.yml.j2
        dest: /etc/filebeat/filebeat.yml
        owner: root
        group: root
        mode: '0600'
      tags: config

    - name: Filebeat 기본 경로 설정
      copy:
        dest: /etc/default/filebeat
        content: |
          BEAT_PATH_OPTS="--path.home /usr/share/filebeat --path.config /etc/filebeat --path.data /var/lib/filebeat --path.logs /var/log/filebeat"
        mode: '0644'
      tags: config

    - name: Dashboard opensearch.hosts
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: 'opensearch.hosts:.*'
        line: 'opensearch.hosts: ["https://{{ wazuh_indexer_ip }}:9200"]'
      tags: config

    - name: monitoring 도메인 내부 해석 고정 # [2026-06-10 박경수] Keycloak OIDC 내부 접근 안정화
      lineinfile:
        path: /etc/hosts
        regexp: '.*\smonitoring\.mzclinic\.cloud$'
        line: "{{ monitoring_private_ip | default('10.0.12.128') }} monitoring.mzclinic.cloud"
        state: present
      tags: config

    - name: Dashboard opensearch.username 설정 # [2026-06-10 박경수] Dashboard -> Indexer 인증 계정 명시
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^#?\s*opensearch.username:'
        line: 'opensearch.username: kibanaserver'
        state: present
      tags: config

    - name: Dashboard opensearch.password 평문 설정 제거 # [2026-06-10 박경수] 비밀번호는 keystore 사용
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^#?\s*opensearch.password:'
        state: absent
      tags: config

    - name: Dashboard OIDC auth type 설정 # [2026-06-10 박경수] Keycloak SSO
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.auth.type:'
        line: 'opensearch_security.auth.type: "openid"'
        state: present
      tags: config

    - name: Dashboard OIDC connect_url 설정 # [2026-06-10 박경수]
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.openid.connect_url:'
        line: 'opensearch_security.openid.connect_url: "{{ keycloak_base_url | default(''https://monitoring.mzclinic.cloud'') }}/realms/{{ keycloak_realm | default(''mzclinic'') }}/.well-known/openid-configuration"'
        state: present
      tags: config

    - name: Dashboard OIDC client_id 설정 # [2026-06-10 박경수]
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.openid.client_id:'
        line: 'opensearch_security.openid.client_id: "wazuh"'
        state: present
      tags: config

    - name: Dashboard OIDC client_secret 평문 설정 제거 # [2026-06-10 박경수] secret은 keystore 사용
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.openid.client_secret:'
        state: absent
      tags: config

    - name: Dashboard OIDC base_redirect_url 설정 # [2026-06-10 박경수]
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.openid.base_redirect_url:'
        line: 'opensearch_security.openid.base_redirect_url: "{{ wazuh_dashboard_public_url | default(''https://wazuh.mzclinic.cloud'') }}"'
        state: present
      tags: config

    - name: Dashboard OIDC logout_url 설정 # [2026-06-10 박경수]
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.openid.logout_url:'
        line: 'opensearch_security.openid.logout_url: "{{ keycloak_base_url | default(''https://monitoring.mzclinic.cloud'') }}/realms/{{ keycloak_realm | default(''mzclinic'') }}/protocol/openid-connect/logout"'
        state: present
      tags: config

    - name: Dashboard cookie secure 설정 # [2026-06-10 박경수] HTTPS 세션 쿠키 강제
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.cookie.secure:'
        line: 'opensearch_security.cookie.secure: true'
        state: present
      tags: config

    - name: Dashboard cookie.password 평문 설정 제거 # [2026-06-10 박경수] cookie password는 keystore 사용
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^opensearch_security.cookie.password:'
        state: absent
      tags: config

    - name: Dashboard verbose logging 제거 # [2026-06-10 박경수] 디버깅 로그 운영 반영 방지
      lineinfile:
        path: /etc/wazuh-dashboard/opensearch_dashboards.yml
        regexp: '^logging.verbose:'
        state: absent
      tags: config

    - name: systemd override 디렉토리 생성
      file:
        path: "/etc/systemd/system/{{ item }}.service.d"
        state: directory
        mode: '0755'
      loop:
        - wazuh-manager
        - wazuh-dashboard
      tags: config

    - name: Manager systemd 재시작 설정
      copy:
        dest: /etc/systemd/system/wazuh-manager.service.d/restart.conf
        content: |
          [Unit]
          StartLimitIntervalSec=300
          StartLimitBurst=5

          [Service]
          Restart=always
          RestartSec=10
      notify: systemd reload
      tags: config

    - name: Dashboard systemd 재시작 설정
      copy:
        dest: /etc/systemd/system/wazuh-dashboard.service.d/restart.conf
        content: |
          [Unit]
          StartLimitIntervalSec=300
          StartLimitBurst=5

          [Service]
          Restart=always
          RestartSec=10
          Environment="NODE_OPTIONS=--max-old-space-size=2048"
      notify: systemd reload
      tags: config

    - meta: flush_handlers
      tags: always

    - name: Dashboard keystore kibanaserver 비밀번호 업데이트
      shell: |
        echo '{{ kibanaserver_password }}' | \
        sudo -u wazuh-dashboard \
        NODE_OPTIONS="--max-old-space-size=2048" \
        /usr/share/wazuh-dashboard/bin/opensearch-dashboards-keystore \
        add opensearch.password --force --stdin
      no_log: true
      tags: config

    - name: Dashboard keystore OIDC client secret 업데이트 # [2026-06-10 박경수] Keycloak wazuh client secret
      shell: |
        echo '{{ wazuh_openid_client_secret_effective }}' | \
        sudo -u wazuh-dashboard \
        NODE_OPTIONS="--max-old-space-size=2048" \
        /usr/share/wazuh-dashboard/bin/opensearch-dashboards-keystore \
        add opensearch_security.openid.client_secret --force --stdin
      no_log: true
      tags: config

    - name: Dashboard keystore cookie password 업데이트 # [2026-06-10 박경수] OIDC 세션 저장용 고정 secret
      shell: |
        echo '{{ wazuh_dashboard_cookie_password_effective }}' | \
        sudo -u wazuh-dashboard \
        NODE_OPTIONS="--max-old-space-size=2048" \
        /usr/share/wazuh-dashboard/bin/opensearch-dashboards-keystore \
        add opensearch_security.cookie.password --force --stdin
      no_log: true
      tags: config



    - name: wazuh.yml 디렉토리 생성
      file:
        path: /usr/share/wazuh-dashboard/data/wazuh/config
        state: directory
        owner: wazuh-dashboard
        group: wazuh-dashboard
        mode: '0750'
      tags: config

    - name: wazuh.yml 배포
      copy:
        dest: /usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
        owner: wazuh-dashboard
        group: wazuh-dashboard
        mode: '0640'
        content: |
          hosts:
            - default:
                url: https://127.0.0.1
                port: 55000
                username: wazuh-wui
                password: '{{ wazuh_wui_password }}'
                run_as: true
      tags: config

    - name: wazuh-wui run_as 활성화
      shell: |
        TOKEN=$(curl -s -k -u wazuh:'{{ wazuh_api_password }}' \
          https://localhost:55000/security/user/authenticate?raw=true)
        curl -s -k -X PUT \
          -H "Authorization: Bearer $TOKEN" \
          "https://localhost:55000/security/users/2/run_as?allow_run_as=true"
        curl -s -k -X PUT \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          "https://localhost:55000/security/config" \
          -d '{"auth_token_exp_timeout": 900}'
      no_log: true
      tags: config


    - name: wazuh-passwords-tool 후 Dashboard 재시작
      systemd:
        name: wazuh-dashboard
        state: restarted
      tags: config

    # ──────────────────────────────────────────
    # Vector
    # ──────────────────────────────────────────
    - name: Vector 설치
      shell: |
        bash -c "$(curl -L https://setup.vector.dev)"
        apt-get install -y vector
      args:
        creates: /usr/bin/vector
      tags: vector

    - name: vector 유저 wazuh 그룹 추가
      user:
        name: vector
        groups: wazuh
        append: yes
      tags: vector

    - name: Vector 기본 설정 파일 삭제
      file:
        path: /etc/vector/vector.yaml
        state: absent
      tags: vector

    - name: Vector config 경로 설정
      copy:
        dest: /etc/default/vector
        content: |
          VECTOR_CONFIG=/etc/vector/vector.toml
        mode: '0644'
      tags: vector

    - name: /var/lib/vector 디렉토리 권한 설정
      file:
        path: /var/lib/vector
        state: directory
        owner: vector
        group: vector
        mode: '0755'
      tags: vector
      
    - name: Vector systemd override 디렉토리 생성
      file:
        path: /etc/systemd/system/vector.service.d
        state: directory
        mode: '0755'
      tags: vector

    - name: Vector 설정 배포
      template:
        src: vector.toml.j2
        dest: /etc/vector/vector.toml
        owner: root
        group: root
        mode: '0644'
      tags: vector

    - name: Vector systemd 재시작 설정
      copy:
        dest: /etc/systemd/system/vector.service.d/restart.conf
        content: |
          [Service]
          Restart=always
          RestartSec=10
      notify: systemd reload
      tags: vector

    - meta: flush_handlers
      tags: always

    - name: Vector 서비스 시작
      systemd:
        name: vector
        state: restarted
        enabled: yes
        daemon_reload: yes
      tags: vector

    - name: Vector 상태 확인
      shell: systemctl is-active vector
      register: vector_status
      tags: vector

    - name: Vector 상태 출력
      debug:
        var: vector_status.stdout
      tags: vector

